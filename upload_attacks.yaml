        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout"
      - label: Count total domain users
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=user)' 'sAMAccountName' | wc -l"
      - label: List all DA / EA / Schema Admin members
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(memberOf=CN=Domain Admins,CN=Users,DC=corp,DC=local)' 'sAMAccountName memberOf'"
      - label: Get OS version breakdown
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=computer)' 'operatingSystem' | sort | uniq -c | sort -rn"
      - label: Confirm all DC hostnames
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(userAccountControl:1.2.840.113556.1.4.803:=8192)' 'sAMAccountName dNSHostName operatingSystem'"
      - label: List service accounts with SPNs
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(servicePrincipalName=*)' 'sAMAccountName servicePrincipalName adminCount'"
    next_steps:
