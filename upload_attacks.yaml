    cleanup:
      - label: "Remove certificate files"
        cmd: "rm -f {TARGET_USER}.pfx {TARGET_USER}.ccache"

  - id: adcs_esc3
    name: ADCS ESC3 — Enrollment Agent Template Abuse
    tab: ADCS
    requires:
